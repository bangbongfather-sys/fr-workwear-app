<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const FB_URL = "https://njsafety-2ee24-default-rtdb.asia-southeast1.firebasedatabase.app/frw.json";
const NAVY = "#1a2f5e";
const ORANGE = "#f97316";

function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
}
function save(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
}
async function cloudLoad() {
  const r = await fetch(FB_URL);
  if (!r.ok) throw new Error("load failed");
  return await r.json();
}
async function cloudSave(data) {
  const r = await fetch(FB_URL, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(data) });
  if (!r.ok) throw new Error("save failed");
}

const INIT_MATERIALS = [
  { id: 1, name: "아라미드 원단 (Nomex III A)", price: 48000, unit: "yard" },
  { id: 2, name: "아라미드 원단 (하계용)", price: 42000, unit: "yard" },
  { id: 3, name: "FR 코튼 (9oz)", price: 18000, unit: "yard" },
  { id: 4, name: "FR 폴리/코튼 혼방 (65/35)", price: 22000, unit: "yard" },
  { id: 5, name: "모다크릴 혼방 원단", price: 35000, unit: "yard" },
  { id: 6, name: "FR 린넨 혼방", price: 28000, unit: "m" },
];
const INIT_LABOR = [
  { id: 10, name: "재봉비 (기본)", price: 8000, unit: "벌" },
  { id: 11, name: "재봉비 (고급)", price: 12000, unit: "벌" },
  { id: 12, name: "재단비", price: 3000, unit: "벌" },
  { id: 13, name: "부자재비 (지퍼/단추)", price: 4500, unit: "벌" },
  { id: 14, name: "라벨·택 부착비", price: 800, unit: "벌" },
  { id: 15, name: "검사·포장비", price: 1500, unit: "벌" },
];

let _uid = 200;
const uid = () => ++_uid;
const newFabric = () => ({ id: uid(), matId: "", qty: "" });
const newExtra = () => ({ id: uid(), laborId: "", customName: "", price: "", qty: "1" });
const DEFAULT_MARGINS = { A: 50, B: 40, C: 30, D: 20 };
const GRADES = ["A", "B", "C", "D"];
const newProduct = (name) => ({
  id: uid(), name,
  fabrics: [newFabric()],
  extras: [newExtra()],
  margins: { ...DEFAULT_MARGINS },
  priceOverrides: { A: "", B: "", C: "", D: "" },
  selectedGrade: "A",
  include: true,
  adminRate: 10,
});
const migrateProduct = (p) => {
  let q = { ...p };
  if (!q.margins) {
    const m = typeof q.margin === "number" ? q.margin : 30;
    q.margins = {
      A: Math.min(99, Math.round(m + 20)),
      B: Math.min(99, Math.round(m + 10)),
      C: Math.round(m),
      D: Math.max(0, Math.round(m - 10)),
    };
    delete q.margin;
  }
  if (!q.priceOverrides) q.priceOverrides = { A: "", B: "", C: "", D: "" };
  if (!q.selectedGrade) q.selectedGrade = "A";
  if (q.include === undefined) q.include = true;
  return q;
};
const INIT_PRODUCTS = [newProduct("자켓"), newProduct("바지"), newProduct("조끼")];

const LABOR_UNITS = ["벌", "장", "개", "m", "yard", "식"];

// 모든 제품의 비용을 계산하는 helper
function computeProduct(p, materials, laborItems) {
  const fCost = p.fabrics.reduce((s, f) => {
    const m = materials.find(x => x.id === Number(f.matId));
    return s + (m ? m.price * parseFloat(f.qty || 0) : 0);
  }, 0);
  const eCost = p.extras.reduce((s, e) => {
    const u = e.laborId ? (laborItems.find(l => l.id === Number(e.laborId))?.price || 0) : parseFloat(e.price || 0);
    const q = parseFloat(e.qty || 1);
    return s + u * q;
  }, 0);
  const base = fCost + eCost;
  const admin = base * ((p.adminRate || 0) / 100);
  const beforeMargin = base + admin;
  const margins = p.margins || DEFAULT_MARGINS;
  const overrides = p.priceOverrides || {};
  const grades = {};         // 적용 단가 (override 우선)
  const calcGrades = {};     // 마진율 계산값 (참조용)
  const overridden = {};     // 어느 등급이 수동 수정됐는지
  for (const g of GRADES) {
    const auto = beforeMargin * (1 + (margins[g] ?? DEFAULT_MARGINS[g]) / 100);
    calcGrades[g] = auto;
    const ov = parseFloat(overrides[g]);
    if (!isNaN(ov) && ov > 0) {
      grades[g] = ov;
      overridden[g] = true;
    } else {
      grades[g] = auto;
      overridden[g] = false;
    }
  }
  const sel = p.selectedGrade || "A";
  return {
    fCost, eCost, base, admin, beforeMargin,
    grades, calcGrades, overridden,
    selectedGrade: sel,
    finalPrice: grades[sel] || 0,
    marginAmt: (grades[sel] || 0) - beforeMargin,
  };
}

// 간이 마크다운 → JSX (애플 도큐먼트 스타일)
function AppleMarkdown({ text }) {
  if (!text) return null;
  const lines = text.split("\n");
  const out = [];
  let i = 0;
  const inline = (s) => {
    // **bold**, *italic*
    const parts = [];
    let last = 0;
    const re = /\*\*(.+?)\*\*|\*(.+?)\*/g;
    let m;
    let key = 0;
    while ((m = re.exec(s)) !== null) {
      if (m.index > last) parts.push(s.slice(last, m.index));
      if (m[1]) parts.push(<strong key={key++}>{m[1]}</strong>);
      else if (m[2]) parts.push(<em key={key++}>{m[2]}</em>);
      last = m.index + m[0].length;
    }
    if (last < s.length) parts.push(s.slice(last));
    return parts;
  };
  while (i < lines.length) {
    const line = lines[i];
    if (/^# /.test(line)) { out.push(<h1 key={i}>{inline(line.replace(/^# /, ""))}</h1>); i++; continue; }
    if (/^## /.test(line)) { out.push(<h2 key={i}>{inline(line.replace(/^## /, ""))}</h2>); i++; continue; }
    if (/^### /.test(line)) { out.push(<h3 key={i}>{inline(line.replace(/^### /, ""))}</h3>); i++; continue; }
    if (/^#### /.test(line)) { out.push(<h4 key={i}>{inline(line.replace(/^#### /, ""))}</h4>); i++; continue; }
    if (/^---+\s*$/.test(line)) { out.push(<hr key={i} />); i++; continue; }
    if (/^\s*$/.test(line)) { i++; continue; }

    // 표
    if (/^\s*\|.*\|\s*$/.test(line) && i + 1 < lines.length && /^\s*\|[-:\s|]+\|\s*$/.test(lines[i+1])) {
      const head = line.split("|").slice(1, -1).map(c => c.trim());
      i += 2;
      const rows = [];
      while (i < lines.length && /^\s*\|.*\|\s*$/.test(lines[i])) {
        rows.push(lines[i].split("|").slice(1, -1).map(c => c.trim()));
        i++;
      }
      out.push(
        <table key={"t"+i}>
          <thead><tr>{head.map((h, j) => <th key={j}>{inline(h)}</th>)}</tr></thead>
          <tbody>
            {rows.map((r, ri) => (
              <tr key={ri}>{r.map((c, j) => <td key={j}>{inline(c)}</td>)}</tr>
            ))}
          </tbody>
        </table>
      );
      continue;
    }

    // 리스트
    if (/^\s*[-*]\s+/.test(line)) {
      const items = [];
      while (i < lines.length && /^\s*[-*]\s+/.test(lines[i])) {
        items.push(lines[i].replace(/^\s*[-*]\s+/, ""));
        i++;
      }
      out.push(<ul key={"u"+i}>{items.map((it, j) => <li key={j}>{inline(it)}</li>)}</ul>);
      continue;
    }

    // 일반 단락 (연속된 라인 묶기)
    const para = [line];
    i++;
    while (i < lines.length && lines[i].trim() && !/^(#|---|\s*\||\s*[-*]\s+)/.test(lines[i])) {
      para.push(lines[i]); i++;
    }
    out.push(<p key={"p"+i}>{inline(para.join(" "))}</p>);
  }
  return <>{out}</>;
}

function SectionTitle({ children, action }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
      <div style={{ fontSize: 15, fontWeight: 700, color: "#191F28" }}>{children}</div>
      {action}
    </div>
  );
}

function PriceDB({ materials, setMaterials, laborItems, setLaborItems }) {
  const [newMat, setNewMat] = useState({ name: "", price: "", unit: "yard" });
  const [editMat, setEditMat] = useState(null);
  const [newLab, setNewLab] = useState({ name: "", price: "", unit: "벌" });
  const [editLab, setEditLab] = useState(null);

  const addMaterial = () => {
    if (!newMat.name.trim() || !newMat.price) return;

                      <td style={{ textAlign: "center" }}>

}

function App() {
  const [tab, setTab] = useState("calc");
  const [materials, setMaterials] = useState(() => load("frw_materials", INIT_MATERIALS));
  const [laborItems, setLaborItems] = useState(() => load("frw_labor", INIT_LABOR));
  const [products, setProducts] = useState(() => load("frw_products", null) || INIT_PRODUCTS);
  const [activeProdId, setActiveProdId] = useState(() => {
    const saved = load("frw_products", null);
    return saved ? saved[0].id : INIT_PRODUCTS[0].id;
  });
  const [newProdName, setNewProdName] = useState("");
  const [apiKey, setApiKey] = useState(() => load("frw_apikey", ""));
  const [editingProdName, setEditingProdName] = useState(null);
  const [syncStatus, setSyncStatus] = useState("syncing");
  const [quote, setQuote] = useState("");
  const [generating, setGenerating] = useState(false);
  const [apiError, setApiError] = useState("");
  const [editingQuote, setEditingQuote] = useState(false);
  const initialized = useRef(false);
  const syncTimer = useRef(null);
  const prodNameRef = useRef(null);

  const applyCloudData = (d) => {
    if (!d) return;
    if (d.materials) setMaterials(d.materials);
    if (d.laborItems) setLaborItems(d.laborItems);
    if (d.products && d.products.length > 0) {
      const migrated = d.products.map(migrateProduct);
      setProducts(migrated);
      setActiveProdId(migrated[0].id);
    }
    if (d.apiKey !== undefined) setApiKey(d.apiKey);
  };

  useEffect(() => {
    cloudLoad().then(d => { applyCloudData(d); setSyncStatus("saved"); })
      .catch(() => setSyncStatus("error")).finally(() => { initialized.current = true; });
  }, []);

  useEffect(() => {
    const onVisible = () => {
      if (document.visibilityState === "visible" && initialized.current) {
        setSyncStatus("syncing");
        cloudLoad().then(d => { applyCloudData(d); setSyncStatus("saved"); }).catch(() => setSyncStatus("error"));
      }
    };
    document.addEventListener("visibilitychange", onVisible);
    return () => document.removeEventListener("visibilitychange", onVisible);
  }, []);

  useEffect(() => {
    save("frw_materials", materials); save("frw_labor", laborItems);
    save("frw_products", products); save("frw_apikey", apiKey);
    if (!initialized.current) return;
    setSyncStatus("syncing");
    if (syncTimer.current) clearTimeout(syncTimer.current);
    syncTimer.current = setTimeout(() => {
      cloudSave({ materials, laborItems, products, apiKey })
        .then(() => setSyncStatus("saved")).catch(() => setSyncStatus("error"));
    }, 1500);
  }, [materials, laborItems, products, apiKey]);

  const activeProd = products.find(p => p.id === activeProdId) || products[0];

  const calc = computeProduct(activeProd, materials, laborItems);
  const fabricCost = calc.fCost;
  const extraCost = calc.eCost;
  const baseTotal = calc.base;
  const adminAmt = calc.admin;
  const beforeMargin = calc.beforeMargin;
  const gradePrices = calc.grades;
  const calcGradePrices = calc.calcGrades;
  const overriddenGrades = calc.overridden;
  const marginAmt = calc.marginAmt;
  const finalPrice = calc.finalPrice;

  const updProd = (field, value) =>
    setProducts(ps => ps.map(p => p.id === activeProdId ? { ...p, [field]: value } : p));

  const addProduct = () => {
    if (!newProdName.trim()) return;
    const p = newProduct(newProdName.trim());
    setProducts(ps => [...ps, p]); setActiveProdId(p.id); setNewProdName("");
  };
  const deleteProduct = (id) => {
    if (products.length <= 1) return;
    const remaining = products.filter(p => p.id !== id);
    setProducts(remaining);
    if (activeProdId === id) setActiveProdId(remaining[0].id);
  };
  const saveProdName = () => {
    if (!editingProdName) return;
    const name = editingProdName.value.trim();
    if (name) setProducts(ps => ps.map(p => p.id === editingProdName.id ? { ...p, name } : p));
    setEditingProdName(null);
  };
  const startEditProdName = (p, e) => {
    e && e.stopPropagation();
    setEditingProdName({ id: p.id, value: p.name });
  };

  const addFabric = () => updProd("fabrics", [...activeProd.fabrics, newFabric()]);
  const removeFabric = (fid) => { if (activeProd.fabrics.length <= 1) return; updProd("fabrics", activeProd.fabrics.filter(f => f.id !== fid)); };
  const updFabric = (fid, k, v) => updProd("fabrics", activeProd.fabrics.map(f => f.id === fid ? { ...f, [k]: v } : f));
  const addExtra = () => updProd("extras", [...activeProd.extras, newExtra()]);
  const removeExtra = (eid) => updProd("extras", activeProd.extras.filter(e => e.id !== eid));
  const updExtra = (eid, k, v) => updProd("extras", activeProd.extras.map(e => e.id === eid ? { ...e, [k]: v } : e));
  const selectLabor = (eid, laborId) => {
    const l = laborItems.find(x => x.id === Number(laborId));
    updProd("extras", activeProd.extras.map(e =>
      e.id === eid ? { ...e, laborId, customName: l ? l.name : "", price: l ? String(l.price) : "" } : e
    ));
    // qty preserved as-is
  };

  const buildFabricLines = () => activeProd.fabrics.map(f => {
    const m = materials.find(x => x.id === Number(f.matId));
    if (!m || !f.qty) return null;
    return { name: m.name, qty: f.qty, unit: m.unit, unitPrice: m.price, total: m.price * parseFloat(f.qty) };
  }).filter(Boolean);

  const buildExtraLines = () => activeProd.extras.map(e => {
    const l = e.laborId ? laborItems.find(x => x.id === Number(e.laborId)) : null;
    const name = l ? l.name : e.customName;
    const unitPrice = l ? l.price : parseFloat(e.price || 0);
    const qty = parseFloat(e.qty || 1);
    const total = unitPrice * qty;
    if (!name || !total) return null;
    return { name, qty, unitPrice, total };
  }).filter(Boolean);

  // 견적서에 포함될 제품들 (포함 여부 + 데이터 있는 것만)
  const getQuotedProducts = () => {
    return products.filter(p => p.include !== false).map(p => {
      const c = computeProduct(p, materials, laborItems);
      return { p, c };
    }).filter(x => x.c.base > 0);
  };

  // 거래처용 견적서 템플릿 (애플 보고서 스타일, 제품명·단가만)
  const generateTemplate = () => {
    const items = getQuotedProducts();
    const today = new Date().toLocaleDateString("ko-KR", { year: "numeric", month: "long", day: "numeric" });
    const quoteId = `FRW-${new Date().toISOString().slice(0,10).replace(/-/g,"")}-${String(new Date().getHours()).padStart(2,"0")}${String(new Date().getMinutes()).padStart(2,"0")}`;
    const totalSum = items.reduce((s, x) => s + x.c.finalPrice, 0);

    if (items.length === 0) {
      return `# FR Workwear Quotation\n\n원가가 입력된 제품이 없습니다.`;
    }

    // 제품 단가 표 (제품명 / 수량 / 단가만)
    const priceTable = items.map(({ p, c }) =>
      `| ${p.name} | 1 | ${Math.round(c.finalPrice).toLocaleString()}원 |`
    ).join("\n");

    return `# FR Workwear Quotation

**작성일** ${today}　　**견적번호** ${quoteId}　　**유효기간** 발행일로부터 30일

    try {

                    {activeProd.fabrics.map((f, i) => {
                      const m = materials.find(x => x.id === Number(f.matId));
                      const c = m ? m.price * parseFloat(f.qty || 0) : 0;
                      if (!m || c === 0) return null;
                      return (
                        <div key={f.id} className="row-item" style={{ padding: "3px 0" }}>
                          <span className="row-label" style={{ maxWidth: 145, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", fontSize: 12 }}>{m.name}</span>
                          <span style={{ fontSize: 12, fontWeight: 600, color: "#191F28" }}>{c.toLocaleString()}원</span>
                        </div>
                      );
                    })}
                    <div className="row-item" style={{ marginTop: 8, paddingTop: 8, borderTop: "1px dashed #F2F4F7" }}>
                      <span style={{ fontSize: 12, color: "#8B95A1" }}>원단 소계</span>
                      <span style={{ fontSize: 13, fontWeight: 700 }}>{fabricCost.toLocaleString()}원</span>
                    </div>
                  </div>
                )}

                {activeProd.extras.some(e => (e.laborId || e.customName) && (e.laborId || e.price)) && (
                  <div style={{ padding: "14px 20px", borderBottom: "1px solid #F2F4F7" }}>
                    <div className="section-label">기타 · 공임비</div>
                    {activeProd.extras.map(e => {
                      const l = e.laborId ? laborItems.find(x => x.id === Number(e.laborId)) : null;
                      const name = l ? l.name : e.customName;
                      const unitPrice = l ? l.price : parseFloat(e.price || 0);
                      const qty = parseFloat(e.qty || 1);
                      const total = unitPrice * qty;
                      if (!name || !total) return null;
                      return (
                        <div key={e.id} className="row-item" style={{ padding: "3px 0" }}>
                          <span className="row-label" style={{ maxWidth: 145, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", fontSize: 12 }}>{name}{qty !== 1 ? ` ×${qty}` : ""}</span>
                          <span style={{ fontSize: 12, fontWeight: 600, color: "#191F28" }}>{Math.round(total).toLocaleString()}원</span>
                        </div>
                      );
                    })}
                    <div className="row-item" style={{ marginTop: 8, paddingTop: 8, borderTop: "1px dashed #F2F4F7" }}>
                      <span style={{ fontSize: 12, color: "#8B95A1" }}>공임비 소계</span>
                      <span style={{ fontSize: 13, fontWeight: 700 }}>{extraCost.toLocaleString()}원</span>
                    </div>
                  </div>
                )}

                <div style={{ padding: "14px 20px", borderBottom: "1px solid #F2F4F7" }}>
                  <div className="row-item">
                    <span className="row-label">소계</span>
                    <span className="row-value">{baseTotal.toLocaleString()}원</span>
                  </div>
                  <div className="row-item">
                    <span className="row-label">일반관리비 ({activeProd.adminRate}%)</span>
                    <span className="row-value" style={{ color: "#7C3AED" }}>+{Math.round(adminAmt).toLocaleString()}원</span>
                  </div>
                  <div className="row-item">
                    <span className="row-label">관리비 포함 원가</span>
                    <span className="row-value">{Math.round(beforeMargin).toLocaleString()}원</span>
                  </div>
                </div>

                {/* ABCD 등급 가격 */}
                <div style={{ padding: "14px 20px", borderBottom: "1px solid #F2F4F7" }}>
                  <div className="section-label">등급별 단가</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                    {GRADES.map(g => {
                      const isSel = activeProd.selectedGrade === g;
                      const p = gradePrices[g] || 0;
                      const r = activeProd.margins?.[g] ?? DEFAULT_MARGINS[g];
                      const isOv = overriddenGrades[g];
                      return (
                        <button key={g}
                          onClick={() => updProd("selectedGrade", g)}
                          style={{
                            display: "flex", alignItems: "center", gap: 8,
                            padding: "8px 10px", borderRadius: 10, cursor: "pointer",
                            border: isSel ? `1.5px solid ${NAVY}` : "1.5px solid transparent",
                            background: isSel ? "#EEF2FF" : "transparent",
                            fontFamily: "inherit", textAlign: "left", width: "100%",
                            transition: "all 0.15s",
                          }}>
                          <span style={{
                            width: 22, height: 22, borderRadius: 6,
                            background: isSel ? NAVY : "#E5E8EB",
                            color: isSel ? "#fff" : "#8B95A1",
                            display: "inline-flex", alignItems: "center", justifyContent: "center",
                            fontWeight: 800, fontSize: 11, flexShrink: 0,
                          }}>{g}</span>
                          <span style={{ fontSize: 11, color: "#8B95A1", flexShrink: 0, minWidth: 28 }}>{r}%</span>
                          {isOv && <span title="수동 수정됨" style={{ fontSize: 9, fontWeight: 800, color: ORANGE, padding: "1px 5px", borderRadius: 4, background: "#FFF7ED", flexShrink: 0 }}>수정</span>}
                          <span style={{ flex: 1, textAlign: "right", fontSize: 13, fontWeight: isSel ? 800 : 600, color: isSel ? NAVY : (isOv ? ORANGE : "#4E5968") }}>
                            {p > 0 ? `${Math.round(p).toLocaleString()}원` : "—"}
                          </span>
                        </button>
                      );
                    })}
                  </div>
                </div>

                {/* 최종 단가 (선택된 등급) */}
                <div style={{ padding: 12 }}>
                  <div className="price-highlight">
                    <div style={{ display: "flex", justifyContent: "center", marginBottom: 8 }}>
                      <span style={{ fontSize: 11, fontWeight: 700, color: "#fff", background: "rgba(249,115,22,0.95)", padding: "3px 10px", borderRadius: 100, letterSpacing: 0.5 }}>
                        {activeProd.selectedGrade || "A"}급 선택
                      </span>
                    </div>
                    <div style={{ fontSize: 11, color: "#93C5FD", marginBottom: 4, fontWeight: 500 }}>최종 단가 (1개)</div>
                    <div style={{ fontSize: 30, fontWeight: 900, color: "#fff", letterSpacing: -1 }}>
                      {finalPrice > 0 ? `${Math.round(finalPrice).toLocaleString()}원` : "—"}
                    </div>
                    {finalPrice > 0 && (
                      <>
                        <div style={{ marginTop: 14, paddingTop: 14, borderTop: "1px solid rgba(255,255,255,0.15)" }}>
                          <div style={{ fontSize: 11, color: "#93C5FD", marginBottom: 4 }}>납품가 대비 마진율</div>
                          <div style={{ fontSize: 24, fontWeight: 800, color: ORANGE }}>
                            {(marginAmt / finalPrice * 100).toFixed(1)}%
                          </div>
                        </div>
                        <div style={{ fontSize: 11, color: "rgba(147,197,253,0.65)", marginTop: 10, lineHeight: 1.7 }}>
                          원단 {Math.round(fabricCost/finalPrice*100)}% · 공임비 {Math.round(extraCost/finalPrice*100)}%<br/>
                          관리비 {Math.round(adminAmt/finalPrice*100)}% · 마진 {Math.round(marginAmt/finalPrice*100)}%
                        </div>
                      </>
                    )}
                  </div>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ── 견적서 탭 (애플 내부 보고서 스타일) ── */}
        {tab === "quote" && (
          <div>
            {quote ? (
              <>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, gap: 12, flexWrap: "wrap" }} className="no-print">
                  <div style={{ fontSize: 18, fontWeight: 800, color: "#191F28" }}>견적서 미리보기</div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button
                      onClick={() => setEditingQuote(v => !v)}
                      style={{
                        padding: "10px 18px", border: `1.5px solid ${editingQuote ? ORANGE : "#E5E8EB"}`,
                        borderRadius: 12, background: editingQuote ? "#FFF7ED" : "#fff",
                        color: editingQuote ? ORANGE : "#4E5968", fontSize: 13, fontWeight: 700,
                        cursor: "pointer", fontFamily: "inherit", transition: "all 0.15s",
                      }}>
                      {editingQuote ? "✅ 완료" : "✏️ 수정"}
                    </button>
                    {!editingQuote && <button className="btn-primary" onClick={() => window.print()}>🖨️ PDF 출력</button>}
                  </div>
                </div>
                {editingQuote ? (
                  <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                    <div style={{ fontSize: 12, color: "#8B95A1", padding: "8px 12px", background: "#FFF7ED", borderRadius: 10, border: "1px solid #FED7AA" }}>
                      💡 마크다운 형식으로 편집하세요. <code style={{ background: "#FFE4C4", padding: "1px 5px", borderRadius: 4, fontSize: 11 }}># 제목</code>, <code style={{ background: "#FFE4C4", padding: "1px 5px", borderRadius: 4, fontSize: 11 }}>| 표 |</code>, <code style={{ background: "#FFE4C4", padding: "1px 5px", borderRadius: 4, fontSize: 11 }}>**굵게**</code> 사용 가능
                    </div>
                    <textarea
                      value={quote}
                      onChange={e => setQuote(e.target.value)}
                      style={{
                        width: "100%", minHeight: 520, padding: "18px 20px",
                        border: "1.5px solid #FED7AA", borderRadius: 16, fontSize: 13,
                        lineHeight: 1.7, fontFamily: "'SF Mono', 'Fira Code', 'Menlo', monospace",
                        color: "#334155", background: "#FAFAFA", resize: "vertical",
                        outline: "none", boxShadow: "0 0 0 3px rgba(249,115,22,0.08)",
                      }}
                    />
                    <div style={{ display: "flex", justifyContent: "flex-end", gap: 8 }}>
                      <button onClick={() => setEditingQuote(false)} className="btn-orange" style={{ padding: "11px 24px" }}>
                        ✅ 완료
                      </button>
                    </div>
                  </div>
                ) : (
                  <div className="apple-doc">
                    <AppleMarkdown text={quote} />
                    <div className="apple-doc-footer">
                      본 문서는 참고용이며, 최종 계약 시 담당자 확인이 필요합니다.
                    </div>
                  </div>
                )}
              </>
            ) : (
              <div className="card" style={{ padding: 64, textAlign: "center" }}>
                <div style={{ fontSize: 56, marginBottom: 16 }}>📄</div>
                <div style={{ fontSize: 18, fontWeight: 700, color: "#4E5968", marginBottom: 8 }}>견적서가 아직 없습니다</div>
                <div style={{ fontSize: 14, color: "#B0B8C1", marginBottom: 24 }}>계산기에서 제품 원가를 입력하고 '견적 포함'을 체크한 뒤 견적서를 생성해주세요</div>
                <button className="btn-orange" style={{ padding: "12px 24px", fontSize: 14 }} onClick={() => setTab("calc")}>계산기로 이동 →</button>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
