                          {b.openDate && <span>📅 공고 {b.openDate}</span>}
                          {b.closeDate && <span style={{color:isClosingSoon?"#F04452":"var(--text2)",fontWeight:isClosingSoon?700:400}}>⏰ 마감 {b.closeDate}</span>}
                          {b.awardDate && <span>🎯 개찰 {b.awardDate}</span>}
                          {b.amount && <span>💰 {parseFloat(b.amount).toLocaleString()}원</span>}
                        </div>
                        {b.note && <div style={{fontSize:12,color:"var(--text2)",marginTop:6,padding:"6px 10px",background:"var(--surface2)",borderRadius:6}}>📝 {b.note}</div>}
                        {b.url && <div style={{marginTop:6}}><a href={b.url} target="_blank" rel="noopener noreferrer" style={{fontSize:12,color:"#007AFF"}}>🔗 공고 페이지 열기</a></div>}
                      </div>
                      <div style={{display:"flex",gap:6,flexShrink:0}}>
                        <button onClick={()=>editBid(b)} title="수정" style={{background:"none",border:"none",cursor:"pointer",color:"#007AFF",fontSize:16,padding:4}}>✏️</button>
                        <button onClick={()=>deleteBid(b.id)} title="삭제" style={{background:"none",border:"none",cursor:"pointer",color:"#F04452",fontSize:16,padding:4}}>✕</button>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )
        ) : (
          // 캘린더 뷰
          <div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
              <button onClick={prevMonth} style={{height:36,width:36,borderRadius:8,border:"1px solid var(--border)",background:"none",cursor:"pointer",fontSize:14,color:"var(--text2)",fontFamily:"inherit"}}>‹</button>
              <div style={{fontSize:18,fontWeight:700,color:"var(--text1)"}}>{calMonth.replace("-","년 ")}월</div>
              <button onClick={nextMonth} style={{height:36,width:36,borderRadius:8,border:"1px solid var(--border)",background:"none",cursor:"pointer",fontSize:14,color:"var(--text2)",fontFamily:"inherit"}}>›</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,background:"var(--divider)",border:"1px solid var(--divider)",borderRadius:8,overflow:"hidden"}}>
              {["일","월","화","수","목","금","토"].map((d,i)=>(
                <div key={d} style={{padding:"8px 4px",textAlign:"center",fontSize:12,fontWeight:700,background:"var(--surface2)",color:i===0?"#F04452":i===6?"#007AFF":"var(--text2)"}}>{d}</div>
              ))}
              {calData.map((cell, i) => (
                <div key={i} style={{minHeight:80,padding:6,background:"var(--surface)",position:"relative"}}>
                  {cell && (
                    <>
                      <div style={{fontSize:11,fontWeight:700,color:cell.dateStr===today?"#FF9500":"var(--text2)",marginBottom:4}}>{cell.date}{cell.dateStr===today?" (오늘)":""}</div>
                      <div style={{display:"flex",flexDirection:"column",gap:2}}>
                        {cell.bids.slice(0,3).map(b => {
                          const isOpen = b.openDate === cell.dateStr;
                          const isClose = b.closeDate === cell.dateStr;
                          const isAward = b.awardDate === cell.dateStr;
                          const label = isClose ? "마감" : isOpen ? "공고" : "개찰";
                          return (
                            <div key={b.id+label} onClick={()=>editBid(b)} title={`${b.title} (${label})`} style={{fontSize:10,padding:"2px 5px",borderRadius:4,background:statColor(b.status)+"22",color:statColor(b.status),fontWeight:600,cursor:"pointer",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{label} · {b.title.slice(0,8)}</div>
                          );
                        })}
                        {cell.bids.length > 3 && <div style={{fontSize:10,color:"var(--text3)",fontWeight:600}}>+{cell.bids.length-3}</div>}
                      </div>
                    </>
                  )}
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function NewsTab({ darkMode }) {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState("");
  const [feedKey, setFeedKey] = useState("ko-economy");
  const [lastFetch, setLastFetch] = useState(null);

  // RSS feeds (rss2json 무료 API 경유 - CORS 우회)
  const FEEDS = {
    "ko-economy": { name: "한국 경제 뉴스", url: "https://news.google.com/rss/search?q=경제+OR+제조업+OR+수출&hl=ko&gl=KR&ceid=KR:ko" },
    "fr-safety": { name: "방염/방화복 동향", url: "https://news.google.com/rss/search?q=방염+OR+난연+OR+방화복+OR+소방복+OR+산업안전&hl=ko&gl=KR&ceid=KR:ko" },
    "fr-industry": { name: "조선/플랜트/석유화학", url: "https://news.google.com/rss/search?q=조선+OR+플랜트+OR+석유화학+안전&hl=ko&gl=KR&ceid=KR:ko" },
    "global-fr": { name: "Global FR Industry", url: "https://news.google.com/rss/search?q=flame+resistant+workwear+OR+FR+clothing&hl=en&gl=US&ceid=US:en" },
  };

  const fetchFeed = async (key) => {
    setLoading(true);
    setError("");
    try {
      const cacheKey = `frw_news_${key}`;
      const cache = load(cacheKey, null);
      const now = Date.now();
      // 1시간 캐시
      if (cache && cache.ts && (now - cache.ts) < 3600000) {
        setItems(cache.items);
        setLastFetch(new Date(cache.ts));
        setLoading(false);
        return;
      }
      const feed = FEEDS[key];
      const url = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed.url)}`;
      const res = await fetch(url);
      const data = await res.json();
      if (data.status !== "ok") throw new Error(data.message || "Feed load failed");
      const newItems = (data.items || []).map(it => ({
        title: it.title,
        link: it.link,
        date: it.pubDate,
        desc: (it.description || "").replace(/<[^>]+>/g, "").slice(0, 200),
        source: it.author || "",
      }));
      setItems(newItems);
      setLastFetch(new Date());
      save(cacheKey, { ts: now, items: newItems });
    } catch (e) {
      setError("뉴스를 불러올 수 없습니다: " + e.message);
      setItems([]);
    } finally {
      setLoading(false);
    }
  };

  useEffect(() => { fetchFeed(feedKey); }, [feedKey]);

  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <div className="card">
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,flexWrap:"wrap"}}>
          <div style={{fontSize:15,fontWeight:700,color:"var(--text1)"}}>📰 산업/경제 뉴스</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginLeft:10}}>
            {Object.entries(FEEDS).map(([k,v]) => (
              <button key={k} onClick={()=>setFeedKey(k)} style={{padding:"6px 12px",borderRadius:8,border:"none",background:feedKey===k?"#475569":"var(--surface2)",color:feedKey===k?"#fff":"var(--text2)",fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{v.name}</button>
            ))}
          </div>
          <div style={{flex:1}}/>
          <button onClick={()=>{ const cacheKey = `frw_news_${feedKey}`; save(cacheKey, null); fetchFeed(feedKey); }} style={{padding:"6px 12px",borderRadius:8,border:"1px solid var(--border)",background:"none",color:"var(--text2)",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>🔄 새로고침</button>
        </div>
        {lastFetch && <div style={{fontSize:11,color:"var(--text3)",marginBottom:10}}>마지막 갱신: {lastFetch.toLocaleString("ko-KR")} (1시간 캐시)</div>}
        {loading ? (
          <div style={{textAlign:"center",padding:"40px 24px",color:"var(--text3)",fontSize:14}}>⏳ 뉴스 불러오는 중...</div>
        ) : error ? (
          <div style={{padding:"20px",background:"rgba(240,68,82,0.08)",borderRadius:10,color:"#F04452",fontSize:13}}>{error}<div style={{fontSize:11,marginTop:6,color:"var(--text2)"}}>네트워크 또는 외부 RSS 서비스 문제일 수 있습니다. 새로고침 버튼을 눌러보세요.</div></div>
        ) : items.length === 0 ? (
          <div style={{textAlign:"center",padding:"40px 24px",color:"var(--text3)",fontSize:14}}>표시할 뉴스가 없습니다</div>
        ) : (
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {items.map((it, i) => (
              <a key={i} href={it.link} target="_blank" rel="noopener noreferrer" style={{textDecoration:"none",color:"inherit",display:"block"}}>
                <div style={{padding:"14px 16px",borderRadius:12,border:"1px solid var(--border)",background:"var(--surface)",cursor:"pointer",transition:"background 0.15s"}}
                  onMouseEnter={e=>e.currentTarget.style.background="var(--surface2)"}
                  onMouseLeave={e=>e.currentTarget.style.background="var(--surface)"}
                >
                  <div style={{fontSize:14,fontWeight:700,color:"var(--text1)",lineHeight:1.4,marginBottom:4}}>{it.title}</div>
                  {it.desc && <div style={{fontSize:12,color:"var(--text2)",lineHeight:1.6,marginBottom:6,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{it.desc}</div>}
                  <div style={{fontSize:11,color:"var(--text3)",display:"flex",gap:8,alignItems:"center"}}>
                    <span>📅 {it.date ? new Date(it.date).toLocaleString("ko-KR",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}) : ""}</span>
                    {it.source && <span>· {it.source}</span>}
                    <span style={{marginLeft:"auto",color:"#007AFF",fontWeight:600}}>원문 보기 →</span>
                  </div>
                </div>
              </a>
            ))}
          </div>
        )}
        <div style={{fontSize:11,color:"var(--text3)",marginTop:14,padding:"10px 12px",background:"var(--surface2)",borderRadius:8,lineHeight:1.6}}>
          ℹ️ 뉴스는 Google News RSS를 rss2json 서비스를 통해 가져옵니다. 1시간 단위로 자동 갱신되며, 새로고침 버튼으로 즉시 갱신할 수 있습니다.
        </div>
      </div>
    </div>
  );
}

// ─── 회사 필요 파일 탭 ───
function CompanyFilesTab({ companyFiles, setCompanyFiles, loaded = true, darkMode, T }) {
  const subtabs = companyFiles.subtabs || [];
  const localItems = companyFiles.items || {};
  const [activeSub, setActiveSub] = React.useState(() => subtabs[0]?.id || "general");
  const [renamingId, setRenamingId] = React.useState(null);
  const [renameValue, setRenameValue] = React.useState("");
  const [dragActive, setDragActive] = React.useState(false);
  const [search, setSearch] = React.useState("");
  const [previewFile, setPreviewFile] = React.useState(null);
  const fileInputRef = React.useRef(null);

  // ── Google Drive 연동 ──
  const [driveToken, setDriveToken] = React.useState(() => {
    try { const t = JSON.parse(sessionStorage.getItem("frw_drive_token") || "null"); return (t && t.expires_at && Date.now() < t.expires_at - 30000) ? t : null; } catch { return null; }
  });
  const [driveProfile, setDriveProfile] = React.useState(null);
  const [driveBusy, setDriveBusy] = React.useState(false);
  const [driveError, setDriveError] = React.useState("");
  const [driveRootId, setDriveRootId] = React.useState(() => localStorage.getItem("frw_drive_root_id"));
  const [driveSubFolderIds, setDriveSubFolderIds] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem("frw_drive_subfolders") || "{}"); } catch { return {}; }
  });
  const [driveItems, setDriveItems] = React.useState({});
  const driveTokenClientRef = React.useRef(null);
  const driveConnected = !!(driveToken && driveToken.access_token && Date.now() < driveToken.expires_at - 30000);

  React.useEffect(() => {
    const tryInit = () => {
      if (window.google?.accounts?.oauth2 && !driveTokenClientRef.current) {
        driveTokenClientRef.current = window.google.accounts.oauth2.initTokenClient({
          client_id: GMAIL_CLIENT_ID, scope: DRIVE_SCOPES,
          callback: (resp) => {
            if (resp.error) { setDriveError("로그인 실패: " + resp.error); return; }
            const t = { access_token: resp.access_token, expires_at: Date.now() + (parseInt(resp.expires_in || 3600) * 1000) };
            setDriveToken(t); sessionStorage.setItem("frw_drive_token", JSON.stringify(t)); setDriveError("");
          },
          error_callback: (err) => setDriveError("로그인 오류: " + (err.message || JSON.stringify(err))),
        });
      }
    };
    tryInit();
    if (!driveTokenClientRef.current) {
      const id = setInterval(() => { tryInit(); if (driveTokenClientRef.current) clearInterval(id); }, 200);
      return () => clearInterval(id);
    }
  }, []);

  // 프로필 로드
  React.useEffect(() => {
    if (!driveConnected || driveProfile) return;
    fetch("https://www.googleapis.com/oauth2/v2/userinfo", { headers: { Authorization: `Bearer ${driveToken.access_token}` } })
      .then(r => r.ok ? r.json() : null).then(p => p && setDriveProfile(p)).catch(() => {});
  }, [driveConnected]);

  const driveSignIn = () => {
    setDriveError("");
    if (!driveTokenClientRef.current) { setDriveError("Google 로그인 라이브러리 로딩 중..."); return; }
    driveTokenClientRef.current.requestAccessToken({ prompt: driveToken ? "" : "consent" });
  };
  const driveSignOut = () => {
    if (driveToken && window.google?.accounts?.oauth2) window.google.accounts.oauth2.revoke(driveToken.access_token, () => {});
    sessionStorage.removeItem("frw_drive_token");
    setDriveToken(null); setDriveProfile(null); setDriveItems({});
  };

  const driveApi = async (path, opts = {}) => {
    if (!driveConnected) throw new Error("Drive 미연결");
    const url = path.startsWith("http") ? path : `https://www.googleapis.com/${path}`;
    const r = await fetch(url, { ...opts, headers: { ...opts.headers, Authorization: `Bearer ${driveToken.access_token}` } });
    if (!r.ok) {
      if (r.status === 401) { driveSignOut(); throw new Error("Drive 인증 만료 — 다시 연결해 주세요"); }
      const txt = await r.text().catch(() => "");
      throw new Error(`Drive API ${r.status}: ${txt.slice(0, 200)}`);
    }
    return r;
  };

  const ensureRootFolder = async () => {
    if (driveRootId) {
      try {
        const r = await driveApi(`drive/v3/files/${driveRootId}?fields=id,trashed`);
        const d = await r.json();
        if (d.id && !d.trashed) return driveRootId;
      } catch {}
    }
    const q = `name='${DRIVE_ROOT_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false`;
    const r = await driveApi(`drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name)`);
    const data = await r.json();
    let id = data.files?.[0]?.id;
    if (!id) {
      const r2 = await driveApi("drive/v3/files", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: DRIVE_ROOT_NAME, mimeType: "application/vnd.google-apps.folder" }),
      });
      id = (await r2.json()).id;
    }
    setDriveRootId(id); localStorage.setItem("frw_drive_root_id", id);
    return id;
  };

  const ensureSubFolder = async (subtabId, subtabName) => {
    if (driveSubFolderIds[subtabId]) {
      try {
        const r = await driveApi(`drive/v3/files/${driveSubFolderIds[subtabId]}?fields=id,trashed,name`);
        const d = await r.json();
        if (d.id && !d.trashed) return driveSubFolderIds[subtabId];
      } catch {}
    }
    const rootId = await ensureRootFolder();
    const safeName = subtabName.replace(/'/g, "\\'");
    const q = `'${rootId}' in parents and name='${safeName}' and mimeType='application/vnd.google-apps.folder' and trashed=false`;
    const r = await driveApi(`drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name)`);
    const data = await r.json();
    let id = data.files?.[0]?.id;
    if (!id) {
      const r2 = await driveApi("drive/v3/files", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: subtabName, mimeType: "application/vnd.google-apps.folder", parents: [rootId] }),
      });
      id = (await r2.json()).id;
    }
    const next = { ...driveSubFolderIds, [subtabId]: id };
    setDriveSubFolderIds(next); localStorage.setItem("frw_drive_subfolders", JSON.stringify(next));
    return id;
  };

  const loadDriveSubtab = async (subtabId, subtabName) => {
    setDriveBusy(true); setDriveError("");
    try {
      const folderId = await ensureSubFolder(subtabId, subtabName);
      const r = await driveApi(`drive/v3/files?q=%27${folderId}%27%20in%20parents%20and%20trashed=false&fields=files(id,name,mimeType,size,modifiedTime,webViewLink,thumbnailLink)&orderBy=modifiedTime desc&pageSize=1000`);
      const data = await r.json();
      const files = (data.files || []).map(f => ({
        id: f.id, name: f.name, type: f.mimeType || "", size: parseInt(f.size || 0),
        uploadedAt: f.modifiedTime ? new Date(f.modifiedTime).getTime() : Date.now(),
        driveId: f.id, webViewLink: f.webViewLink, thumbnailLink: f.thumbnailLink,
      }));
      setDriveItems(prev => ({ ...prev, [subtabId]: files }));
    } catch (e) { setDriveError(e.message || String(e)); }
    finally { setDriveBusy(false); }
  };

  React.useEffect(() => {
    if (!subtabs.find(s => s.id === activeSub) && subtabs[0]) setActiveSub(subtabs[0].id);
  }, [companyFiles]);

  React.useEffect(() => {
    if (driveConnected && activeSub) {
      const s = subtabs.find(x => x.id === activeSub);
      if (s) loadDriveSubtab(activeSub, s.name);
    }
  }, [driveConnected, activeSub]);

  if (!loaded) {
    return <div className="card" style={{ textAlign: "center", padding: "60px 20px", color: T.text2, fontSize: 14 }}>📂 파일 불러오는 중...</div>;
  }
  const items = driveConnected ? driveItems : localItems;

  const totalBytes = React.useMemo(() => {
    let n = 0;
    Object.values(items).forEach(arr => (arr || []).forEach(f => { n += (f.size || 0); }));
    return n;
  }, [items]);
  const fmtSize = (b) => {
    if (b < 1024) return b + " B";
    if (b < 1024 * 1024) return (b / 1024).toFixed(1) + " KB";
    return (b / 1024 / 1024).toFixed(2) + " MB";
  };

  const addSubtab = () => {
    const name = window.prompt("새 카테고리 이름을 입력하세요");
    if (!name || !name.trim()) return;
    const id = "sub_" + Date.now() + "_" + Math.random().toString(36).slice(2, 7);
    setCompanyFiles(prev => ({
      ...prev,
      subtabs: [...(prev.subtabs || []), { id, name: name.trim() }],
      items: { ...(prev.items || {}), [id]: [] },
    }));
    setActiveSub(id);
  };
  const startRenameSubtab = (s) => { setRenamingId(s.id); setRenameValue(s.name); };
  const commitRenameSubtab = () => {
    if (!renamingId) return;
    const v = renameValue.trim();
    if (!v) { setRenamingId(null); return; }
    setCompanyFiles(prev => ({
      ...prev,
      subtabs: (prev.subtabs || []).map(s => s.id === renamingId ? { ...s, name: v } : s),
    }));
    setRenamingId(null);
  };
  const deleteSubtab = (s) => {
    if (subtabs.length <= 1) { alert("최소 1개의 카테고리는 유지되어야 합니다."); return; }
    const cnt = (items[s.id] || []).length;
    if (!window.confirm(`"${s.name}" 카테고리를 삭제하시겠습니까?${cnt > 0 ? `\n포함된 파일 ${cnt}개도 함께 삭제됩니다.` : ""}`)) return;
    setCompanyFiles(prev => {
      const nextItems = { ...(prev.items || {}) };
      delete nextItems[s.id];
      return { ...prev, subtabs: (prev.subtabs || []).filter(x => x.id !== s.id), items: nextItems };
    });
  };

  const readFileAsDataURL = (file) => new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
  const handleFiles = async (fileList) => {
    if (!fileList || fileList.length === 0) return;
    const arr = Array.from(fileList);
    if (driveConnected) {
      setDriveBusy(true); setDriveError("");
      try {
        const sub = subtabs.find(s => s.id === activeSub);
        const folderId = await ensureSubFolder(activeSub, sub.name);
        for (const file of arr) {
          const meta = { name: file.name, parents: [folderId] };
          const boundary = "frw_b_" + Math.random().toString(36).slice(2);
          const head = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(meta)}\r\n--${boundary}\r\nContent-Type: ${file.type || "application/octet-stream"}\r\n\r\n`;
          const tail = `\r\n--${boundary}--`;
          const body = new Blob([head, file, tail], { type: `multipart/related; boundary=${boundary}` });
          await driveApi("upload/drive/v3/files?uploadType=multipart", {
            method: "POST", headers: { "Content-Type": `multipart/related; boundary=${boundary}` }, body,
          });
        }
        await loadDriveSubtab(activeSub, sub.name);
      } catch (e) { alert("Drive 업로드 실패: " + e.message); setDriveError(e.message); }
      finally { setDriveBusy(false); }
      return;
    }
    const oversized = arr.filter(f => f.size > 8 * 1024 * 1024);
    if (oversized.length > 0) {
      if (!window.confirm(`${oversized.length}개 파일이 8MB를 초과합니다.\n브라우저 저장 공간이 빠르게 찰 수 있습니다.\n계속 진행하시겠습니까?`)) return;
    }
    const newFiles = [];
    for (const f of arr) {
      try {
        const dataUrl = await readFileAsDataURL(f);
        newFiles.push({
          id: "f_" + Date.now() + "_" + Math.random().toString(36).slice(2, 7),
          name: f.name, type: f.type || "", size: f.size || 0,
          dataUrl, uploadedAt: Date.now(),
        });
      } catch (e) {
        alert(`"${f.name}" 파일을 읽지 못했습니다.`);
      }
    }
    if (newFiles.length === 0) return;
    setCompanyFiles(prev => {
      const list = (prev.items || {})[activeSub] || [];
      return { ...prev, items: { ...(prev.items || {}), [activeSub]: [...newFiles, ...list] } };
    });
  };
  const deleteFile = async (id) => {
    if (!window.confirm(driveConnected ? "파일을 삭제하시겠습니까? (Google Drive에서도 영구 삭제됩니다)" : "파일을 삭제하시겠습니까?")) return;
    if (driveConnected) {
      setDriveBusy(true);
      try {
        await driveApi(`drive/v3/files/${id}`, { method: "DELETE" });
        const sub = subtabs.find(s => s.id === activeSub);
        if (sub) await loadDriveSubtab(activeSub, sub.name);
      } catch (e) { alert("Drive 삭제 실패: " + e.message); }
      finally { setDriveBusy(false); }
      return;
    }
    setCompanyFiles(prev => {
      const list = (prev.items || {})[activeSub] || [];
      return { ...prev, items: { ...(prev.items || {}), [activeSub]: list.filter(f => f.id !== id) } };
    });
  };
  const downloadFile = async (f) => {
    if (driveConnected && f.driveId) {
      try {
        const r = await driveApi(`drive/v3/files/${f.driveId}?alt=media`);
        const blob = await r.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a"); a.href = url; a.download = f.name;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 2000);
      } catch (e) { alert("Drive 다운로드 실패: " + e.message); }
      return;
    }
    const a = document.createElement("a");
    a.href = f.dataUrl; a.download = f.name;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  };
  const renameFile = async (f) => {
    const v = window.prompt("새 파일명을 입력하세요", f.name);
    if (!v || !v.trim()) return;
    if (driveConnected && f.driveId) {
      setDriveBusy(true);
      try {
        await driveApi(`drive/v3/files/${f.driveId}`, {
          method: "PATCH", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: v.trim() }),
        });
        const sub = subtabs.find(s => s.id === activeSub);
        if (sub) await loadDriveSubtab(activeSub, sub.name);
      } catch (e) { alert("이름 변경 실패: " + e.message); }
      finally { setDriveBusy(false); }
      return;
    }
    setCompanyFiles(prev => {
      const list = (prev.items || {})[activeSub] || [];
      return { ...prev, items: { ...(prev.items || {}), [activeSub]: list.map(x => x.id === f.id ? { ...x, name: v.trim() } : x) } };
    });
  };

  const dataUrlToFile = async (dataUrl, filename, mimeType) => {
    const res = await fetch(dataUrl);
    const blob = await res.blob();
    return new File([blob], filename, { type: mimeType || blob.type || "application/octet-stream" });
  };
  const shareFile = async (f) => {
    try {
      // Drive 모드: 공유 링크 생성 (anyone with link, viewer)
      if (driveConnected && f.driveId) {
        try {
          await driveApi(`drive/v3/files/${f.driveId}/permissions`, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ role: "reader", type: "anyone" }),
          });
        } catch (e) { /* 이미 있으면 무시 */ }
        const r = await driveApi(`drive/v3/files/${f.driveId}?fields=webViewLink`);
        const link = (await r.json()).webViewLink;
        if (navigator.share) {
          try { await navigator.share({ title: f.name, text: f.name, url: link }); return; }
          catch (e) { if (e.name === "AbortError") return; }
        }
        try { await navigator.clipboard.writeText(link); alert("📋 공유 링크가 클립보드에 복사되었습니다.\n\n" + link); }
        catch { window.prompt("공유 링크를 복사하세요:", link); }
        return;
      }
      // 로컬 모드: 파일 자체 공유 (Web Share API)
      const file = await dataUrlToFile(f.dataUrl, f.name, f.type);
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: f.name, text: f.name });
        return;
      }
      if (navigator.share) {
        await navigator.share({ title: f.name, text: `${f.name} 파일을 공유합니다.` });
        return;
      }
      const subject = encodeURIComponent(`[파일 공유] ${f.name}`);
      const body = encodeURIComponent(`${f.name}\n(${fmtSize(f.size)})\n\n첨부파일은 다운로드 후 메일에 직접 첨부해 주세요.`);
      if (window.confirm("이 브라우저는 직접 파일 공유를 지원하지 않습니다.\n파일을 다운로드한 뒤 메일 앱을 여시겠습니까?")) {
        downloadFile(f);
        window.location.href = `mailto:?subject=${subject}&body=${body}`;
      }
    } catch (e) {
      if (e && e.name !== "AbortError") alert("공유에 실패했습니다: " + (e.message || e));
    }
  };

  const fileIcon = (f) => {
    const t = (f.type || "").toLowerCase();
    if (t.startsWith("image/")) return "🖼";
    if (t.includes("pdf")) return "📕";
    if (t.includes("sheet") || t.includes("excel") || /\.xlsx?$/i.test(f.name)) return "📊";
    if (t.includes("word") || /\.docx?$/i.test(f.name)) return "📄";
    if (t.includes("zip") || /\.(zip|7z|rar)$/i.test(f.name)) return "🗜";
    if (t.startsWith("video/")) return "🎬";
    if (t.startsWith("audio/")) return "🎵";
    return "📎";
  };

  const currentList = items[activeSub] || [];
  const filtered = search.trim() ? currentList.filter(f => f.name.toLowerCase().includes(search.trim().toLowerCase())) : currentList;
  const sizeLimit = 4.5 * 1024 * 1024;
  const sizeWarn = totalBytes > sizeLimit;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <div className="card">
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10, marginBottom: 14 }}>
          <div>
            <div style={{ fontSize: 20, fontWeight: 800, color: T.text }}>📎 회사 필요 파일{driveConnected && <span style={{ fontSize: 11, marginLeft: 10, padding: "3px 10px", borderRadius: 999, background: "#10B981", color: "#fff", fontWeight: 700, verticalAlign: "middle" }}>☁️ Drive 연동</span>}</div>
            <div style={{ fontSize: 12, color: T.text2, marginTop: 4 }}>{driveConnected ? `Google Drive 「${DRIVE_ROOT_NAME}」 폴더에 영구 저장 · 어디서든 동기화` : "카테고리별로 파일을 보관하세요. 우측 「Drive 연동」으로 전환하면 무제한 저장."}</div>
          </div>
          {!driveConnected ? (
            <div style={{ fontSize: 11, color: sizeWarn ? "#FF9500" : T.text2, fontWeight: 600 }}>
              로컬 사용량 {fmtSize(totalBytes)}{sizeWarn && " · ⚠️ 한계 근접"}
            </div>
          ) : (
            <div style={{ fontSize: 11, color: T.text2, fontWeight: 600, textAlign: "right" }}>
              {driveProfile && <div>👤 {driveProfile.name || driveProfile.email}</div>}
              {driveBusy && <div style={{ color: "#007AFF", marginTop: 2 }}>⏳ Drive 작업 중...</div>}
            </div>
          )}
        </div>

        {/* Google Drive 연동 바 */}
        <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", borderRadius: 12, marginBottom: 14, background: driveConnected ? (darkMode ? "rgba(16,185,129,0.10)" : "rgba(16,185,129,0.06)") : T.surface2, border: `1.5px solid ${driveConnected ? "rgba(16,185,129,0.35)" : T.divider}`, flexWrap: "wrap" }}>
          <div style={{ fontSize: 22 }}>{driveConnected ? "✅" : "☁️"}</div>
          <div style={{ flex: 1, minWidth: 200 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: T.text }}>{driveConnected ? "Google Drive 연결됨" : "Google Drive에 연결하면 무제한 저장 · 디바이스 동기화 · 공유 링크 생성"}</div>
            {driveError && <div style={{ fontSize: 11, color: "#F04452", marginTop: 4 }}>⚠️ {driveError}</div>}
            {!driveConnected && <div style={{ fontSize: 11, color: T.text2, marginTop: 2 }}>연결 시 Drive 안에 「{DRIVE_ROOT_NAME}」 폴더가 자동 생성되고, 카테고리별 하위 폴더로 정리됩니다.</div>}
          </div>
          {driveConnected ? (
            <button onClick={driveSignOut} style={{ padding: "8px 14px", borderRadius: 8, border: `1px solid ${T.divider}`, background: "transparent", color: T.text2, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>연결 해제</button>
          ) : (
            <button onClick={driveSignIn} style={{ padding: "9px 18px", borderRadius: 8, border: "none", background: "#10B981", color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>🔗 Google Drive 연결</button>
          )}
        </div>

        {/* 서브탭 (카테고리) */}
        <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap", paddingBottom: 12, borderBottom: `1px solid ${T.divider}` }}>
          {subtabs.map(s => {
            const active = s.id === activeSub;
            const isRen = renamingId === s.id;
            const cnt = (items[s.id] || []).length;
            if (isRen) {
              return (
                <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 4, padding: "4px 6px", borderRadius: 8, background: T.surface2, border: `1.5px solid #007AFF` }}>
                  <input value={renameValue} onChange={e => setRenameValue(e.target.value)} autoFocus
                    onKeyDown={e => { if (e.key === "Enter") commitRenameSubtab(); if (e.key === "Escape") setRenamingId(null); }}
                    style={{ height: 28, fontSize: 12, padding: "0 6px", width: 120 }} />
                  <button onClick={commitRenameSubtab} style={{ background: "#007AFF", color: "#fff", border: "none", borderRadius: 6, padding: "4px 8px", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>저장</button>
                  <button onClick={() => setRenamingId(null)} style={{ background: "none", border: "none", color: T.text2, fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>취소</button>
                </div>
              );
            }
            return (
              <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 2, padding: "6px 4px 6px 12px", borderRadius: 999, background: active ? "#007AFF" : T.surface2, border: `1.5px solid ${active ? "#007AFF" : T.divider}`, transition: "all 0.15s" }}>
                <button onClick={() => setActiveSub(s.id)}
                  style={{ background: "none", border: "none", color: active ? "#fff" : T.text, fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", padding: 0 }}>
                  {s.name} <span style={{ fontSize: 11, fontWeight: 500, opacity: 0.75, marginLeft: 4 }}>{cnt}</span>
                </button>
                <button onClick={() => startRenameSubtab(s)} title="이름 변경" style={{ background: "none", border: "none", color: active ? "rgba(255,255,255,0.85)" : T.text2, cursor: "pointer", fontSize: 11, padding: "2px 4px", fontFamily: "inherit" }}>✏</button>
                <button onClick={() => deleteSubtab(s)} title="삭제" style={{ background: "none", border: "none", color: active ? "rgba(255,255,255,0.85)" : T.text2, cursor: "pointer", fontSize: 12, padding: "2px 6px 2px 2px", fontFamily: "inherit" }}>×</button>
              </div>
            );
          })}
          <button onClick={addSubtab} style={{ display: "inline-flex", alignItems: "center", gap: 4, padding: "6px 12px", borderRadius: 999, background: "transparent", border: `1.5px dashed ${T.divider}`, color: T.text2, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>+ 카테고리</button>
        </div>

        {/* 업로드 영역 */}
        <div style={{ marginTop: 14 }}>
          <input type="file" ref={fileInputRef} multiple style={{ display: "none" }}
            onChange={e => { handleFiles(e.target.files); e.target.value = ""; }} />
          <div
            onDragEnter={e => { e.preventDefault(); e.stopPropagation(); setDragActive(true); }}
            onDragOver={e => { e.preventDefault(); e.stopPropagation(); if (!dragActive) setDragActive(true); }}
            onDragLeave={e => { e.preventDefault(); e.stopPropagation(); if (!e.currentTarget.contains(e.relatedTarget)) setDragActive(false); }}
            onDrop={e => { e.preventDefault(); e.stopPropagation(); setDragActive(false); handleFiles(e.dataTransfer?.files); }}
            onClick={() => fileInputRef.current?.click()}
            style={{
              display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 8,
              padding: "22px 14px", borderRadius: 14,
              border: dragActive ? "2.5px dashed #007AFF" : `2px dashed ${T.divider}`,
              background: dragActive ? (darkMode ? "rgba(0,122,255,0.16)" : "rgba(0,122,255,0.06)") : T.surface2,
              cursor: "pointer", transition: "all 0.15s",
            }}>
            <div style={{ fontSize: 28, lineHeight: 1 }}>{dragActive ? "📥" : "📂"}</div>
            <div style={{ fontSize: 14, fontWeight: 700, color: dragActive ? "#007AFF" : T.text }}>
              {dragActive ? "여기에 놓으세요" : "파일 첨부 (드래그 또는 클릭)"}
            </div>
            <div style={{ fontSize: 11, color: T.text2 }}>여러 파일 동시 업로드 가능 · 모든 형식 지원</div>
          </div>
        </div>
      </div>

      {/* 파일 목록 */}
      <div className="card">
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12, flexWrap: "wrap" }}>
          <div style={{ fontSize: 14, fontWeight: 800, color: T.text }}>
            📁 {subtabs.find(s => s.id === activeSub)?.name || "—"}
            <span style={{ fontSize: 12, fontWeight: 600, color: T.text2, marginLeft: 8 }}>({currentList.length}개)</span>
          </div>
          <div style={{ flex: 1 }} />
          <input placeholder="🔍 파일명 검색" value={search} onChange={e => setSearch(e.target.value)}
            style={{ height: 36, fontSize: 12, width: 200, maxWidth: "100%" }} />
        </div>
        {driveConnected && driveBusy && currentList.length === 0 ? (
          <div style={{ textAlign: "center", padding: "40px 20px", color: T.text2, fontSize: 13 }}>⏳ Google Drive에서 파일 목록 불러오는 중...</div>
        ) : filtered.length === 0 ? (
          <div style={{ textAlign: "center", padding: "40px 20px", color: T.text2, fontSize: 13, lineHeight: 1.7 }}>
            {currentList.length === 0
              ? <>이 카테고리에 등록된 파일이 없습니다.<br />위에서 파일을 첨부하세요.</>
              : "검색 결과가 없습니다."}
          </div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {filtered.map((f, idx) => {
              const isImg = (f.type || "").startsWith("image/");
              const isPdf = (f.type || "").includes("pdf") || /\.pdf$/i.test(f.name);
              const canPrev = isImg || isPdf || !!f.driveId;
              return (
                <div key={f.id} onClick={() => canPrev && setPreviewFile(f)}
                  style={{ background: T.surface2, borderRadius: 10, padding: "10px 12px", border: `1px solid ${T.divider}`, display: "flex", alignItems: "center", gap: 12, minWidth: 0, cursor: canPrev ? "pointer" : "default", transition: "background 0.12s" }}
                  onMouseEnter={e => { if (canPrev) e.currentTarget.style.background = darkMode ? "rgba(0,122,255,0.10)" : "rgba(0,122,255,0.05)"; }}
                  onMouseLeave={e => { e.currentTarget.style.background = T.surface2; }}>
                  <div style={{ fontSize: 11, color: T.text2, fontWeight: 600, width: 24, textAlign: "right", flexShrink: 0 }}>{idx + 1}</div>
                  {isImg ? (
                    <img src={f.dataUrl} alt={f.name} style={{ width: 44, height: 44, objectFit: "cover", borderRadius: 8, flexShrink: 0, background: T.surface, border: `1px solid ${T.divider}` }} />
                  ) : (
                    <div style={{ width: 44, height: 44, borderRadius: 8, background: T.surface, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, flexShrink: 0, border: `1px solid ${T.divider}` }}>{fileIcon(f)}</div>
                  )}
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div title={f.name} style={{ fontSize: 13, fontWeight: 700, color: T.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{f.name}</div>
                    <div style={{ fontSize: 11, color: T.text2, marginTop: 2 }}>{fmtSize(f.size)} · {new Date(f.uploadedAt).toLocaleDateString("ko-KR")}{canPrev && <span style={{ marginLeft: 8, color: "#007AFF" }}>· 클릭하여 미리보기</span>}</div>
                  </div>
                  <div style={{ display: "flex", gap: 4, flexShrink: 0 }} onClick={e => e.stopPropagation()}>
                    {canPrev && (
                      <button onClick={() => setPreviewFile(f)} title="미리보기" style={{ padding: "7px 10px", borderRadius: 8, border: `1px solid ${T.divider}`, background: "transparent", color: "#007AFF", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>👁</button>
                    )}
                    <button onClick={() => shareFile(f)} title="공유 (카톡·메일·메시지)" style={{ padding: "7px 10px", borderRadius: 8, border: `1px solid ${T.divider}`, background: "transparent", color: "#10B981", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>📤</button>
                    <button onClick={() => downloadFile(f)} title="다운로드" style={{ padding: "7px 12px", borderRadius: 8, border: "none", background: "#007AFF", color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>⬇</button>
                    <button onClick={() => renameFile(f)} title="이름 변경" style={{ padding: "7px 10px", borderRadius: 8, border: `1px solid ${T.divider}`, background: "transparent", color: T.text2, fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>✏</button>
                    <button onClick={() => deleteFile(f.id)} title="삭제" style={{ padding: "7px 10px", borderRadius: 8, border: `1px solid ${T.divider}`, background: "transparent", color: "#F04452", fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>✕</button>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* 미리보기 모달 */}
      {previewFile && (() => {
        const f = previewFile;
        const isImg = (f.type || "").startsWith("image/");
        const isPdf = (f.type || "").includes("pdf") || /\.pdf$/i.test(f.name);
        return (
          <div onClick={() => setPreviewFile(null)}
            style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.78)", zIndex: 9999, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
            <div onClick={e => e.stopPropagation()}
              style={{ background: T.surface, borderRadius: 14, width: "min(1100px, 100%)", maxHeight: "92vh", display: "flex", flexDirection: "column", overflow: "hidden", boxShadow: "0 20px 60px rgba(0,0,0,0.4)" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 16px", borderBottom: `1px solid ${T.divider}` }}>
                <div style={{ fontSize: 20 }}>{fileIcon(f)}</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div title={f.name} style={{ fontSize: 14, fontWeight: 700, color: T.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{f.name}</div>
                  <div style={{ fontSize: 11, color: T.text2, marginTop: 2 }}>{fmtSize(f.size)} · {new Date(f.uploadedAt).toLocaleDateString("ko-KR")}</div>
                </div>
                <button onClick={() => shareFile(f)} title="공유 (카톡·메일·메시지)" style={{ padding: "8px 14px", borderRadius: 8, border: "none", background: "#10B981", color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>📤 공유</button>
                <button onClick={() => downloadFile(f)} style={{ padding: "8px 14px", borderRadius: 8, border: "none", background: "#007AFF", color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>⬇ 다운로드</button>
                <button onClick={() => setPreviewFile(null)} style={{ padding: "8px 12px", borderRadius: 8, border: `1px solid ${T.divider}`, background: "transparent", color: T.text2, fontSize: 14, cursor: "pointer", fontFamily: "inherit" }}>✕</button>
              </div>
              <div style={{ flex: 1, overflow: "auto", background: darkMode ? "#0A0A12" : "#F4F4F9", display: "flex", alignItems: "center", justifyContent: "center", minHeight: 300 }}>
                {f.driveId ? (
                  <iframe src={`https://drive.google.com/file/d/${f.driveId}/preview`} title={f.name} allow="autoplay" style={{ width: "100%", height: "82vh", border: "none", background: "#fff" }} />
                ) : (
                  <>
                    {isImg && <img src={f.dataUrl} alt={f.name} style={{ maxWidth: "100%", maxHeight: "82vh", objectFit: "contain" }} />}
                    {isPdf && <iframe src={f.dataUrl} title={f.name} style={{ width: "100%", height: "82vh", border: "none", background: "#fff" }} />}
                    {!isImg && !isPdf && (
                      <div style={{ textAlign: "center", padding: 40, color: T.text2 }}>
                        <div style={{ fontSize: 48, marginBottom: 12 }}>{fileIcon(f)}</div>
                        <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 4 }}>이 형식은 미리보기를 지원하지 않습니다</div>
                        <div style={{ fontSize: 12 }}>다운로드하여 확인해 주세요.</div>
                      </div>
                    )}
                  </>
                )}
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// ─── Gmail 메일 탭 ───
function MailTab({ darkMode, clients = [] }) {
  const [token, setToken] = React.useState(() => {
    try { const t = sessionStorage.getItem("frw_gmail_token"); return t ? JSON.parse(t) : null; } catch { return null; }
  });
  const [profile, setProfile] = React.useState(null);
  const [emails, setEmails] = React.useState([]);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState("");
  const [search, setSearch] = React.useState("");
  const [activeQ, setActiveQ] = React.useState("in:inbox");
  const [viewing, setViewing] = React.useState(null);
  const [composing, setComposing] = React.useState(null); // null | { to, subject, body, replyTo }
  const tokenClientRef = React.useRef(null);

  const FILTERS = [
    { id: "in:inbox", label: "📥 받은 편지함" },
    { id: "is:unread", label: "🔵 안 읽음" },
    { id: "is:starred", label: "⭐ 별표" },
    { id: "in:sent", label: "📤 보낸 편지함" },
    { id: "in:drafts", label: "📝 임시 보관" },
  ];

  // 토큰 만료 체크
  const isTokenValid = (t) => t && t.access_token && t.expires_at && Date.now() < t.expires_at - 30000;

  // GIS 토큰 클라이언트 초기화
  React.useEffect(() => {
    const tryInit = () => {
      if (window.google && window.google.accounts && window.google.accounts.oauth2 && !tokenClientRef.current) {
        tokenClientRef.current = window.google.accounts.oauth2.initTokenClient({
          client_id: GMAIL_CLIENT_ID,
          scope: GMAIL_SCOPES,
          callback: (resp) => {
            if (resp.error) {
              setError("로그인 실패: " + resp.error);
              return;
            }
            const expires_at = Date.now() + (parseInt(resp.expires_in || 3600) * 1000);
            const newToken = { access_token: resp.access_token, expires_at };
            setToken(newToken);
            sessionStorage.setItem("frw_gmail_token", JSON.stringify(newToken));
            setError("");
          },
          error_callback: (err) => setError("로그인 오류: " + (err.message || JSON.stringify(err))),
        });
      }
    };
    tryInit();
    if (!tokenClientRef.current) {
      const id = setInterval(() => { tryInit(); if (tokenClientRef.current) clearInterval(id); }, 200);
      return () => clearInterval(id);
    }
  }, []);

  const signIn = () => {
    setError("");
    if (!tokenClientRef.current) {
      setError("Google 로그인 라이브러리 로딩 중... 잠시 후 다시 시도해주세요.");
      return;
    }
    tokenClientRef.current.requestAccessToken({ prompt: token ? "" : "consent" });
  };

  const signOut = () => {
    if (token && window.google?.accounts?.oauth2) {
      window.google.accounts.oauth2.revoke(token.access_token, () => {});
    }
    sessionStorage.removeItem("frw_gmail_token");
    setToken(null);
    setProfile(null);
    setEmails([]);
    setViewing(null);
  };

  // API 호출 헬퍼
  const gapi = async (path, opts = {}) => {
    if (!isTokenValid(token)) {
      setError("토큰이 만료되었습니다. 다시 로그인해주세요.");
      setToken(null);
      throw new Error("token expired");
    }
    const r = await fetch(`https://gmail.googleapis.com/gmail/v1${path}`, {
      ...opts,
      headers: {
        ...opts.headers,
        Authorization: `Bearer ${token.access_token}`,
      },
    });
    if (!r.ok) {
      if (r.status === 401) {
        setToken(null);
        sessionStorage.removeItem("frw_gmail_token");
        throw new Error("인증 만료");
      }
      const txt = await r.text();
      throw new Error(`API ${r.status}: ${txt.slice(0, 200)}`);
    }
    return r.json();
  };

  // 프로필 + 메일 목록 fetch
  const fetchInbox = React.useCallback(async (q) => {
    if (!isTokenValid(token)) return;
    setLoading(true);
    setError("");
    try {
      if (!profile) {
        const p = await gapi("/users/me/profile");
        setProfile(p);
      }
      const list = await gapi(`/users/me/messages?maxResults=25&q=${encodeURIComponent(q)}`);
      const ids = (list.messages || []).map(m => m.id);
      if (ids.length === 0) { setEmails([]); setLoading(false); return; }
      // 메타데이터만 가져와서 빠르게 (subject, from, date)
      const details = await Promise.all(
        ids.map(id => gapi(`/users/me/messages/${id}?format=metadata&metadataHeaders=Subject&metadataHeaders=From&metadataHeaders=Date&metadataHeaders=To`))
      );
      const parsed = details.map(m => {
        const headers = (m.payload?.headers || []).reduce((a, h) => { a[h.name] = h.value; return a; }, {});
        return {
          id: m.id, threadId: m.threadId,
          snippet: m.snippet, labelIds: m.labelIds || [],
          subject: headers.Subject || "(제목 없음)",
          from: headers.From || "",
          to: headers.To || "",
          date: headers.Date ? new Date(headers.Date) : null,
          unread: (m.labelIds || []).includes("UNREAD"),
          starred: (m.labelIds || []).includes("STARRED"),
        };
      });
      setEmails(parsed);
    } catch (e) {
      setError("메일 로드 실패: " + e.message);
    } finally {
      setLoading(false);
    }
  }, [token]);

  React.useEffect(() => { if (token) fetchInbox(activeQ); }, [token, activeQ, fetchInbox]);

  const search_submit = (e) => {
    e?.preventDefault();
    if (search.trim()) setActiveQ(search.trim());
    else setActiveQ("in:inbox");
  };

  // 메일 상세 보기
  const openEmail = async (m) => {
    setViewing({ ...m, loading: true });
    try {
      const full = await gapi(`/users/me/messages/${m.id}?format=full`);
      // unread 표시 제거
      if (m.unread) {
        gapi(`/users/me/messages/${m.id}/modify`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ removeLabelIds: ["UNREAD"] }),
        }).catch(() => {});
        setEmails(es => es.map(x => x.id === m.id ? { ...x, unread: false } : x));
      }
      // 본문 추출
      const extractBody = (payload) => {
        if (!payload) return { html: "", text: "" };
        let html = "", text = "";
        const walk = (p) => {
          if (!p) return;
          if (p.mimeType === "text/html" && p.body?.data) {
            html += b64UrlDecode(p.body.data);
          } else if (p.mimeType === "text/plain" && p.body?.data) {
            text += b64UrlDecode(p.body.data);
          } else if (p.parts) {
            p.parts.forEach(walk);
          }
        };
        walk(payload);
        return { html, text };
      };
      const body = extractBody(full.payload);
      setViewing({ ...m, ...body, loading: false });
    } catch (e) {
      setError("메일 본문 로드 실패: " + e.message);
      setViewing(null);
    }
  };

  const toggleStar = async (m, e) => {
    e?.stopPropagation();
    const next = !m.starred;
    setEmails(es => es.map(x => x.id === m.id ? { ...x, starred: next } : x));
    try {
      await gapi(`/users/me/messages/${m.id}/modify`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(next ? { addLabelIds: ["STARRED"] } : { removeLabelIds: ["STARRED"] }),
      });
    } catch (e) {
      setEmails(es => es.map(x => x.id === m.id ? { ...x, starred: !next } : x));
    }
  };

  const deleteEmail = async (m) => {
    if (!confirm("이 메일을 휴지통으로 이동할까요?")) return;
    try {
      await gapi(`/users/me/messages/${m.id}/trash`, { method: "POST" });
      setEmails(es => es.filter(x => x.id !== m.id));
      if (viewing?.id === m.id) setViewing(null);
    } catch (e) { setError("삭제 실패: " + e.message); }
  };

  const sendMail = async ({ to, subject, body, replyToHeaders }) => {
    if (!to || !subject) { alert("받는 사람과 제목을 입력해주세요."); return; }
    const headers = [
      `To: ${to}`,
      `Subject: =?UTF-8?B?${btoa(unescape(encodeURIComponent(subject)))}?=`,
      "MIME-Version: 1.0",
      'Content-Type: text/html; charset="UTF-8"',
      "Content-Transfer-Encoding: base64",
    ];
    if (replyToHeaders?.messageId) {
      headers.push(`In-Reply-To: ${replyToHeaders.messageId}`);
      headers.push(`References: ${replyToHeaders.messageId}`);
    }
    const message = headers.join("\r\n") + "\r\n\r\n" + btoa(unescape(encodeURIComponent(body)));
    const raw = b64UrlEncode(message);
    try {
      const sendBody = { raw };
      if (replyToHeaders?.threadId) sendBody.threadId = replyToHeaders.threadId;
      await gapi("/users/me/messages/send", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(sendBody),
      });
      alert("✅ 메일 전송 완료!");
      setComposing(null);
      fetchInbox(activeQ);
    } catch (e) {
      alert("전송 실패: " + e.message);
    }
  };

  const formatDate = (d) => {
    if (!d) return "";
    const now = new Date();
    const same = d.toDateString() === now.toDateString();
    if (same) return d.toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" });
    const diff = (now - d) / 86400000;
    if (diff < 7) return d.toLocaleDateString("ko-KR", { weekday: "short" });
    return d.toLocaleDateString("ko-KR", { month: "2-digit", day: "2-digit" });
  };

  const fromName = (from) => {
    const m = from.match(/^(.+?)\s*<(.+)>$/);
    if (m) return { name: m[1].replace(/^"|"$/g, ""), email: m[2] };
    return { name: from, email: from };
  };

  // ── 미인증 상태 ──
  if (!token) {
    return (
      <div className="card" style={{ padding: 48, textAlign: "center", maxWidth: 480, margin: "40px auto" }}>
        <div style={{ fontSize: 56, marginBottom: 12 }}>✉️</div>
        <div style={{ fontSize: 20, fontWeight: 800, color: "var(--text1)", marginBottom: 8 }}>Gmail 연동</div>
        <div style={{ fontSize: 14, color: "var(--text2)", lineHeight: 1.7, marginBottom: 24 }}>
          Google 계정으로 로그인하면 받은 메일 조회 / 검색 / 발송이 가능해요.<br/>
          비밀번호는 우리 앱에 저장되지 않으며, 토큰은 탭을 닫으면 자동 삭제됩니다.
        </div>
        <button onClick={signIn} className="btn-primary" style={{ padding: "14px 28px", fontSize: 15, display: "inline-flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 18 }}>G</span> Google로 로그인
        </button>
        {error && <div style={{ marginTop: 16, padding: 12, background: "rgba(240,68,82,0.1)", color: "#F04452", borderRadius: 10, fontSize: 13 }}>{error}</div>}
        <div style={{ fontSize: 11, color: "var(--text3)", marginTop: 24, lineHeight: 1.6 }}>
          ℹ️ 테스트 모드라 등록된 사용자만 로그인 가능합니다.<br/>
          새 사용자는 Google Cloud Console에서 추가해야 해요.
        </div>
      </div>
    );
  }

  // ── 인증 후 메일 화면 ──
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      {/* 헤더 */}
      <div className="card" style={{ padding: "12px 16px", display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
        <div style={{ flex: 1, minWidth: 200 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: "var(--text1)" }}>📧 {profile?.emailAddress || "Gmail"}</div>
          <div style={{ fontSize: 11, color: "var(--text3)", marginTop: 2 }}>총 메일 {profile?.messagesTotal?.toLocaleString() || "—"}건</div>
        </div>
        <button onClick={() => setComposing({ to: "", subject: "", body: "" })} className="btn-primary" style={{ padding: "8px 16px", fontSize: 13 }}>✏️ 새 메일</button>
        <button onClick={() => fetchInbox(activeQ)} title="새로고침" style={{ padding: "8px 12px", fontSize: 13, color: "var(--text2)", background: "none", border: "1px solid var(--border)", borderRadius: 8, cursor: "pointer", fontFamily: "inherit" }}>🔄</button>
        <button onClick={signOut} title="로그아웃" style={{ padding: "8px 12px", fontSize: 12, color: "var(--text2)", background: "none", border: "1px solid var(--border)", borderRadius: 8, cursor: "pointer", fontFamily: "inherit" }}>로그아웃</button>
      </div>

      {/* 검색 + 필터 */}
      <div className="card" style={{ padding: 14, display: "flex", flexDirection: "column", gap: 10 }}>
        <form onSubmit={search_submit} style={{ display: "flex", gap: 8 }}>
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍 from:거래처명 / subject:견적 / has:attachment 등 Gmail 검색 문법" style={{ flex: 1 }} />
          <button type="submit" className="btn-primary" style={{ padding: "0 18px", fontSize: 13 }}>검색</button>
        </form>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {FILTERS.map(f => (
            <button key={f.id} onClick={() => { setSearch(""); setActiveQ(f.id); }}
              style={{
                padding: "6px 12px", borderRadius: 8, border: "none",
                background: activeQ === f.id ? "linear-gradient(135deg, #EC6608, #D85800)" : "var(--surface2)",
                color: activeQ === f.id ? "#fff" : "var(--text2)",
                fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
              }}>{f.label}</button>
          ))}
          {clients.length > 0 && (
            <select onChange={e => { if (e.target.value) { setSearch(""); setActiveQ(`from:${e.target.value} OR to:${e.target.value}`); }}}
              style={{ padding: "6px 10px", fontSize: 12, height: 32, width: "auto", minWidth: 140 }}>
              <option value="">— 거래처별 메일 —</option>
              {clients.filter(c => c.email).map(c => <option key={c.id} value={c.email}>{c.name}</option>)}
            </select>
          )}
        </div>
      </div>

      {error && <div style={{ padding: 14, background: "rgba(240,68,82,0.1)", color: "#F04452", borderRadius: 10, fontSize: 13 }}>{error}</div>}

      {/* 메일 목록 */}
      <div className="card" style={{ padding: 0, overflow: "hidden" }}>
        {loading ? (
          <div style={{ padding: 48, textAlign: "center", color: "var(--text3)" }}>⏳ 로딩 중...</div>
        ) : emails.length === 0 ? (
          <div style={{ padding: 48, textAlign: "center", color: "var(--text3)", fontSize: 14 }}>📭 메일이 없습니다</div>
        ) : (
          <div>
            {emails.map(m => {
              const fn = fromName(m.from);
              const isMe = profile && m.from.includes(profile.emailAddress);
              return (
                <div key={m.id} onClick={() => openEmail(m)} style={{
                  display: "flex", alignItems: "center", gap: 10,
                  padding: "12px 16px",
                  borderBottom: "1px solid var(--divider)",
                  background: m.unread ? (darkMode ? "rgba(236,102,8,0.06)" : "#F5F7FF") : "transparent",
                  cursor: "pointer", transition: "background 0.12s",
                }}
                  onMouseEnter={e => { if (!m.unread) e.currentTarget.style.background = "var(--surface2)"; }}
                  onMouseLeave={e => { if (!m.unread) e.currentTarget.style.background = "transparent"; }}
                >
                  <span onClick={(ev) => toggleStar(m, ev)} style={{ fontSize: 16, cursor: "pointer", color: m.starred ? "#F59E0B" : "var(--text3)", flexShrink: 0 }}>{m.starred ? "★" : "☆"}</span>
                  <div style={{ width: 8, height: 8, borderRadius: "50%", background: m.unread ? "#EC6608" : "transparent", flexShrink: 0 }}/>
                  <div style={{ width: 130, minWidth: 130, fontSize: 13, fontWeight: m.unread ? 700 : 500, color: "var(--text1)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                    {isMe ? `→ ${m.to.split(",")[0].slice(0, 20)}` : fn.name.slice(0, 18)}
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: m.unread ? 700 : 500, color: "var(--text1)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                      {m.subject}
                      <span style={{ fontWeight: 400, color: "var(--text3)", marginLeft: 8 }}>— {m.snippet}</span>
                    </div>
                  </div>
                  <div style={{ fontSize: 11, color: "var(--text3)", flexShrink: 0, fontWeight: m.unread ? 600 : 400 }}>{formatDate(m.date)}</div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* 메일 상세 모달 */}
      {viewing && (
        <MailDetailModal m={viewing} darkMode={darkMode} onClose={() => setViewing(null)}
          onReply={() => {
            const fn = fromName(viewing.from);
            setComposing({
              to: fn.email,
              subject: viewing.subject.startsWith("Re:") ? viewing.subject : `Re: ${viewing.subject}`,
              body: `\n\n\n--- 원문 ---\n보낸 사람: ${viewing.from}\n날짜: ${viewing.date?.toLocaleString("ko-KR") || ""}\n\n${(viewing.text || viewing.html?.replace(/<[^>]+>/g, "") || "").slice(0, 2000)}`,
              replyToHeaders: { threadId: viewing.threadId },
            });
            setViewing(null);
          }}
          onDelete={() => deleteEmail(viewing)}
        />
      )}

      {/* 메일 작성 모달 */}
      {composing && (
        <MailComposeModal initial={composing} darkMode={darkMode} clients={clients}
          onSend={sendMail} onCancel={() => setComposing(null)} />
      )}
    </div>
  );
}

// 메일 상세 모달
function MailDetailModal({ m, darkMode, onClose, onReply, onDelete }) {
  React.useEffect(() => {
    document.body.style.overflow = "hidden";
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    return () => { document.body.style.overflow = ""; window.removeEventListener("keydown", onKey); };
  }, [onClose]);
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, zIndex: 200, background: "rgba(0,0,0,0.55)", backdropFilter: "blur(4px)", display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
      <div onClick={e => e.stopPropagation()} style={{ background: "var(--surface)", borderRadius: 16, width: "100%", maxWidth: 720, maxHeight: "92vh", display: "flex", flexDirection: "column", boxShadow: "0 20px 48px rgba(0,0,0,0.32)" }}>
        <div style={{ padding: "16px 20px", borderBottom: "1px solid var(--divider)" }}>
          <div style={{ display: "flex", justifyContent: "space-between", gap: 8, marginBottom: 8 }}>
            <div style={{ fontSize: 17, fontWeight: 700, color: "var(--text1)", flex: 1, lineHeight: 1.4 }}>{m.subject}</div>
            <button onClick={onClose} style={{ width: 32, height: 32, borderRadius: 8, border: "none", background: "var(--surface2)", color: "var(--text2)", cursor: "pointer", fontSize: 16 }}>✕</button>
          </div>
          <div style={{ fontSize: 13, color: "var(--text2)", marginBottom: 4 }}>{m.from}</div>
          <div style={{ fontSize: 11, color: "var(--text3)" }}>{m.date?.toLocaleString("ko-KR") || ""}</div>
          <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
            <button onClick={onReply} className="btn-primary" style={{ padding: "6px 14px", fontSize: 12 }}>↩ 답장</button>
            <button onClick={onDelete} style={{ padding: "6px 14px", fontSize: 12, color: "#F04452", background: "none", border: "1px solid #F04452", borderRadius: 9, cursor: "pointer", fontFamily: "inherit" }}>🗑 삭제</button>
          </div>
        </div>
        <div style={{ flex: 1, overflowY: "auto", padding: 20 }}>
          {m.loading ? (
            <div style={{ textAlign: "center", color: "var(--text3)", padding: 40 }}>⏳ 본문 로드 중...</div>
          ) : m.html ? (
            <iframe srcDoc={`<base target="_blank"><style>body{font-family:-apple-system,sans-serif;color:${darkMode?"#EEE":"#111"};background:${darkMode?"#111":"#fff"};font-size:14px;line-height:1.6;margin:0;padding:8px}img{max-width:100%;height:auto}a{color:#EC6608}</style>${m.html}`}
              sandbox="allow-popups allow-popups-to-escape-sandbox"
              style={{ width: "100%", minHeight: 400, border: "none" }}
              title="email body" />
          ) : m.text ? (
            <pre style={{ whiteSpace: "pre-wrap", fontFamily: "inherit", fontSize: 14, color: "var(--text1)", lineHeight: 1.6, margin: 0 }}>{m.text}</pre>
          ) : (
            <div style={{ color: "var(--text3)" }}>본문이 없습니다.</div>
          )}
        </div>
      </div>
    </div>
  );
}

// 메일 작성 모달
function MailComposeModal({ initial, darkMode, clients = [], onSend, onCancel }) {
  const [to, setTo] = React.useState(initial.to || "");
  const [subject, setSubject] = React.useState(initial.subject || "");
  const [body, setBody] = React.useState(initial.body || "");
  const [sending, setSending] = React.useState(false);
  React.useEffect(() => {
    document.body.style.overflow = "hidden";
    return () => { document.body.style.overflow = ""; };
  }, []);
  const handleSend = async () => {
    setSending(true);
    await onSend({ to: to.trim(), subject: subject.trim(), body: body.replace(/\n/g, "<br/>"), replyToHeaders: initial.replyToHeaders });
    setSending(false);
  };
  return (
    <div onClick={onCancel} style={{ position: "fixed", inset: 0, zIndex: 200, background: "rgba(0,0,0,0.55)", backdropFilter: "blur(4px)", display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
      <div onClick={e => e.stopPropagation()} style={{ background: "var(--surface)", borderRadius: 16, width: "100%", maxWidth: 680, maxHeight: "92vh", display: "flex", flexDirection: "column", boxShadow: "0 20px 48px rgba(0,0,0,0.32)" }}>
        <div style={{ padding: "14px 20px", borderBottom: "1px solid var(--divider)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ fontSize: 16, fontWeight: 700, color: "var(--text1)" }}>✏️ 새 메일</div>
          <button onClick={onCancel} style={{ width: 32, height: 32, borderRadius: 8, border: "none", background: "var(--surface2)", color: "var(--text2)", cursor: "pointer", fontSize: 16 }}>✕</button>
        </div>
        <div style={{ flex: 1, overflowY: "auto", padding: 20, display: "flex", flexDirection: "column", gap: 12 }}>
          <div>
            <div style={{ fontSize: 11, fontWeight: 700, color: "var(--text3)", textTransform: "uppercase", letterSpacing: 0.4, marginBottom: 6 }}>받는 사람</div>
            <input value={to} onChange={e => setTo(e.target.value)} placeholder="email@example.com" />
            {clients.filter(c => c.email).length > 0 && (
              <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginTop: 6 }}>
                {clients.filter(c => c.email).slice(0, 6).map(c => (
                  <button key={c.id} type="button" onClick={() => setTo(t => t ? `${t}, ${c.email}` : c.email)}
                    style={{ padding: "4px 10px", fontSize: 11, borderRadius: 100, border: "1px solid var(--border)", background: "var(--surface2)", color: "var(--text2)", cursor: "pointer", fontFamily: "inherit" }}>+ {c.name}</button>
                ))}
              </div>
            )}
          </div>
          <div>
            <div style={{ fontSize: 11, fontWeight: 700, color: "var(--text3)", textTransform: "uppercase", letterSpacing: 0.4, marginBottom: 6 }}>제목</div>
            <input value={subject} onChange={e => setSubject(e.target.value)} placeholder="제목을 입력하세요" />
          </div>
          <div style={{ flex: 1, display: "flex", flexDirection: "column" }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "var(--text3)", textTransform: "uppercase", letterSpacing: 0.4, marginBottom: 6 }}>본문</div>
            <textarea value={body} onChange={e => setBody(e.target.value)} placeholder="안녕하세요, ..." style={{ minHeight: 220, flex: 1 }} />
          </div>
        </div>
        <div style={{ padding: "14px 20px", borderTop: "1px solid var(--divider)", display: "flex", justifyContent: "flex-end", gap: 8 }}>
          <button onClick={onCancel} style={{ padding: "10px 18px", fontSize: 13, color: "var(--text2)", background: "var(--surface2)", border: "none", borderRadius: 10, cursor: "pointer", fontFamily: "inherit", fontWeight: 600 }}>취소</button>
          <button onClick={handleSend} disabled={sending || !to || !subject} className="btn-primary" style={{ padding: "10px 22px", fontSize: 13, opacity: (sending || !to || !subject) ? 0.5 : 1 }}>{sending ? "⏳ 전송 중..." : "📤 보내기"}</button>
        </div>
      </div>
    </div>
  );
}

// base64url 인코딩/디코딩 헬퍼
function b64UrlEncode(str) {
  return btoa(str).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}
function b64UrlDecode(s) {
  if (!s) return "";
  let str = s.replace(/-/g, "+").replace(/_/g, "/");
  while (str.length % 4) str += "=";
  try { return decodeURIComponent(escape(atob(str))); }
  catch { try { return atob(str); } catch { return ""; } }
}

const CORRECT_PW = "911201";

function LoginScreen({ onSuccess }) {
  const [pw, setPw] = React.useState("");
  const [shake, setShake] = React.useState(false);
  const [err, setErr] = React.useState(false);

  const handleSubmit = (e) => {
    e.preventDefault();
    if (pw === CORRECT_PW) {
      sessionStorage.setItem("nj_auth", "1");
      onSuccess();
    } else {
      setErr(true);
      setShake(true);
      setPw("");
      setTimeout(() => setShake(false), 500);
    }
  };

  return (
    <div style={{
      minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center",
      background: "var(--bg)", flexDirection: "column", gap: 0,
    }}>
      <form onSubmit={handleSubmit} style={{
        background: "var(--surface)", borderRadius: 20, padding: "40px 36px 36px",
        boxShadow: "0 4px 32px rgba(0,0,0,0.10)", border: "0.5px solid var(--border)",
        width: 320, display: "flex", flexDirection: "column", gap: 18,
        animation: shake ? "shake 0.45s ease" : "none",
      }}>
        <div style={{ textAlign: "center", marginBottom: 4 }}>
          <div style={{ fontSize: 32, marginBottom: 6 }}>🔒</div>
          <div style={{ fontSize: 20, fontWeight: 800, color: "var(--text1)", letterSpacing: -0.3 }}>NJ SAFETY</div>
          <div style={{ fontSize: 13, color: "var(--text2)", marginTop: 4 }}>비밀번호를 입력하세요</div>
        </div>
        <input
          type="password"
          placeholder="비밀번호"
          value={pw}
          autoFocus
          onChange={e => { setPw(e.target.value); setErr(false); }}
          style={{
            borderRadius: 12, height: 48, fontSize: 18, textAlign: "center", letterSpacing: 4,
            border: err ? "2px solid #F04452" : "2px solid transparent",
            background: "var(--input-bg)", color: "var(--input-color)",
          }}
        />
        {err && <div style={{ fontSize: 12, color: "#F04452", textAlign: "center", marginTop: -10 }}>비밀번호가 틀렸습니다</div>}
        <button type="submit" className="btn-primary" style={{ height: 48, fontSize: 15, borderRadius: 12 }}>입장</button>
      </form>
      <style>{`@keyframes shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-8px)}30%{transform:translateX(8px)}45%{transform:translateX(-6px)}60%{transform:translateX(6px)}75%{transform:translateX(-3px)}90%{transform:translateX(3px)}}`}</style>
    </div>
  );
}

function Root() {
  const [authed, setAuthed] = React.useState(() => sessionStorage.getItem("nj_auth") === "1");
  if (!authed) return <LoginScreen onSuccess={() => setAuthed(true)} />;
  return <App />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);

// ── PDF 1페이지 자동 맞춤 ──
(function() {
  // A4 @ 96dpi, 8mm top/bottom margin = 297mm - 16mm ≈ 281mm ≈ 1062px
  const PAGE_H = 1020;

  const findDoc = () => document.querySelector('.apple-doc, .bold-doc, .card-doc, .korean-doc');
  window.addEventListener('beforeprint', function() {
    const el = findDoc();
    if (!el) return;
    el.style.zoom = '1';
    const h = el.offsetHeight;
    if (h > PAGE_H) {
      el.style.zoom = (PAGE_H / h).toFixed(4);
    }
  });

  window.addEventListener('afterprint', function() {
    const el = findDoc();
    if (el) el.style.zoom = '';
  });
})();
</script>
