      <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
        {kpi(thisYear+"년 총 매출", totalYearRevenue>0?Math.round(totalYearRevenue).toLocaleString()+"원":"—", "월별 입력 기준", "#475569")}
        {kpi("판매 기록 매출", totalOrderRevenue>0?Math.round(totalOrderRevenue).toLocaleString()+"원":"—", orders.length+"건 합산", null)}
        {kpi("납품가 마진율", avgMarginSell>0?avgMarginSell.toFixed(1)+"%":"—", "현재 제품 기준", avgMarginSell>=26?"#00B493":avgMarginSell>=20?"#FF9500":avgMarginSell>0?"#F04452":null)}
        {kpi("최다 매출 제품", topProduct?topProduct[0]:"—", topProduct?Math.round(topProduct[1]).toLocaleString()+"원":"기록 없음", null)}
      </div>
      {orders.length > 0 && (
        <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
          {kpi("총 미수금", Math.round(totalUnpaidAmt).toLocaleString()+"원", unpaidCount+"건", totalUnpaidAmt>0?"#FF9500":"#00B493")}
          {kpi("연체 미수금", Math.round(totalOverdueAmt).toLocaleString()+"원", overdueCount>0?overdueCount+"건 연체":"연체 없음", totalOverdueAmt>0?"#F04452":"#00B493")}
          {kpi("완납 매출", Math.round(totalOrderRevenue - totalUnpaidAmt).toLocaleString()+"원", paidCount+"건 완납", "#00B493")}
          {kpi("회수율", totalOrderRevenue>0?Math.round((totalOrderRevenue-totalUnpaidAmt)/totalOrderRevenue*100)+"%":"—", "전체 매출 대비", null)}
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        <div className="card">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:700,color:"var(--text1)"}}>📈 {thisYear}년 월별 매출 추이</div>
            <button onClick={()=>setShowMonthInput(v=>!v)} style={{fontSize:12,fontWeight:600,color:"var(--text2)",background:"none",border:"1px solid var(--border)",borderRadius:8,padding:"4px 10px",cursor:"pointer",fontFamily:"inherit"}}>
              {showMonthInput?"닫기":"✏️ 직접 입력"}
            </button>
          </div>
          <div style={{height:200,position:"relative"}}>
            {hasAnyData?<canvas ref={salesRef}/>:<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",color:"var(--text3)",fontSize:13,textAlign:"center"}}>직접 입력 또는<br/>주문 기록을 추가하세요</div>}
          </div>
          {showMonthInput&&(
            <div style={{marginTop:16,borderTop:"0.5px solid var(--divider)",paddingTop:14}}>
              <div style={{fontSize:11,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>월별 매출 직접 입력 (원) — 입력시 주문 기록 자동합산 값 대체</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
                {months12.map(m=>{
                  const autoVal = monthlyRevOrders[m];
                  return (
                    <div key={m}>
                      <div style={{fontSize:11,fontWeight:600,color:"var(--text2)",marginBottom:4,textAlign:"center"}}>{m.slice(5)}월</div>
                      <input type="number" placeholder={autoVal>0?Math.round(autoVal).toLocaleString()+"원":"-"}
                        value={monthlySales[m]!==undefined&&monthlySales[m]!==""?monthlySales[m]:""}
                        onChange={e=>setMonthlySales(prev=>({...prev,[m]:e.target.value===""?undefined:parseFloat(e.target.value)}))}
                        style={{height:36,fontSize:12,padding:"0 8px",textAlign:"right"}}/>
                    </div>
                  );
                })}
              </div>
              <div style={{display:"flex",gap:8,marginTop:10}}>
                <div style={{fontSize:11,color:"var(--text3)"}}>💡 진한 막대 = 직접 입력, 연한 막대 = 주문 기록 자동합산</div>
                <div style={{flex:1}}/>
                <button onClick={()=>setMonthlySales({})} style={{fontSize:11,color:"#F04452",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>전체 초기화</button>
              </div>
            </div>
          )}
        </div>
        <div className="card">
          <div style={{fontSize:13,fontWeight:700,color:"var(--text1)",marginBottom:14}}>🥧 제품군별 매출 비중</div>
          <div style={{height:200,position:"relative"}}>
            {prodLabels.length>0?<canvas ref={pieRef}/>:<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",color:"var(--text3)",fontSize:13,textAlign:"center"}}>주문 기록을 추가하면<br/>그래프가 표시됩니다</div>}
          </div>
        </div>
      </div>
      <div className="card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <div style={{fontSize:13,fontWeight:700,color:"var(--text1)"}}>📊 제품별 마진율 현황 <span style={{fontSize:11,fontWeight:400,color:"var(--text3)"}}>(납품가 대비)</span></div>
          <button onClick={()=>setMarginSorted(v=>!v)} style={{fontSize:12,fontWeight:600,color:marginSorted?ACCENT:"var(--text2)",background:marginSorted?"rgba(71,85,105,0.12)":"none",border:`1px solid ${marginSorted?"rgba(71,85,105,0.3)":"var(--border)"}`,borderRadius:8,padding:"4px 10px",cursor:"pointer",fontFamily:"inherit",transition:"all 0.15s"}}>
            {marginSorted?"↕ 원래 순서":"↓ 높은순 정렬"}
          </button>
        </div>
        <div style={{height:Math.max(140,mLabels.length*48),position:"relative"}}>
          {mLabels.length>0?<canvas ref={marginRef}/>:<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:120,color:"var(--text3)",fontSize:13}}>원가가 입력된 제품이 없습니다</div>}
        </div>
        {mLabels.length>0&&(<>
          <div style={{display:"flex",gap:16,marginTop:12,paddingTop:12,borderTop:"0.5px solid var(--divider)",flexWrap:"wrap",marginBottom:14}}>
            {[["≥26% 우수","#00B493"],["20~25% 양호","#FF9500"],["<20% 주의","#F04452"]].map(([l,c])=>(
              <div key={l} style={{display:"flex",alignItems:"center",gap:6,fontSize:12}}><div style={{width:10,height:10,borderRadius:3,background:c}}/><span style={{color:"var(--text2)"}}>{l}</span></div>
            ))}
          </div>
          {/* 드래그 순서 조정 목록 */}
          <div style={{fontSize:11,fontWeight:600,color:"var(--text3)",textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>{marginSorted?"마진율 내림차순 · 제품명 클릭 시 단가 계산기 이동":"순서 조정 · 제품명 클릭 시 단가 계산기 이동"}</div>
          <div>
            {displayMProds.map((p, idx) => {
              const c = computeProduct(p, materials, laborItems);
              const mv = parseFloat(((c.finalPrice - c.beforeMargin) / c.finalPrice * 100).toFixed(1));
              const barColor = mv >= 26 ? "#00B493" : mv >= 20 ? "#FF9500" : "#F04452";
              const isDropTop = marginDropInfo?.id === p.id && marginDropInfo?.side === "top";
              const isDropBot = marginDropInfo?.id === p.id && marginDropInfo?.side === "bottom";
              const MInsertLine = () => (
                <div style={{height:3,borderRadius:3,margin:"2px 0",background:"linear-gradient(90deg,#007AFF,#34AADC)",boxShadow:"0 0 8px rgba(0,122,255,0.6)",position:"relative"}}>
                  <div style={{position:"absolute",left:4,top:"50%",transform:"translateY(-50%)",width:8,height:8,borderRadius:"50%",background:"#007AFF",boxShadow:"0 0 6px rgba(0,122,255,0.8)"}}/>
                </div>
              );
              return (
                <div key={p.id} style={{position:"relative"}}>
                  {isDropTop && <MInsertLine/>}
                  <div
                    draggable={!marginSorted}
                    onDragStart={e => { if(marginSorted) return; dragMargin.current = p.id; setTimeout(()=>{e.target.style.opacity="0.35";},0); }}
                    onDragEnd={e => { e.currentTarget.style.opacity="1"; setMarginDropInfo(null); dragMargin.current=null; }}
                    onDragOver={e => {
                      e.preventDefault();
                      if (dragMargin.current === p.id) return;
                      const rect = e.currentTarget.getBoundingClientRect();
                      const side = e.clientY < rect.top + rect.height/2 ? "top" : "bottom";
                      if (marginDropInfo?.id !== p.id || marginDropInfo?.side !== side) setMarginDropInfo({id:p.id, side});
                    }}
                    onDragLeave={e => { if (!e.currentTarget.contains(e.relatedTarget)) setMarginDropInfo(null); }}
                    onDrop={e => {
                      e.preventDefault();
                      const dragId = dragMargin.current;
                      const dropId = p.id;
                      if (!dragId || dragId === dropId) { setMarginDropInfo(null); return; }
                      const rect = e.currentTarget.getBoundingClientRect();
                      const side = e.clientY < rect.top + rect.height/2 ? "top" : "bottom";
                      setProducts(ps => {
                        const arr = [...ps];
                        const fromIdx = arr.findIndex(x => x.id === dragId);
                        if (fromIdx < 0) return ps;
                        const [item] = arr.splice(fromIdx, 1);
                        const newTo = arr.findIndex(x => x.id === dropId);
                        if (newTo < 0) return [...arr, item];
                        arr.splice(side === "top" ? newTo : newTo + 1, 0, item);
                        return arr;
                      });
                      setMarginDropInfo(null); dragMargin.current = null;
                    }}
                    style={{display:"flex",alignItems:"center",gap:10,padding:"7px 10px",borderRadius:10,background:"var(--surface2)",marginBottom:4,cursor:"default",transition:"opacity 0.15s"}}
                  >
                    <span style={{fontSize:14,color:"var(--text3)",cursor:marginSorted?"default":"grab",userSelect:"none",flexShrink:0,opacity:marginSorted?0.3:1}}>⠿</span>
                    <span style={{fontSize:11,color:"var(--text3)",fontWeight:600,minWidth:18,flexShrink:0}}>{idx+1}</span>
                    <span
                      onClick={() => { setTab("calc"); setActiveProdId(p.id); }}
                      style={{flex:1,fontSize:13,fontWeight:600,color:"var(--text1)",cursor:"pointer",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",minWidth:0}}
                      title={`${p.name} — 단가 계산기로 이동`}
                    >{p.name}</span>
                    <div style={{width:90,height:8,borderRadius:4,background:"var(--divider)",overflow:"hidden",flexShrink:0}}>
                      <div style={{width:`${Math.min(mv/40*100,100)}%`,height:"100%",background:barColor,borderRadius:4,transition:"width 0.3s"}}/>
                    </div>
                    <span style={{fontSize:12,fontWeight:700,color:barColor,minWidth:42,textAlign:"right",flexShrink:0}}>{mv.toFixed(1)}%</span>
                  </div>
                  {isDropBot && <MInsertLine/>}
                </div>
              );
            })}
          </div>
        </>)}
      </div>
      <div className="card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontSize:15,fontWeight:700,color:"var(--text1)"}}>📋 제품별 판매 현황</div>
          <button onClick={()=>setShowOrderForm(v=>!v)} className="btn-primary" style={{padding:"8px 16px",fontSize:13}}>{showOrderForm?"닫기":"+ 판매 추가"}</button>
        </div>
        {showOrderForm&&(
          <div style={{background:"var(--surface2)",borderRadius:12,padding:16,marginBottom:16}}>
            <div style={{display:"grid",gridTemplateColumns:"130px 1fr 70px 110px",gap:8,marginBottom:8}}>
              <input type="date" value={newOrder.date} onChange={e=>setNewOrder(o=>({...o,date:e.target.value}))}/>
              <input placeholder="제품명 *" value={newOrder.productName} onChange={e=>setNewOrder(o=>({...o,productName:e.target.value}))}/>
              <input type="number" placeholder="수량" value={newOrder.qty} onChange={e=>setNewOrder(o=>({...o,qty:e.target.value}))}/>
              <input type="number" placeholder="단가(원) *" value={newOrder.unitPrice} onChange={e=>setNewOrder(o=>({...o,unitPrice:e.target.value}))}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              {clients.length > 0 ? (
                <select value={newOrder.clientId||""} onChange={e=>{ const id=e.target.value; const c=clients.find(x=>x.id===id); setNewOrder(o=>({...o, clientId:id, client: c?c.name:o.client})); }} style={{height:44}}>
                  <option value="">거래처 선택 (또는 직접입력)</option>
                  {clients.map(c=><option key={c.id} value={c.id}>{c.name}{c.contact?` - ${c.contact}`:""}</option>)}
                </select>
              ) : (
                <input placeholder="거래처명" value={newOrder.client} onChange={e=>setNewOrder(o=>({...o,client:e.target.value, clientId:""}))}/>
              )}
              <input placeholder={newOrder.clientId?"비고":"거래처명 직접입력 (선택)"} value={newOrder.clientId?(newOrder.note||""):(newOrder.client||"")} onChange={e=>setNewOrder(o=>o.clientId?({...o,note:e.target.value}):({...o,client:e.target.value}))}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr auto",gap:8,alignItems:"end"}}>
              <div>
                <div style={{fontSize:10,fontWeight:700,color:"var(--text3)",marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>💰 결제 예정일</div>
                <input type="date" value={newOrder.paymentDue||""} onChange={e=>setNewOrder(o=>({...o,paymentDue:e.target.value}))}/>
              </div>
              <div>
                <div style={{fontSize:10,fontWeight:700,color:"var(--text3)",marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>✓ 결제 완료일</div>
                <input type="date" value={newOrder.paidDate||""} onChange={e=>setNewOrder(o=>({...o,paidDate:e.target.value}))}/>
              </div>
              <input placeholder="비고" value={newOrder.clientId?"":(newOrder.note||"")} onChange={e=>setNewOrder(o=>({...o,note:e.target.value}))} style={{display:newOrder.clientId?"none":"block"}}/>
              {newOrder.clientId && <div></div>}
              <button className="btn-primary" onClick={addOrder} style={{padding:"0 22px",height:44,fontSize:13}}>저장</button>
            </div>
          </div>
        )}
        {orders.length===0?(
          <div style={{textAlign:"center",padding:"40px 24px",color:"var(--text3)",fontSize:14,lineHeight:1.8}}>아직 판매 기록이 없습니다<br/>위 버튼으로 판매 내역을 추가하면 매출 지표가 쌓입니다</div>
        ):(
          <div style={{overflowX:"auto"}}>
            <table><thead><tr>
              <th>날짜</th><th>제품명</th><th style={{textAlign:"right"}}>수량</th>
              <th style={{textAlign:"right"}}>단가</th><th style={{textAlign:"right"}}>합계</th>
              <th>거래처</th><th style={{textAlign:"center"}}>결제</th><th>비고</th><th style={{textAlign:"center",minWidth:130}}>관리</th>
            </tr></thead>
            <tbody>
              {[...orders].sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(o=>{
                const isEditing = editingOrderId === o.id;
                if (isEditing && editOrderDraft) {
                  const editTotal = parseFloat(editOrderDraft.unitPrice||0) * parseInt(editOrderDraft.qty||1);
                  return (<tr key={o.id} style={{background:"var(--surface2)"}}>
                    <td><input type="date" value={editOrderDraft.date||""} onChange={e=>setEditOrderDraft(d=>({...d,date:e.target.value}))} style={{height:34,fontSize:12,padding:"0 8px"}}/></td>
                    <td><input value={editOrderDraft.productName||""} onChange={e=>setEditOrderDraft(d=>({...d,productName:e.target.value}))} placeholder="제품명 *" style={{height:34,fontSize:13,padding:"0 8px"}}/></td>
                    <td><input type="number" value={editOrderDraft.qty||""} onChange={e=>setEditOrderDraft(d=>({...d,qty:e.target.value}))} style={{height:34,fontSize:13,padding:"0 8px",textAlign:"right"}}/></td>
                    <td><input type="number" value={editOrderDraft.unitPrice||""} onChange={e=>setEditOrderDraft(d=>({...d,unitPrice:e.target.value}))} placeholder="단가 *" style={{height:34,fontSize:13,padding:"0 8px",textAlign:"right"}}/></td>
                    <td style={{textAlign:"right",fontWeight:700,fontSize:13,whiteSpace:"nowrap"}}>{Math.round(editTotal).toLocaleString()}원</td>
                    <td>
                      {clients.length > 0 ? (
                        <select value={editOrderDraft.clientId||""} onChange={e=>{ const id=e.target.value; const c=clients.find(x=>x.id===id); setEditOrderDraft(d=>({...d, clientId:id, client: c?c.name:d.client})); }} style={{height:34,fontSize:12,padding:"0 6px"}}>
                          <option value="">거래처 선택</option>
                          {clients.map(cl=><option key={cl.id} value={cl.id}>{cl.name}</option>)}
                        </select>
                      ) : (
                        <input value={editOrderDraft.client||""} onChange={e=>setEditOrderDraft(d=>({...d,client:e.target.value}))} placeholder="거래처" style={{height:34,fontSize:13,padding:"0 8px"}}/>
                      )}
                    </td>
                    <td style={{padding:"4px 8px"}}>
                      <div style={{display:"flex",flexDirection:"column",gap:3}}>
                        <input type="date" value={editOrderDraft.paymentDue||""} onChange={e=>setEditOrderDraft(d=>({...d,paymentDue:e.target.value}))} title="결제 예정일" style={{height:26,fontSize:11,padding:"0 6px"}}/>
                        <input type="date" value={editOrderDraft.paidDate||""} onChange={e=>setEditOrderDraft(d=>({...d,paidDate:e.target.value}))} title="결제 완료일" style={{height:26,fontSize:11,padding:"0 6px"}}/>
                      </div>
                    </td>
                    <td><input value={editOrderDraft.note||""} onChange={e=>setEditOrderDraft(d=>({...d,note:e.target.value}))} placeholder="비고" style={{height:34,fontSize:12,padding:"0 8px"}}/></td>
                    <td style={{textAlign:"center",whiteSpace:"nowrap"}}>
                      <button onClick={saveEditOrder} title="저장" style={{background:"#007AFF",border:"none",cursor:"pointer",color:"#fff",fontSize:12,fontWeight:700,borderRadius:6,padding:"5px 9px",marginRight:4,fontFamily:"inherit"}}>저장</button>
                      <button onClick={cancelEditOrder} title="취소" style={{background:"none",border:"1px solid var(--border)",cursor:"pointer",color:"var(--text2)",fontSize:12,fontWeight:600,borderRadius:6,padding:"4px 8px",fontFamily:"inherit"}}>취소</button>
                    </td>
                  </tr>);
                }
                const total=parseFloat(o.unitPrice||0)*parseInt(o.qty||1);
                const isPaid = !!o.paidDate;
                const isOverdue = !isPaid && o.paymentDue && o.paymentDue < todayStr;
                const isPending = !isPaid && o.paymentDue && o.paymentDue >= todayStr;
                const rowBg = isOverdue ? (darkMode?"rgba(240,68,82,0.06)":"rgba(240,68,82,0.04)") : "transparent";
                const togglePaid = () => {
                  const today=new Date().toISOString().slice(0,10);
                  setOrders(prev=>prev.map(x=>x.id===o.id?{...x, paidDate: isPaid?"":today}:x));
                };
                return (<tr key={o.id} style={{background:rowBg}}>
                  <td style={{whiteSpace:"nowrap",fontSize:13}}>{o.date}</td>
                  <td style={{fontWeight:600}}>{o.productName}</td>
                  <td style={{textAlign:"right"}}>{parseInt(o.qty||1).toLocaleString()}</td>
                  <td style={{textAlign:"right"}}>{parseFloat(o.unitPrice||0).toLocaleString()}원</td>
                  <td style={{textAlign:"right",fontWeight:700}}>{Math.round(total).toLocaleString()}원</td>
                  <td style={{fontSize:13}}>{o.client}</td>
                  <td style={{textAlign:"center",whiteSpace:"nowrap"}}>
                    {isPaid ? (
                      <span style={{display:"inline-block",fontSize:11,padding:"3px 8px",borderRadius:6,background:"rgba(0,180,147,0.15)",color:"#00B493",fontWeight:700}} title={`결제일: ${o.paidDate}`}>✓ 완납</span>
                    ) : isOverdue ? (
                      <span style={{display:"inline-block",fontSize:11,padding:"3px 8px",borderRadius:6,background:"rgba(240,68,82,0.18)",color:"#F04452",fontWeight:700}} title={`예정일: ${o.paymentDue}`}>⚠ 연체</span>
                    ) : isPending ? (
                      <span style={{display:"inline-block",fontSize:11,padding:"3px 8px",borderRadius:6,background:"rgba(255,149,0,0.15)",color:"#FF9500",fontWeight:700}} title={`예정일: ${o.paymentDue}`}>⏰ 미수</span>
                    ) : (
                      <span style={{fontSize:11,color:"var(--text3)"}}>—</span>
                    )}
                  </td>
                  <td style={{fontSize:12,color:"var(--text2)"}}>{o.note}</td>
                  <td style={{textAlign:"center",whiteSpace:"nowrap"}}>
                    <button onClick={togglePaid} title={isPaid?"결제 취소":"완납 처리"} style={{background:"none",border:"none",cursor:"pointer",color:isPaid?"#FF9500":"#00B493",fontSize:14,marginRight:4}}>{isPaid?"↩":"💰"}</button>
                    <button onClick={()=>startEditOrder(o)} title="수정" style={{background:"none",border:"none",cursor:"pointer",color:"#007AFF",fontSize:15,marginRight:6}}>✏️</button>
                    <button onClick={()=>{ if(confirm("이 판매 기록을 삭제할까요?")) setOrders(prev=>prev.filter(x=>x.id!==o.id)); }} title="삭제" style={{background:"none",border:"none",cursor:"pointer",color:"#F04452",fontSize:15}}>✕</button>
                  </td>
                </tr>);
              })}
            </tbody></table>
          </div>
        )}
      </div>
    </div>
  );
}

function InventoryTab({ fabricIntakes, setFabricIntakes, materials, darkMode }) {
  const STATUSES = ["주문완료","운송중","입고완료","검수중","검수완료","반품"];
  const SC = {"주문완료":"#007AFF","운송중":"#FF9500","입고완료":"#00B493","검수중":"#5856D6","검수완료":"#34C759","반품":"#F04452"};
  const [filterMonth, setFilterMonth] = useState("");
  const [filterStatus, setFilterStatus] = useState("");
  const [showForm, setShowForm] = useState(false);
  const [newI, setNewI] = useState({ date:new Date().toISOString().slice(0,10), materialName:"", customMaterial:"", supplier:"", qty:"", unit:"yard", unitPrice:"", status:"주문완료", inspector:"", note:"" });

  const thisMonth = new Date().toISOString().slice(0,7);
  const pendingCnt = fabricIntakes.filter(r=>["주문완료","운송중","검수중"].includes(r.status)).length;
  const totalVal = fabricIntakes.reduce((s,r)=>s+parseFloat(r.unitPrice||0)*parseFloat(r.qty||0),0);
  const thisMoComp = fabricIntakes.filter(r=>r.date?.startsWith(thisMonth)&&["입고완료","검수완료"].includes(r.status)).length;

  const filtered = fabricIntakes.filter(r => {
    if (filterMonth && !r.date?.startsWith(filterMonth)) return false;
    if (filterStatus && r.status !== filterStatus) return false;
    return true;
  });

  const addIntake = () => {
    const matName = newI.materialName === "__custom__" ? newI.customMaterial : newI.materialName;
    if (!matName || !newI.qty || !newI.supplier) return;
    setFabricIntakes(prev => [...prev, { id:uid(), ...newI, materialName:matName }]);
    setNewI({ date:new Date().toISOString().slice(0,10), materialName:"", customMaterial:"", supplier:"", qty:"", unit:"yard", unitPrice:"", status:"주문완료", inspector:"", note:"" });
    setShowForm(false);
  };
  const statCard = (label,val,color) => (
    <div className="card" style={{flex:1,minWidth:120}}>
      <div style={{fontSize:11,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>{label}</div>
      <div style={{fontSize:24,fontWeight:800,color:color||"var(--text1)",lineHeight:1}}>{val}</div>
    </div>
  );
  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
        {statCard("이번달 입고완료", thisMoComp+"건", "#475569")}
        {statCard("처리 대기", pendingCnt+"건", pendingCnt>0?"#FF9500":"#00B493")}
        {statCard("총 입고 기록", fabricIntakes.length+"건", null)}
        {statCard("총 원단 가액", Math.round(totalVal).toLocaleString()+"원", null)}
      </div>
      <div className="card">
        <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center",marginBottom:16}}>
          <input type="month" value={filterMonth} onChange={e=>setFilterMonth(e.target.value)} style={{height:40,fontSize:13,flex:"0 0 160px"}}/>
          <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={{height:40,fontSize:13,width:140}}>
            <option value="">전체 상태</option>
            {STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
          </select>
          {(filterMonth||filterStatus)&&(
            <button onClick={()=>{setFilterMonth("");setFilterStatus("");}} style={{padding:"8px 14px",borderRadius:10,border:"1px solid var(--border)",background:"none",cursor:"pointer",fontSize:13,color:"var(--text2)",fontFamily:"inherit"}}>필터 초기화</button>
          )}
          <div style={{flex:1}}/>
          <button onClick={()=>setShowForm(v=>!v)} className="btn-primary" style={{padding:"8px 18px",fontSize:13}}>{showForm?"닫기":"+ 입고 등록"}</button>
        </div>
        {showForm&&(
          <div style={{background:"var(--surface2)",borderRadius:12,padding:16,marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:700,color:"var(--text3)",marginBottom:12,textTransform:"uppercase",letterSpacing:0.5}}>신규 입고 등록</div>
            <div style={{display:"grid",gridTemplateColumns:"130px 1fr 1fr",gap:8,marginBottom:8}}>
              <input type="date" value={newI.date} onChange={e=>setNewI(p=>({...p,date:e.target.value}))}/>
              <select value={newI.materialName} onChange={e=>setNewI(p=>({...p,materialName:e.target.value}))} style={{height:44}}>
                <option value="">원단 선택...</option>
                {materials.map(m=><option key={m.id} value={m.name}>{m.name}</option>)}
                <option value="__custom__">직접 입력</option>
              </select>
              {newI.materialName==="__custom__"
                ?<input placeholder="원단명 직접 입력" value={newI.customMaterial} onChange={e=>setNewI(p=>({...p,customMaterial:e.target.value}))}/>
                :<input placeholder="공급업체명 *" value={newI.supplier} onChange={e=>setNewI(p=>({...p,supplier:e.target.value}))}/>}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 80px 100px 110px 120px",gap:8,marginBottom:8}}>
              {newI.materialName==="__custom__"
                ?<input placeholder="공급업체명 *" value={newI.supplier} onChange={e=>setNewI(p=>({...p,supplier:e.target.value}))}/>
                :<div style={{display:"flex",alignItems:"center",paddingLeft:8,fontSize:13,color:"var(--text2)"}}>{newI.materialName||"원단을 선택하세요"}</div>}
              <input type="number" placeholder="수량 *" value={newI.qty} onChange={e=>setNewI(p=>({...p,qty:e.target.value}))}/>
              <select value={newI.unit} onChange={e=>setNewI(p=>({...p,unit:e.target.value}))} style={{height:44}}>
                <option value="yard">yard</option><option value="m">m</option><option value="kg">kg</option><option value="롤">롤</option>
              </select>
              <input type="number" placeholder="단가(원)" value={newI.unitPrice} onChange={e=>setNewI(p=>({...p,unitPrice:e.target.value}))}/>
              <select value={newI.status} onChange={e=>setNewI(p=>({...p,status:e.target.value}))} style={{height:44}}>
                {STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
              </select>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr auto",gap:8}}>
              <input placeholder="검수 담당자" value={newI.inspector} onChange={e=>setNewI(p=>({...p,inspector:e.target.value}))}/>
              <input placeholder="비고 / 메모" value={newI.note} onChange={e=>setNewI(p=>({...p,note:e.target.value}))}/>
              <button className="btn-primary" onClick={addIntake} style={{padding:"0 20px",height:44,fontSize:13}}>등록</button>
            </div>
          </div>
        )}
        {filtered.length===0?(
          <div style={{textAlign:"center",padding:"40px 24px",color:"var(--text3)",fontSize:14,lineHeight:1.8}}>
            {fabricIntakes.length===0?"원단 입고 기록이 없습니다\n위 버튼으로 입고를 등록하세요":"조건에 맞는 기록이 없습니다"}
          </div>
        ):(
          <div style={{overflowX:"auto"}}>
            <table><thead><tr>
              <th>입고일</th><th>원단명</th><th>공급업체</th>
              <th style={{textAlign:"right"}}>수량</th><th style={{textAlign:"right"}}>단가</th>
              <th style={{textAlign:"right"}}>금액</th><th style={{textAlign:"center"}}>상태</th>
              <th>담당자</th><th>비고</th><th style={{textAlign:"center"}}>삭제</th>
            </tr></thead>
            <tbody>
              {[...filtered].sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(r=>{
                const total=parseFloat(r.unitPrice||0)*parseFloat(r.qty||0);
                const sc=SC[r.status]||"#8B95A1";
                return (<tr key={r.id}>
                  <td style={{whiteSpace:"nowrap",fontSize:13}}>{r.date}</td>
                  <td style={{fontWeight:600,fontSize:13}}>{r.materialName}</td>
                  <td style={{fontSize:13}}>{r.supplier}</td>
                  <td style={{textAlign:"right",fontSize:13}}>{parseFloat(r.qty||0).toLocaleString()} {r.unit}</td>
                  <td style={{textAlign:"right",fontSize:13}}>{parseFloat(r.unitPrice||0).toLocaleString()}원</td>
                  <td style={{textAlign:"right",fontWeight:600,fontSize:13}}>{total>0?Math.round(total).toLocaleString()+"원":"—"}</td>
                  <td style={{textAlign:"center"}}><span style={{display:"inline-block",padding:"3px 9px",borderRadius:100,fontSize:11,fontWeight:700,background:sc+"22",color:sc,whiteSpace:"nowrap"}}>{r.status}</span></td>
                  <td style={{fontSize:13,color:"var(--text2)"}}>{r.inspector}</td>
                  <td style={{fontSize:12,color:"var(--text2)"}}>{r.note}</td>
                  <td style={{textAlign:"center"}}><button onClick={()=>setFabricIntakes(prev=>prev.filter(x=>x.id!==r.id))} style={{background:"none",border:"none",cursor:"pointer",color:"#F04452",fontSize:15}}>✕</button></td>
                </tr>);
              })}
            </tbody></table>
          </div>
        )}
      </div>
    </div>
  );
}

function ClientsTab({ clients, setClients, orders, darkMode }) {
  const [newClient, setNewClient] = useState({ name: "", grade: "A", note: "" });
  const [editId, setEditId] = useState(null);
  const [editDraft, setEditDraft] = useState(null);
  const [search, setSearch] = useState("");
  const [gradeFilter, setGradeFilter] = useState("ALL");

  // 검색 필터: 이름 또는 메모에 검색어 포함 + 등급 필터
  const filteredClients = clients.filter(c => {
    const q = search.trim().toLowerCase();
    const nameHit = !q || (c.name || "").toLowerCase().includes(q);
    const noteHit = !q || (c.note || "").toLowerCase().includes(q);
    const matchSearch = nameHit || noteHit;
    const matchGrade = gradeFilter === "ALL" || c.grade === gradeFilter;
    return matchSearch && matchGrade;
  });

  // 수주(orders)에서 거래처명 추출 → 등록 안 된 것만
  const registeredNames = new Set(clients.map(c => (c.name || "").trim()));
  const detectedClients = Array.from(new Set(
    (orders || [])
      .map(o => (o.client || "").trim())
      .filter(name => name && !registeredNames.has(name))
  ));

  const addClient = () => {
    const name = newClient.name.trim();
    if (!name) return;
    if (registeredNames.has(name)) {
      alert("이미 등록된 거래처입니다: " + name);
      return;
    }
    setClients(cs => [...cs, {
      id: uid(),
      name,
      grade: newClient.grade || "A",
      note: newClient.note.trim(),
      createdAt: Date.now(),
    }]);
    setNewClient({ name: "", grade: "A", note: "" });
  };

  const registerDetected = (name) => {
    setClients(cs => [...cs, {
      id: uid(),
      name: name.trim(),
      grade: "A",
      note: "수주에서 자동 추가",
      createdAt: Date.now(),
    }]);
  };

  const startEdit = (c) => { setEditId(c.id); setEditDraft({ ...c }); };
  const cancelEdit = () => { setEditId(null); setEditDraft(null); };
  const saveEdit = () => {
    if (!editDraft || !editDraft.name.trim()) return;
    setClients(cs => cs.map(c => c.id === editId
      ? { ...editDraft, name: editDraft.name.trim(), note: (editDraft.note || "").trim() }
      : c));
    cancelEdit();
  };
  const deleteClient = (id) => {
    if (!window.confirm("이 거래처를 삭제할까요?")) return;
    setClients(cs => cs.filter(c => c.id !== id));
  };

  const gradeColor = { A: "#6366F1", B: "#10B981", C: "#F59E0B", D: "#EF4444" };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 28 }}>

      {/* 신규 등록 */}
      <div>
        <div style={{ fontSize: 17, fontWeight: 800, color: NAVY, marginBottom: 14 }}>👥 거래처 등록</div>
        <div className="card">
          <div style={{ fontSize: 12, fontWeight: 600, color: "var(--text2)", marginBottom: 10 }}>새 거래처 추가</div>
          <div style={{ display: "grid", gridTemplateColumns: "1.6fr 120px 1.4fr auto", gap: 8 }}>
            <input placeholder="거래처명 (예: ○○건설)" value={newClient.name}
              onChange={e => setNewClient({ ...newClient, name: e.target.value })}
              onKeyDown={e => e.key === "Enter" && addClient()} />
            <select value={newClient.grade} onChange={e => setNewClient({ ...newClient, grade: e.target.value })}>
              {GRADES.map(g => <option key={g} value={g}>{g} 등급</option>)}
            </select>
            <input type="text" placeholder="메모 (선택)" value={newClient.note}
              onChange={e => setNewClient({ ...newClient, note: e.target.value })}
              onKeyDown={e => e.key === "Enter" && addClient()} />
            <button className="btn-orange" onClick={addClient} style={{ height: 42, padding: "0 16px", whiteSpace: "nowrap" }}>+ 추가</button>
          </div>
          <div style={{ marginTop: 10, fontSize: 12, color: "var(--text2)" }}>
            ※ 등급(A/B/C/D)은 단가 계산기의 등급별 단가에 매핑됩니다. 견적서에서 거래처 선택 시 해당 등급이 자동 적용돼요.
          </div>
        </div>
      </div>

      {/* 등록된 거래처 목록 */}
      <div>
        <div style={{ fontSize: 17, fontWeight: 800, color: NAVY, marginBottom: 14 }}>
          📋 등록된 거래처{" "}
          <span style={{ fontSize: 13, color: "var(--text2)", fontWeight: 600 }}>
            ({search.trim() || gradeFilter !== "ALL" ? `${filteredClients.length} / ${clients.length}` : `${clients.length}곳`})
          </span>
        </div>
        {clients.length > 0 && (
          <div className="card" style={{ marginBottom: 10 }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 140px auto", gap: 8, alignItems: "center" }}>
              <input type="text" placeholder="🔍 거래처명 또는 메모 검색"
                value={search} onChange={e => setSearch(e.target.value)} />
              <select value={gradeFilter} onChange={e => setGradeFilter(e.target.value)}>
                <option value="ALL">전체 등급</option>
                {GRADES.map(g => <option key={g} value={g}>{g} 등급</option>)}
              </select>
              <button onClick={() => { setSearch(""); setGradeFilter("ALL"); }}
                disabled={!search && gradeFilter === "ALL"}
                style={{
                  height: 42, padding: "0 14px", whiteSpace: "nowrap",
                  border: "1.5px solid var(--divider)", borderRadius: 10,
                  background: "transparent", cursor: (!search && gradeFilter === "ALL") ? "not-allowed" : "pointer",
                  fontSize: 13, fontFamily: "inherit", color: "var(--text2)",
                  opacity: (!search && gradeFilter === "ALL") ? 0.5 : 1
                }}>초기화</button>
            </div>
          </div>
        )}
        <div className="card" style={{ padding: 0, overflow: "hidden" }}>
          {clients.length === 0 ? (
            <div style={{ padding: "32px 16px", textAlign: "center", color: "var(--text2)", fontSize: 13 }}>
              등록된 거래처가 없습니다. 위에서 추가해보세요.
            </div>
          ) : filteredClients.length === 0 ? (
            <div style={{ padding: "32px 16px", textAlign: "center", color: "var(--text2)", fontSize: 13 }}>
              검색 결과가 없습니다.
            </div>
          ) : (
            <table>
              <thead><tr>
                <th style={{ width: 64, textAlign: "center" }}>로고</th>
                <th>거래처명</th>
                <th style={{ textAlign: "center", width: 100 }}>적용 등급</th>
                <th>메모</th>
                <th style={{ textAlign: "center", width: 110 }}>관리</th>
              </tr></thead>
              <tbody>
                {filteredClients.map(c => (
                  <tr key={c.id}>
                    {editId === c.id ? (
                      <>
                        <td style={{ padding: 6 }}>
                          <div style={{ width: 56 }}>
                            <ImageUploader value={editDraft.logo || ""} onChange={dataUrl => setEditDraft({ ...editDraft, logo: dataUrl })} label="로고" maxWidth={400} height={56} />
                          </div>
                        </td>
                        <td><input type="text" value={editDraft.name} onChange={e => setEditDraft({ ...editDraft, name: e.target.value })} /></td>
                        <td><select value={editDraft.grade} onChange={e => setEditDraft({ ...editDraft, grade: e.target.value })}>
                          {GRADES.map(g => <option key={g} value={g}>{g}</option>)}
                        </select></td>
                        <td><input type="text" value={editDraft.note || ""} onChange={e => setEditDraft({ ...editDraft, note: e.target.value })} /></td>
                        <td style={{ textAlign: "center" }}>
                          <button onClick={saveEdit} style={{ background: "none", border: "none", cursor: "pointer", color: "#10B981", fontSize: 16, marginRight: 8 }}>✓</button>
                          <button onClick={cancelEdit} style={{ background: "none", border: "none", cursor: "pointer", color: "var(--text2)", fontSize: 15 }}>✕</button>
                        </td>
                      </>
                    ) : (
                      <>
                        <td style={{ textAlign: "center" }}>
                          {c.logo ? (
                            <img src={c.logo} alt="로고" style={{ width: 48, height: 48, objectFit: "contain", borderRadius: 8, border: "1px solid var(--border)", background: "#fff" }} />
                          ) : (
                            <div style={{ width: 48, height: 48, borderRadius: 8, background: "var(--surface2)", display: "inline-flex", alignItems: "center", justifyContent: "center", color: "var(--text3)", fontSize: 16 }}>🏢</div>
                          )}
                        </td>
                        <td style={{ fontWeight: 600 }}>{c.name}</td>
                        <td style={{ textAlign: "center" }}>
                          <span style={{ display: "inline-block", padding: "3px 12px", borderRadius: 999, background: gradeColor[c.grade] + "22", color: gradeColor[c.grade], fontSize: 12, fontWeight: 700 }}>{c.grade}</span>
                        </td>
                        <td style={{ fontSize: 13, color: "var(--text2)" }}>{c.note}</td>
                        <td style={{ textAlign: "center" }}>
                          <button onClick={() => startEdit(c)} title="수정" style={{ background: "none", border: "none", cursor: "pointer", color: "var(--text2)", fontSize: 14, marginRight: 8 }}>✏️</button>
                          <button onClick={() => deleteClient(c.id)} title="삭제" style={{ background: "none", border: "none", cursor: "pointer", color: "#F04452", fontSize: 14 }}>✕</button>
                        </td>
                      </>
                    )}
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      </div>

      {/* 수주에서 자동 추출 */}
      {detectedClients.length > 0 && (
        <div>
          <div style={{ fontSize: 17, fontWeight: 800, color: NAVY, marginBottom: 14 }}>🔍 수주에서 발견된 미등록 거래처</div>
          <div className="card">
            <div style={{ fontSize: 12, color: "var(--text2)", marginBottom: 12 }}>
              경영 대시보드의 수주 정보에 입력된 거래처 중 아직 등록되지 않은 것입니다. 클릭하면 A 등급으로 빠르게 등록됩니다.
            </div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
              {detectedClients.map(name => (
                <button key={name} onClick={() => registerDetected(name)} style={{
                  padding: "8px 14px", borderRadius: 10, border: "1.5px dashed var(--divider)",
                  background: "transparent", cursor: "pointer", fontSize: 13, fontFamily: "inherit",
                  color: "var(--text)", transition: "all 0.15s"
                }}>+ {name}</button>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function SuppliersTab({ suppliers, setSuppliers, materials, fabricIntakes, darkMode }) {
  const [newSupplier, setNewSupplier] = useState({ name: "", contact: "", phone: "", email: "", address: "", items: "", paymentTerms: "", note: "" });
  const [editId, setEditId] = useState(null);
  const [editDraft, setEditDraft] = useState(null);
  const [search, setSearch] = useState("");

  const filtered = suppliers.filter(s => {
    const q = search.trim().toLowerCase();
    if (!q) return true;
    return (s.name || "").toLowerCase().includes(q)
      || (s.contact || "").toLowerCase().includes(q)
      || (s.items || "").toLowerCase().includes(q)
      || (s.note || "").toLowerCase().includes(q);
  });

  // 입고 기록에서 공급업체명 추출 → 미등록만
  const registeredNames = new Set(suppliers.map(s => (s.name || "").trim()));
  const detectedSuppliers = Array.from(new Set(
    (fabricIntakes || [])
      .map(r => (r.supplier || "").trim())
      .filter(name => name && !registeredNames.has(name))
  ));

  const addSupplier = () => {
    const name = newSupplier.name.trim();
    if (!name) return;
    if (registeredNames.has(name)) { alert("이미 등록된 공급처입니다: " + name); return; }
    setSuppliers(ss => [...ss, { id: uid(), ...newSupplier, name, createdAt: Date.now() }]);
    setNewSupplier({ name: "", contact: "", phone: "", email: "", address: "", items: "", paymentTerms: "", note: "" });
  };

  const registerDetected = (name) => {
    setSuppliers(ss => [...ss, { id: uid(), name: name.trim(), contact: "", phone: "", email: "", address: "", items: "", paymentTerms: "", note: "입고기록에서 자동 추가", createdAt: Date.now() }]);
  };

  const startEdit = (s) => { setEditId(s.id); setEditDraft({ ...s }); };
  const cancelEdit = () => { setEditId(null); setEditDraft(null); };
  const saveEdit = () => {
    if (!editDraft || !editDraft.name.trim()) return;
    setSuppliers(ss => ss.map(s => s.id === editId ? { ...editDraft, name: editDraft.name.trim() } : s));
    cancelEdit();
  };
  const deleteSupplier = (id) => {
    if (!window.confirm("이 공급처를 삭제할까요?")) return;
    setSuppliers(ss => ss.filter(s => s.id !== id));
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 28 }}>
      {/* 신규 등록 */}
      <div>
        <div style={{ fontSize: 17, fontWeight: 800, color: NAVY, marginBottom: 14 }}>🏭 공급처 등록</div>
        <div className="card">
          <div style={{ fontSize: 12, fontWeight: 600, color: "var(--text2)", marginBottom: 10 }}>새 공급처 추가</div>
          <div style={{ display: "grid", gridTemplateColumns: "1.4fr 1fr 1fr 1.2fr", gap: 8, marginBottom: 8 }}>
            <input placeholder="공급처명 * (예: ○○섬유)" value={newSupplier.name} onChange={e => setNewSupplier({ ...newSupplier, name: e.target.value })} onKeyDown={e => e.key === "Enter" && addSupplier()} />
            <input placeholder="담당자" value={newSupplier.contact} onChange={e => setNewSupplier({ ...newSupplier, contact: e.target.value })} />
            <input placeholder="전화번호" value={newSupplier.phone} onChange={e => setNewSupplier({ ...newSupplier, phone: e.target.value })} />
            <input placeholder="이메일" value={newSupplier.email} onChange={e => setNewSupplier({ ...newSupplier, email: e.target.value })} />
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1.6fr 1.4fr 1fr auto", gap: 8 }}>
            <input placeholder="주소" value={newSupplier.address} onChange={e => setNewSupplier({ ...newSupplier, address: e.target.value })} />
            <input placeholder="공급 품목 (콤마 구분)" value={newSupplier.items} onChange={e => setNewSupplier({ ...newSupplier, items: e.target.value })} />
            <input placeholder="결제 조건 (예: 월말 30일)" value={newSupplier.paymentTerms} onChange={e => setNewSupplier({ ...newSupplier, paymentTerms: e.target.value })} />
            <button className="btn-primary" onClick={addSupplier} style={{ padding: "0 22px", height: 44, fontSize: 13, fontWeight: 700 }}>+ 등록</button>
          </div>
          {newSupplier.note !== undefined && (
            <input style={{ marginTop: 8, width: "100%" }} placeholder="비고 / 메모" value={newSupplier.note} onChange={e => setNewSupplier({ ...newSupplier, note: e.target.value })} />
          )}
        </div>
      </div>

      {/* 자동 감지 */}
      {detectedSuppliers.length > 0 && (
        <div>
          <div style={{ fontSize: 14, fontWeight: 700, color: "#FF9500", marginBottom: 10 }}>🔍 입고기록에서 발견된 미등록 공급처 ({detectedSuppliers.length})</div>
          <div className="card" style={{ background: "rgba(255,149,0,0.05)" }}>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
              {detectedSuppliers.map(name => (
                <button key={name} onClick={() => registerDetected(name)} style={{ padding: "8px 14px", borderRadius: 100, border: "1.5px solid #FF9500", background: "#fff", color: "#FF9500", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>+ {name}</button>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* 목록 */}
      <div>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14 }}>
          <div style={{ fontSize: 17, fontWeight: 800, color: NAVY }}>📋 공급처 목록 ({filtered.length}/{suppliers.length})</div>
          <input placeholder="공급처/담당자/품목 검색" value={search} onChange={e => setSearch(e.target.value)} style={{ flex: 1, maxWidth: 320, height: 38, fontSize: 13 }} />
        </div>
        {filtered.length === 0 ? (
          <div className="card" style={{ padding: 40, textAlign: "center", color: "var(--text3)" }}>
            {suppliers.length === 0 ? "등록된 공급처가 없습니다" : "검색 결과가 없습니다"}
          </div>
        ) : (
          <div className="card" style={{ overflowX: "auto" }}>
            <table>
              <thead><tr>
                <th>공급처명</th><th>담당자</th><th>전화</th><th>이메일</th><th>품목</th><th>결제 조건</th><th>비고</th><th style={{ textAlign: "center", width: 100 }}>관리</th>
              </tr></thead>
              <tbody>
                {filtered.map(s => editId === s.id ? (
                  <tr key={s.id} style={{ background: "var(--surface2)" }}>
                    <td><input value={editDraft.name} onChange={e => setEditDraft({ ...editDraft, name: e.target.value })} /></td>
                    <td><input value={editDraft.contact || ""} onChange={e => setEditDraft({ ...editDraft, contact: e.target.value })} /></td>
                    <td><input value={editDraft.phone || ""} onChange={e => setEditDraft({ ...editDraft, phone: e.target.value })} /></td>
                    <td><input value={editDraft.email || ""} onChange={e => setEditDraft({ ...editDraft, email: e.target.value })} /></td>
                    <td><input value={editDraft.items || ""} onChange={e => setEditDraft({ ...editDraft, items: e.target.value })} /></td>
                    <td><input value={editDraft.paymentTerms || ""} onChange={e => setEditDraft({ ...editDraft, paymentTerms: e.target.value })} /></td>
                    <td><input value={editDraft.note || ""} onChange={e => setEditDraft({ ...editDraft, note: e.target.value })} /></td>
                    <td style={{ textAlign: "center" }}>
                      <button onClick={saveEdit} style={{ padding: "4px 8px", marginRight: 4, border: "none", background: "#10B981", color: "#fff", borderRadius: 6, fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>저장</button>
                      <button onClick={cancelEdit} style={{ padding: "4px 8px", border: "none", background: "var(--surface2)", color: "var(--text2)", borderRadius: 6, fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>취소</button>
                    </td>
                  </tr>
                ) : (
                  <tr key={s.id}>
                    <td style={{ fontWeight: 700, fontSize: 13 }}>{s.name}</td>
                    <td style={{ fontSize: 13 }}>{s.contact}</td>
                    <td style={{ fontSize: 13, color: "var(--text2)" }}>{s.phone}</td>
                    <td style={{ fontSize: 13, color: "var(--text2)" }}>{s.email}</td>
                    <td style={{ fontSize: 12, color: "var(--text2)", maxWidth: 200 }}>{s.items}</td>
                    <td style={{ fontSize: 12, color: "var(--text2)" }}>{s.paymentTerms}</td>
                    <td style={{ fontSize: 12, color: "var(--text2)" }}>{s.note}</td>
                    <td style={{ textAlign: "center" }}>
                      <button onClick={() => startEdit(s)} style={{ background: "none", border: "none", cursor: "pointer", color: "#6366F1", fontSize: 14, marginRight: 6, fontFamily: "inherit" }}>✏️</button>
                      <button onClick={() => deleteSupplier(s.id)} style={{ background: "none", border: "none", cursor: "pointer", color: "#F04452", fontSize: 14, fontFamily: "inherit" }}>✕</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("calc");
  const [sidebarCollapsed, setSidebarCollapsed] = useState(load("frw_sidebar_collapsed", false));
  useEffect(() => { save("frw_sidebar_collapsed", sidebarCollapsed); }, [sidebarCollapsed]);
  const [darkMode, setDarkMode] = useState(() => load("frw_dark", false));
  const [materials, setMaterials] = useState(() => load("frw_materials", INIT_MATERIALS));
  const [laborItems, setLaborItems] = useState(() => load("frw_labor", INIT_LABOR));
  const [products, setProducts] = useState(() => {
    const raw = load("frw_products", null);
    if (!raw || !Array.isArray(raw) || raw.length === 0) return INIT_PRODUCTS;
    try { return raw.map(migrateProduct); } catch (e) { console.error("product migration failed", e); return INIT_PRODUCTS; }
  });
  const [activeProdId, setActiveProdId] = useState(() => {
    const saved = load("frw_products", null);
    return saved ? saved[0].id : INIT_PRODUCTS[0].id;
  });
  const [newProdName, setNewProdName] = useState("");
  const [apiKey, setApiKey] = useState(() => load("frw_apikey", ""));
  const [editingProdName, setEditingProdName] = useState(null);
  const [editingSpec, setEditingSpec] = useState(null);
  const [editingGradeName, setEditingGradeName] = useState(null);
  const [syncStatus, setSyncStatus] = useState("syncing");
  const [quote, setQuote] = useState("");
  const [generating, setGenerating] = useState(false);
  const [apiError, setApiError] = useState("");
  const [editingQuote, setEditingQuote] = useState(false);
  const [savedQuotes, setSavedQuotes] = useState(() => load("frw_quote_history", []));
  const [viewingQuote, setViewingQuote] = useState(null);
  const [quoteTitle, setQuoteTitle] = useState("");
  const [quoteClient, setQuoteClient] = useState("");
  const [quoteSubTab, setQuoteSubTab] = useState("current"); // "current" | "history"
  const [quoteStyle, setQuoteStyle] = useState(() => load("frw_quote_style", "apple")); // apple | bold | card | korean
  useEffect(() => { save("frw_quote_style", quoteStyle); }, [quoteStyle]);
  const [prodSearch, setProdSearch] = useState("");
  const [showProdSearch, setShowProdSearch] = useState(false);
  const [orders, setOrders] = useState(() => load("frw_orders", []));
  const [clients, setClients] = useState(() => load("frw_clients", []));
  const [globalSearch, setGlobalSearch] = useState("");
  const [bids, setBids] = useState(() => load("frw_bids", []));
  const [suppliers, setSuppliers] = useState(() => load("frw_suppliers", []));
  const [purchaseOrders, setPurchaseOrders] = useState(() => load("frw_purchase_orders", []));
  const [poSubTab, setPoSubTab] = useState("current"); // "current" | "history"
  const [poStyle, setPoStyle] = useState(() => load("frw_po_style", "apple")); // apple | bold | card | korean
  useEffect(() => { save("frw_po_style", poStyle); }, [poStyle]);
  const [poDraft, setPoDraft] = useState(() => load("frw_po_draft", null)); // 작성 중인 발주서
  const [viewingPO, setViewingPO] = useState(null);
  const [poGenerating, setPoGenerating] = useState(false);
  const [poApiError, setPoApiError] = useState("");
  const [fabricIntakes, setFabricIntakes] = useState(() => load("frw_intakes", []));
  const [monthlySales, setMonthlySales] = useState(() => load("frw_monthly_sales", {}));
  const [fabricDropInfo, setFabricDropInfo] = useState(null); // { id, side: 'top'|'bottom' }
  useEffect(() => {
    document.body.classList.toggle("dark", darkMode);
    save("frw_dark", darkMode);
  }, [darkMode]);

  const initialized = useRef(false);
  const syncTimer = useRef(null);
  const prodNameRef = useRef(null);
  const dragProd = useRef(null);
  const dragFabric = useRef(null);
  const historyStack = useRef([]);
  const historyPointer = useRef(-1);

  const pushHistory = useCallback(() => {
    const snapshot = {
      materials: JSON.parse(JSON.stringify(materials)),
      laborItems: JSON.parse(JSON.stringify(laborItems)),
      products: JSON.parse(JSON.stringify(products)),
    };
    // Trim any redo-future if we branched
    historyStack.current = historyStack.current.slice(0, historyPointer.current + 1);
    historyStack.current.push(snapshot);
    if (historyStack.current.length > 50) historyStack.current.shift();
    historyPointer.current = historyStack.current.length - 1;
  }, [materials, laborItems, products]);

  const handleUndo = useCallback(() => {
    if (historyPointer.current < 1) return; // nothing to undo (need at least 2 states)
    historyPointer.current -= 1;
    const snap = historyStack.current[historyPointer.current];
    if (!snap) return;
    setMaterials(snap.materials);
    setLaborItems(snap.laborItems);
    setProducts(snap.products);
  }, []);

  // Ctrl+Z / Cmd+Z keyboard listener
  useEffect(() => {
    const onKey = (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "z" && !e.shiftKey) {
        e.preventDefault();
        handleUndo();
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [handleUndo]);

  const applyCloudData = (d) => {
    if (!d) return;
    if (d.materials) setMaterials(d.materials);
    if (d.laborItems) setLaborItems(d.laborItems);
    if (d.products && d.products.length > 0) {
      const migrated = d.products.map(migrateProduct);
      setProducts(migrated);
      setActiveProdId(prev => migrated.find(p => p.id === prev) ? prev : migrated[0].id);
    }
    if (d.apiKey !== undefined) setApiKey(d.apiKey);
    if (d.quoteHistory) { setSavedQuotes(d.quoteHistory); save("frw_quote_history", d.quoteHistory); }
    if (d.orders) setOrders(d.orders);
    if (d.clients) setClients(d.clients);
    if (d.bids) setBids(d.bids);
    if (d.suppliers) setSuppliers(d.suppliers);
    if (d.purchaseOrders) { setPurchaseOrders(d.purchaseOrders); save("frw_purchase_orders", d.purchaseOrders); }
    if (d.fabricIntakes) setFabricIntakes(d.fabricIntakes);
    if (d.monthlySales) setMonthlySales(d.monthlySales);
  };

  useEffect(() => {
    cloudLoad().then(d => { applyCloudData(d); setSyncStatus("saved"); })
      .catch(() => setSyncStatus("error")).finally(() => { initialized.current = true; });
  }, []);

  useEffect(() => {
    const onVisible = () => {
      if (document.visibilityState === "visible" && initialized.current) {
        setSyncStatus("syncing");
        cloudLoad().then(d => { applyCloudData(d); setSyncStatus("saved"); }).catch(() => setSyncStatus("error"));
      }
    };
    document.addEventListener("visibilitychange", onVisible);
    return () => document.removeEventListener("visibilitychange", onVisible);
  }, []);

  useEffect(() => {
    save("frw_materials", materials); save("frw_labor", laborItems);
    save("frw_products", products); save("frw_apikey", apiKey);
    save("frw_orders", orders); save("frw_clients", clients); save("frw_suppliers", suppliers); save("frw_purchase_orders", purchaseOrders); save("frw_intakes", fabricIntakes); save("frw_monthly_sales", monthlySales); save("frw_bids", bids);
    if (!initialized.current) return;
    setSyncStatus("syncing");
    if (syncTimer.current) clearTimeout(syncTimer.current);
    syncTimer.current = setTimeout(() => {
      cloudSave({ materials, laborItems, products, apiKey, quoteHistory: savedQuotes, orders, clients, suppliers, purchaseOrders, fabricIntakes, monthlySales, bids })
        .then(() => setSyncStatus("saved")).catch(() => setSyncStatus("error"));
    }, 1500);
  }, [materials, laborItems, products, apiKey, orders, clients, suppliers, purchaseOrders, fabricIntakes, monthlySales, bids]);

  const rawActiveProd = products.find(p => p.id === activeProdId) || products[0];
  const activeSpec = getActiveSpec(rawActiveProd) || {};
  // 호환성을 위해 spec 필드를 product 레벨에 머지해서 노출
  const activeProd = {
    id: rawActiveProd.id,
    name: rawActiveProd.name,
    specs: rawActiveProd.specs,
    activeSpecId: rawActiveProd.activeSpecId,
    include: rawActiveProd.include,
    marketPrice: rawActiveProd.marketPrice,
    fabrics: activeSpec.fabrics || [],
    extras: activeSpec.extras || [],
    grades: (activeSpec.grades && activeSpec.grades.length > 0) ? activeSpec.grades : [...GRADES],
    margins: activeSpec.margins || { ...DEFAULT_MARGINS },
    priceOverrides: activeSpec.priceOverrides || { A: "", B: "", C: "", D: "" },
    selectedGrade: activeSpec.selectedGrade || "A",
    adminRate: activeSpec.adminRate ?? 10,
  };

  const PRODUCT_LEVEL_FIELDS = new Set(["name", "include", "marketPrice"]);
  const updateActiveSpec = (updater) =>
    setProducts(ps => ps.map(p => {
      if (p.id !== activeProdId) return p;
      const idx = p.specs.findIndex(s => s.id === p.activeSpecId);
      if (idx < 0) return p;
      const newSpecs = [...p.specs];
      newSpecs[idx] = updater(newSpecs[idx]);
      return { ...p, specs: newSpecs };
    }));

  // 요척서 (spec) 관리
  const addSpec = () => {
    pushHistory();
    setProducts(ps => ps.map(p => {
      if (p.id !== activeProdId) return p;
      const baseNum = (p.specs.length || 0) + 1;
      let n = baseNum;
      while (p.specs.some(s => s.name === `요척서 ${n}`)) n++;
      const s = { ...newSpec(`요척서 ${n}`) };
      // 기존 활성 spec의 데이터를 복제 (단가 비교용)
      const cur = p.specs.find(x => x.id === p.activeSpecId) || p.specs[0];
      if (cur) {
        s.fabrics = (cur.fabrics || []).map(f => ({ ...f, id: uid() }));
        s.extras = (cur.extras || []).map(e => ({ ...e, id: uid() }));
        s.margins = { ...(cur.margins || DEFAULT_MARGINS) };
        s.priceOverrides = { ...(cur.priceOverrides || { A: "", B: "", C: "", D: "" }) };
        s.selectedGrade = cur.selectedGrade || "A";
        s.adminRate = cur.adminRate ?? 10;
      }
      return { ...p, specs: [...p.specs, s], activeSpecId: s.id };
    }));
  };
  const deleteSpec = (specId) => {
    pushHistory();
    setProducts(ps => ps.map(p => {
      if (p.id !== activeProdId) return p;
      if (p.specs.length <= 1) return p;
      const remaining = p.specs.filter(s => s.id !== specId);
      const newActive = p.activeSpecId === specId ? remaining[0].id : p.activeSpecId;
      return { ...p, specs: remaining, activeSpecId: newActive };
    }));
  };
  const renameSpec = (specId, name) => {
    setProducts(ps => ps.map(p => p.id !== activeProdId ? p : {
      ...p,
      specs: p.specs.map(s => s.id === specId ? { ...s, name } : s),
    }));
  };
  const switchSpec = (specId) => {
    setProducts(ps => ps.map(p => p.id === activeProdId ? { ...p, activeSpecId: specId } : p));
  };

  // 등급(grade) 관리
  const generateGradeName = (grades, afterIdx) => {
    const a = grades[afterIdx];
    const b = grades[afterIdx + 1];
    if (a && b) return `${a}-${b}`;
    if (a) return `${a}+`;
    return "신규";
  };
  const insertGrade = (afterIdx) => {
    pushHistory();
    updateActiveSpec(s => {
      const grades = [...(s.grades || [...GRADES])];
      let baseName = generateGradeName(grades, afterIdx);
      let name = baseName;
      let n = 2;
      while (grades.includes(name)) { name = `${baseName} (${n++})`; }
      const insertAt = afterIdx + 1;
      grades.splice(insertAt, 0, name);
      // 인접 등급 마진율 평균
      const before = s.margins?.[grades[afterIdx]] ?? 30;
      const after = (afterIdx + 2 < grades.length) ? (s.margins?.[grades[afterIdx + 2]] ?? before) : before;
      const avgMargin = Math.round((before + after) / 2);
      return {
        ...s,
        grades,
        margins: { ...(s.margins || {}), [name]: avgMargin },
        priceOverrides: { ...(s.priceOverrides || {}), [name]: "" },
      };
    });
  };
  const deleteGrade = (g) => {
    updateActiveSpec(s => {
      const grades = (s.grades || [...GRADES]).filter(x => x !== g);
      if (grades.length === 0) return s;
      const margins = { ...(s.margins || {}) }; delete margins[g];
      const priceOverrides = { ...(s.priceOverrides || {}) }; delete priceOverrides[g];
      const selectedGrade = s.selectedGrade === g ? grades[0] : s.selectedGrade;
      return { ...s, grades, margins, priceOverrides, selectedGrade };
    });
  };
  const renameGrade = (oldName, newName) => {
    if (!newName || oldName === newName) return;
    updateActiveSpec(s => {
      const grades = (s.grades || [...GRADES]).map(x => x === oldName ? newName : x);
      const margins = { ...(s.margins || {}) };
      const priceOverrides = { ...(s.priceOverrides || {}) };
      if (margins[oldName] !== undefined) { margins[newName] = margins[oldName]; delete margins[oldName]; }
      if (priceOverrides[oldName] !== undefined) { priceOverrides[newName] = priceOverrides[oldName]; delete priceOverrides[oldName]; }
      const selectedGrade = s.selectedGrade === oldName ? newName : s.selectedGrade;
      return { ...s, grades, margins, priceOverrides, selectedGrade };
    });
  };

  const calc = computeProduct(rawActiveProd, materials, laborItems);
  const fabricCost = calc.fCost;
  const extraCost = calc.eCost;
  const baseTotal = calc.base;
  const adminAmt = calc.admin;
  const beforeMargin = calc.beforeMargin;
  const gradePrices = calc.grades;
  const calcGradePrices = calc.calcGrades;
  const overriddenGrades = calc.overridden;
  const marginAmt = calc.marginAmt;
  const finalPrice = calc.finalPrice;

  const updProd = (field, value) =>
    setProducts(ps => ps.map(p => {
      if (p.id !== activeProdId) return p;
      if (PRODUCT_LEVEL_FIELDS.has(field)) {
        return { ...p, [field]: value };
      }
      const idx = p.specs.findIndex(s => s.id === p.activeSpecId);
      if (idx < 0) return p;
      const newSpecs = [...p.specs];
      newSpecs[idx] = { ...newSpecs[idx], [field]: value };
      return { ...p, specs: newSpecs };
    }));

  const addProduct = () => {
    if (!newProdName.trim()) return;
    pushHistory();
    const p = newProduct(newProdName.trim());
    setProducts(ps => [...ps, p]); setActiveProdId(p.id); setNewProdName("");
  };
  const deleteProduct = (id) => {
    if (products.length <= 1) return;
    pushHistory();
    const remaining = products.filter(p => p.id !== id);
    setProducts(remaining);
    if (activeProdId === id) setActiveProdId(remaining[0].id);
  };
  const duplicateProduct = (id) => {
    const src = products.find(p => p.id === id);
    if (!src) return;
    pushHistory();
    const now = new Date();
    const stamp = `${String(now.getMonth()+1).padStart(2,"0")}.${String(now.getDate()).padStart(2,"0")}`;
    const baseName = (src.name || "").replace(/ \([0-9]{2}\.[0-9]{2}\)$/, "").replace(/ \(사본( \d+)?\)$/, "");
    const dupName = `${baseName} (${stamp})`;
    const newSpecs = (src.specs || []).map(s => ({
      ...s,
      id: uid(),
      fabrics: (s.fabrics || []).map(f => ({ ...f, id: uid() })),
      extras: (s.extras || []).map(e => ({ ...e, id: uid() })),
      margins: { ...(s.margins || DEFAULT_MARGINS) },
      priceOverrides: { ...(s.priceOverrides || {}) },
    }));
    const copy = {
      id: uid(),
      name: dupName,
      specs: newSpecs,
      activeSpecId: newSpecs[0] && newSpecs[0].id,
      include: src.include,
      marketPrice: src.marketPrice,
    };
    const idx = products.findIndex(p => p.id === id);
    setProducts(ps => {
      const arr = [...ps];
      arr.splice(idx + 1, 0, copy);
      return arr;
    });
    setActiveProdId(copy.id);
  };
  const saveProdName = () => {

                              <div style={{ flex: 1, minWidth: 0 }}>

                                <div style={{ fontSize: 11, color: "var(--text2)", marginTop: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r.sub}</div>
                              </div>
                              <span style={{ fontSize: 10, padding: "2px 7px", borderRadius: 5, background: "var(--divider)", color: "var(--text2)", fontWeight: 700, flexShrink: 0 }}>{r.type}</span>
                            </div>
