        {tab === "purchase" && poSubTab === "history" && (
          <div>
            {viewingPO ? (
              <>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, gap: 12, flexWrap: "wrap" }} className="no-print">
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <button onClick={() => setViewingPO(null)} style={{ padding: "8px 14px", border: `1.5px solid ${T.ghostBorder}`, borderRadius: 10, background: T.ghostBg, color: T.ghostColor, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>← 목록</button>
                    <div>
                      <div style={{ fontSize: 16, fontWeight: 800, color: T.text }}>{viewingPO.title}</div>

                }>

                    <div style={{ marginTop: 32 }}>
                      <h2>참고 사진 (Reference Photos)</h2>
                      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 12, marginTop: 12 }}>
                        {viewingPO.photos.map((ph, idx) => (

            ) : (

                  const q = poHistorySearch.trim().toLowerCase();
                  const filtered = purchaseOrders.filter(po => {
                    if (poHistorySupFilter && (po.supplier?.name || "") !== poHistorySupFilter) return false;
                    if (!q) return true;
                    return (po.title || "").toLowerCase().includes(q)
                      || (po.supplier?.name || "").toLowerCase().includes(q)
                      || (po.supplier?.contact || "").toLowerCase().includes(q)
                      || (po.items || []).some(it => (it.name || "").toLowerCase().includes(q))
                      || (po.memo || "").toLowerCase().includes(q);
                  });
                  // 정렬
                  const sorted = [...filtered].sort((a, b) => {
                    if (poHistorySort === "date_asc") return getDate(a).localeCompare(getDate(b));
                    if (poHistorySort === "amount_desc") return (Number(b.totalAmount)||0) - (Number(a.totalAmount)||0);
                    if (poHistorySort === "supplier") return (a.supplier?.name || "").localeCompare(b.supplier?.name || "");
                    return getDate(b).localeCompare(getDate(a)); // date_desc 기본
                  });
                  // 거래처별 합계 (전체 기준, 필터 무관)
                  const supplierTotals = {};
                  purchaseOrders.forEach(po => {
                    const name = po.supplier?.name || "(미지정)";
                    if (!supplierTotals[name]) supplierTotals[name] = { count: 0, amount: 0 };
                    supplierTotals[name].count += 1;
                    supplierTotals[name].amount += Number(po.totalAmount) || 0;
                  });
                  const supList = Object.entries(supplierTotals).sort((a, b) => b[1].amount - a[1].amount);
                  const grandTotal = purchaseOrders.reduce((s, po) => s + (Number(po.totalAmount) || 0), 0);
                  const filteredTotal = filtered.reduce((s, po) => s + (Number(po.totalAmount) || 0), 0);

                  return (
                    <>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, flexWrap: "wrap", gap: 8 }}>
                        <div style={{ fontSize: 18, fontWeight: 800, color: T.text }}>발주 이력 ({purchaseOrders.length})</div>
                        <div style={{ fontSize: 12, color: T.text2 }}>전체 합계 <span style={{ fontWeight: 800, color: NAVY, fontSize: 14 }}>{grandTotal.toLocaleString()}원</span></div>
                      </div>

                      {purchaseOrders.length === 0 ? (
                        <div className="card" style={{ padding: 64, textAlign: "center" }}>
                          <div style={{ fontSize: 48, marginBottom: 16 }}>🗂️</div>
                          <div style={{ fontSize: 17, fontWeight: 700, color: T.ghostColor, marginBottom: 8 }}>저장된 발주서가 없습니다</div>
                          <div style={{ fontSize: 14, color: T.empty }}>발주서를 작성하고 저장하면 이곳에 누적됩니다</div>
                        </div>
                      ) : (
                        <>
                          {/* 거래처별 합계 카드 */}
                          <div className="card" style={{ marginBottom: 16 }}>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                              <div style={{ fontSize: 14, fontWeight: 800, color: T.text }}>🏭 거래처별 발주 합계 ({supList.length}곳)</div>
                              {poHistorySupFilter && (
                                <button onClick={() => setPoHistorySupFilter("")} style={{ padding: "5px 12px", borderRadius: 8, border: `1px solid ${T.divider}`, background: "transparent", color: T.text2, fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>필터 해제</button>
                              )}
                            </div>
                            <div className="chip-scroll" style={{ gap: 8 }}>
                              {supList.map(([name, info]) => {
                                const active = poHistorySupFilter === name;
                                return (
                                  <button key={name} onClick={() => setPoHistorySupFilter(active ? "" : name)}
                                    style={{
                                      flexShrink: 0, padding: "10px 16px", borderRadius: 12, fontFamily: "inherit",
                                      background: active ? "linear-gradient(135deg, #EC6608, #D85800)" : "var(--surface2)",
                                      color: active ? "#fff" : "var(--text1)",
                                      border: active ? "none" : "1px solid var(--divider)",
                                      cursor: "pointer", textAlign: "left",
                                      boxShadow: active ? "0 4px 14px rgba(236,102,8,0.32)" : "none",
                                      minWidth: 180,
                                    }}>
                                    <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 4, opacity: active ? 0.9 : 1 }}>🏭 {name}</div>
                                    <div style={{ fontSize: 15, fontWeight: 800, letterSpacing: -0.3 }}>{Number(info.amount).toLocaleString()}<span style={{ fontSize: 11, fontWeight: 600, marginLeft: 2, opacity: 0.85 }}>원</span></div>
                                    <div style={{ fontSize: 10, opacity: 0.75, marginTop: 2 }}>{info.count}건 · 평균 {Math.round(info.amount/info.count).toLocaleString()}원</div>
                                  </button>
                                );
                              })}
                            </div>
                          </div>

                          {/* 검색 + 정렬 */}
                          <div style={{ display: "flex", gap: 8, marginBottom: 14, flexWrap: "wrap", alignItems: "center" }}>
                            <div style={{ position: "relative", flex: 1, minWidth: 240 }}>
                              <input value={poHistorySearch} onChange={e => setPoHistorySearch(e.target.value)}
                                placeholder={"🔍 거래처·품목·메모 검색" + (poHistorySupFilter ? ` (현재 필터: ${poHistorySupFilter})` : "")}
                                style={{ width: "100%", height: 42, paddingLeft: 14, fontSize: 13 }} />
                              {poHistorySearch && (
                                <button onClick={() => setPoHistorySearch("")} style={{ position: "absolute", right: 8, top: "50%", transform: "translateY(-50%)", width: 22, height: 22, borderRadius: 11, border: "none", background: "var(--divider)", color: "var(--text2)", cursor: "pointer", fontSize: 12 }}>×</button>
                              )}
                            </div>
                            <select value={poHistorySort} onChange={e => setPoHistorySort(e.target.value)} style={{ height: 42, width: 160, fontSize: 13 }}>
                              <option value="date_desc">📅 최신순</option>
                              <option value="date_asc">📅 오래된순</option>
                              <option value="amount_desc">💰 금액 높은순</option>
                              <option value="supplier">🏭 거래처명순</option>
                            </select>
                          </div>

                          {sorted.length === 0 ? (
                            <div className="card" style={{ padding: 40, textAlign: "center", color: T.text3, fontSize: 14 }}>조건에 맞는 발주가 없습니다</div>
                          ) : (
                            <div className="card" style={{ padding: 0, overflow: "hidden" }}>
                              {/* 목록 헤더 */}
                              <div style={{ display: "grid", gridTemplateColumns: "120px 1.2fr 1.5fr 80px 200px 50px", gap: 12, padding: "10px 16px", background: "var(--surface2)", borderBottom: `1px solid ${T.divider}`, fontSize: 11, fontWeight: 700, color: T.text3, textTransform: "uppercase", letterSpacing: 0.5 }}>
                                <div>발주일자</div>
                                <div>거래처</div>
                                <div>품목 / 제목</div>
                                <div style={{ textAlign: "right" }}>품목수</div>
                                <div style={{ textAlign: "right" }}>합계</div>
                                <div></div>
                              </div>
                              {/* 목록 행 */}
                              {sorted.map((po, idx) => {
                                const dateDisplay = po.orderDate || po.dateStr || "—";
                                const itemsPreview = (po.items || []).map(i => i.name).filter(Boolean).slice(0, 2).join(", ") + ((po.items || []).length > 2 ? ` 외 ${po.items.length - 2}` : "");
                                return (
                                  <div key={po.id}
                                    onClick={() => setViewingPO(po)}
                                    style={{
                                      display: "grid", gridTemplateColumns: "120px 1.2fr 1.5fr 80px 200px 50px", gap: 12,
                                      padding: "12px 16px", borderBottom: idx < sorted.length - 1 ? `1px solid ${T.divider}` : "none",
                                      cursor: "pointer", alignItems: "center",
                                      transition: "background 0.12s",
                                    }}
                                    onMouseEnter={e => e.currentTarget.style.background = "var(--surface2)"}
                                    onMouseLeave={e => e.currentTarget.style.background = "transparent"}
                                  >
                                    <div style={{ fontSize: 12, fontWeight: 600, color: T.text2, fontVariantNumeric: "tabular-nums" }}>{dateDisplay}</div>
                                    <div style={{ fontSize: 13, fontWeight: 700, color: T.text }}>🏭 {po.supplier?.name || "—"}</div>
                                    <div style={{ fontSize: 12, color: T.text2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{po.title || itemsPreview || "—"}</div>
                                    <div style={{ fontSize: 12, color: T.text2, textAlign: "right" }}>{(po.items || []).length}건{po.photos?.length > 0 ? ` · 📷${po.photos.length}` : ""}</div>
                                    <div style={{ fontSize: 14, fontWeight: 800, color: NAVY, textAlign: "right", fontVariantNumeric: "tabular-nums" }}>{Number(po.totalAmount || 0).toLocaleString()}원</div>
                                    <div style={{ textAlign: "center" }}>
                                      <button onClick={(e) => { e.stopPropagation(); deletePO(po.id); }} style={{ background: "none", border: "none", cursor: "pointer", color: "#F04452", fontSize: 14, fontFamily: "inherit", padding: 4 }}>✕</button>
                                    </div>
                                  </div>
                                );
                              })}
                              {/* 필터 결과 합계 */}
                              {(poHistorySupFilter || poHistorySearch) && (
                                <div style={{ padding: "12px 16px", background: "rgba(236,102,8,0.04)", borderTop: `1px solid ${T.divider}`, fontSize: 13, fontWeight: 700, color: T.text, display: "flex", justifyContent: "space-between" }}>
                                  <span>필터 결과 ({sorted.length}건)</span>
                                  <span style={{ color: NAVY, fontSize: 15, fontWeight: 800 }}>{filteredTotal.toLocaleString()}원</span>
                                </div>
                              )}
                            </div>
                          )}
                        </>
                      )}
                    </>
                  );
                })()}
              </>
            )}
          </div>
        )}
      </div>
      </div>
    </div>
  );
}

    { v: "마감", c: "#475569" },
    { v: "낙찰", c: "#00B493" },
    { v: "유찰", c: "#F04452" },
  ];
  const [draft, setDraft] = useState({ title:"", agency:"", openDate:"", closeDate:"", awardDate:"", amount:"", status:"예정", url:"", note:"" });
  const [filterStatus, setFilterStatus] = useState("");
  const [viewMode, setViewMode] = useState("list"); // list | calendar
  const [calMonth, setCalMonth] = useState(new Date().toISOString().slice(0,7));

  const reset = () => { setDraft({ title:"", agency:"", openDate:"", closeDate:"", awardDate:"", amount:"", status:"예정", url:"", note:"" }); setEditingId(null); setShowForm(false); };
  const saveBid = () => {
    if (!draft.title.trim()) { alert("입찰 공고명은 필수입니다"); return; }
    if (editingId) {
      setBids(prev => prev.map(b => b.id === editingId ? { ...b, ...draft } : b));
    } else {
      setBids(prev => [...prev, { id: uid(), createdAt: Date.now(), ...draft }]);
    }
    reset();
  };
  const editBid = (b) => { setDraft({ title:b.title||"", agency:b.agency||"", openDate:b.openDate||"", closeDate:b.closeDate||"", awardDate:b.awardDate||"", amount:b.amount||"", status:b.status||"예정", url:b.url||"", note:b.note||"" }); setEditingId(b.id); setShowForm(true); };
  const deleteBid = (id) => { if (confirm("이 입찰 정보를 삭제할까요?")) setBids(prev => prev.filter(b => b.id !== id)); };

  const today = new Date().toISOString().slice(0,10);
  const filtered = bids.filter(b => !filterStatus || b.status === filterStatus);
  const sortedBids = [...filtered].sort((a,b) => (a.closeDate||"9999").localeCompare(b.closeDate||"9999"));

  // KPI
  const upcoming = bids.filter(b => b.status === "예정" || b.status === "진행중");
  const closingSoon = upcoming.filter(b => b.closeDate && b.closeDate >= today && b.closeDate <= new Date(Date.now()+7*86400000).toISOString().slice(0,10));
  const won = bids.filter(b => b.status === "낙찰");
  const totalWonAmt = won.reduce((s,b) => s + parseFloat(b.amount||0), 0);

  // 캘린더 그리드 생성
  const calData = (() => {
    const [y, m] = calMonth.split("-").map(Number);
    const first = new Date(y, m-1, 1);
    const lastDay = new Date(y, m, 0).getDate();
    const startDow = first.getDay();
    const cells = [];
    for (let i = 0; i < startDow; i++) cells.push(null);
    for (let d = 1; d <= lastDay; d++) {
      const dateStr = `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      const dayBids = bids.filter(b => b.openDate === dateStr || b.closeDate === dateStr || b.awardDate === dateStr);
      cells.push({ date: d, dateStr, bids: dayBids });
    }
    while (cells.length % 7 !== 0) cells.push(null);
    return cells;
  })();

  const prevMonth = () => { const [y,m] = calMonth.split("-").map(Number); const nd = new Date(y, m-2, 1); setCalMonth(`${nd.getFullYear()}-${String(nd.getMonth()+1).padStart(2,"0")}`); };
  const nextMonth = () => { const [y,m] = calMonth.split("-").map(Number); const nd = new Date(y, m, 1); setCalMonth(`${nd.getFullYear()}-${String(nd.getMonth()+1).padStart(2,"0")}`); };

  const statColor = (s) => STATUSES.find(x => x.v === s)?.c || "#475569";

  return (

        </div>

          <div style={{fontSize:11,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>진행 중</div>
          <div style={{fontSize:24,fontWeight:800,color:"#FF9500",lineHeight:1}}>{upcoming.length}<span style={{fontSize:14,fontWeight:600,marginLeft:4}}>건</span></div>
        </div>
        <div className="card" style={{flex:1,minWidth:140}}>

        </div>

        </div>

                const isClosingSoon = daysToClose !== null && daysToClose >= 0 && daysToClose <= 7 && (b.status === "예정" || b.status === "진행중");
                const isPast = daysToClose !== null && daysToClose < 0 && (b.status === "예정" || b.status === "진행중");

                    <div style={{display:"flex",alignItems:"flex-start",gap:12}}>

                          <span style={{fontSize:11,padding:"2px 8px",borderRadius:6,background:statColor(b.status)+"22",color:statColor(b.status),fontWeight:700}}>{b.status}</span>
                          {isClosingSoon && <span style={{fontSize:11,padding:"2px 8px",borderRadius:6,background:"rgba(240,68,82,0.18)",color:"#F04452",fontWeight:700}}>⚠ D-{daysToClose} 마감 임박</span>}
                          {isPast && <span style={{fontSize:11,padding:"2px 8px",borderRadius:6,background:"rgba(60,60,67,0.15)",color:"#475569",fontWeight:700}}>마감 지남</span>}
                          <span style={{fontSize:14,fontWeight:700,color:"var(--text1)"}}>{b.title}</span>
                        </div>
                        <div style={{fontSize:12,color:"var(--text2)",display:"flex",gap:14,flexWrap:"wrap"}}>
