  <style>
    /* NJ SAFETY — Design Theme Preview (NJ Orange + Charcoal Ink) */
    :root {
      /* Brand */
      --nj-orange: #EC6608; --nj-orange-600: #D85800; --nj-orange-700: #B84800;
      --nj-orange-100: #FFE9D6; --nj-orange-50: #FFF4EC;

      /* Surfaces (light) — warm cream canvas */
      --bg: #F7F5F0; --surface: #ffffff; --surface2: #FAF8F3;
      --border: #E5E8ED; --divider: #EFF1F4;
      --text1: #14171D; --text2: #5A6270; --text3: #828A98;
      --input-bg: #F1F2F6; --input-color: #14171D; --placeholder: #828A98;
      --row-bg: rgba(236,102,8,0.03); --row-border: rgba(236,102,8,0.09);
      --th-bg: rgba(236,102,8,0.05); --td-border: rgba(20,23,29,0.07);
      --header-bg: rgba(255,255,255,0.82); --header-border: rgba(236,102,8,0.13);
      --chip-bg: #FFE9D6; --chip-color: #5A6270; --chip-hover-bg: #FFD4B0; --chip-hover-color: #B84800;
      --ghost-bg: #fff; --ghost-color: #D85800; --ghost-border: rgba(236,102,8,0.22); --empty-color: #B4BAC4;
      --doc-bg: #fff; --doc-text: #14171D; --doc-text2: #404652; --doc-text3: #5A6270;
      --doc-border: #D7DBE2; --doc-row-border: #E5E8ED; --doc-hover: #F7F8FA;
      --doc-last: #14171D; --doc-footer: #828A98;
    }
    body.dark {
      --bg: #0F1115; --surface: #181B22; --surface2: #1F232B;
      --border: #2A2F38; --divider: #353B47;
      --text1: #EFF1F4; --text2: #B4BAC4; --text3: #828A98;
      --input-bg: #1F232B; --input-color: #EFF1F4; --placeholder: #828A98;
      --row-bg: rgba(236,102,8,0.06); --row-border: rgba(236,102,8,0.14);
      --th-bg: rgba(236,102,8,0.10); --td-border: rgba(239,241,244,0.07);
      --header-bg: rgba(15,17,21,0.82); --header-border: rgba(236,102,8,0.20);
      --chip-bg: #2A2F38; --chip-color: #B4BAC4; --chip-hover-bg: #404652; --chip-hover-color: #FFE9D6;
      --ghost-bg: #1F232B; --ghost-color: #FFE9D6; --ghost-border: rgba(236,102,8,0.30); --empty-color: rgba(239,241,244,0.24);
      --doc-bg: #181B22; --doc-text: #EFF1F4; --doc-text2: rgba(239,241,244,0.76); --doc-text3: #B4BAC4;
      --doc-border: #2A2F38; --doc-row-border: rgba(239,241,244,0.08);
      --doc-hover: rgba(236,102,8,0.04); --doc-last: rgba(239,241,244,0.86); --doc-footer: #828A98;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text1);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      font-feature-settings: "tnum" 1, "ss01" 1;
      transition: background 0.25s, color 0.25s;
    }
    input[type=text], input[type=number], input[type=password], input[type=date], input[type=month], input[type=email], input[type=tel], input[type=url], input[type=search], input:not([type]), select {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      color: var(--input-color);
      background: var(--input-bg);
      height: 44px;
      width: 100%;
      font-family: inherit;
      transition: box-shadow 0.18s, background 0.2s, color 0.2s;
    }
    textarea {
      border: none;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      color: var(--input-color);
      background: var(--input-bg);
      width: 100%;
      font-family: inherit;
      line-height: 1.55;
      resize: vertical;
      min-height: 80px;
      transition: box-shadow 0.18s, background 0.2s, color 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(236,102,8,0.28);
    }
    input::placeholder, textarea::placeholder { color: var(--placeholder); }
    body.dark input[type=date], body.dark input[type=month] { color-scheme: dark; }
    body.dark select { color-scheme: dark; }
    body.dark option { background: #1C1C1E; color: #fff; }

    /* ─── 비율 설정 숫자 입력 ─── */
    .rate-input {
      width: 64px !important;
      padding: 4px 6px !important;
      text-align: center;
      font-weight: 700;
      font-size: 17px;
      height: 42px !important;
      flex-shrink: 0;
    }

    /* ─── 카드 ─── */
    .card {
      background: var(--surface);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 20px rgba(236,102,8,0.07);
      border: 1px solid var(--border);
      transition: background 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      box-shadow: 0 2px 4px rgba(15,17,21,0.05), 0 8px 28px rgba(236,102,8,0.11);
    }

    /* ─── NJ SAFETY 로고 (다크모드 대응) ─── */
    .nj-logo-img {
      transition: filter 0.25s;
    }
    body.dark .nj-logo-img {
      /* 다크모드: 검정 텍스트를 밝게 반전 (오렌지 H는 보존) */
      filter: invert(0.92) hue-rotate(180deg) saturate(1.15);
    }
    /* 사이드바는 항상 다크 배경 → 로고는 항상 반전된 색상 + 그림자 */
    .nj-sidebar-logo {
      filter: invert(0.92) hue-rotate(180deg) saturate(1.15) drop-shadow(0 4px 8px rgba(236,102,8,0.45));
    }

    /* ─── 버튼 ─── */
    .btn-primary {
      background: linear-gradient(135deg, #EC6608 0%, #D85800 100%);
      color: #fff; border: none; border-radius: 11px;
      cursor: pointer; font-weight: 600; padding: 12px 22px;
      font-family: inherit; font-size: 14px;
      box-shadow: 0 2px 10px rgba(236,102,8,0.38);
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
    }
    .btn-primary:hover { opacity: 0.92; box-shadow: 0 4px 18px rgba(236,102,8,0.45); }
    .btn-primary:active { transform: scale(0.97); box-shadow: 0 1px 6px rgba(236,102,8,0.3); }
    .btn-orange {
      background: linear-gradient(135deg, #F59E0B 0%, #EF4444 100%);
      color: #fff; border: none; border-radius: 11px;
      cursor: pointer; font-weight: 600; padding: 10px 18px;
      font-family: inherit; font-size: 13px;
      box-shadow: 0 2px 8px rgba(245,158,11,0.32);
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn-orange:hover { opacity: 0.9; }
    .btn-orange:active { transform: scale(0.97); }

    /* ─── 제품 칩 (가로 스크롤) ─── */
    .chip-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      flex-wrap: nowrap;
      padding-bottom: 6px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      scrollbar-color: rgba(0,0,0,0.1) transparent;
    }
    .chip-scroll::-webkit-scrollbar { height: 3px; }
    .chip-scroll::-webkit-scrollbar-track { background: transparent; }
    .chip-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 10px; }
    .chip-scroll > * { flex-shrink: 0; }

    .prod-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 18px; border-radius: 100px; font-size: 13px; font-weight: 600;
      cursor: pointer; border: 1px solid transparent; background: var(--chip-bg); color: var(--chip-color);
      white-space: nowrap; transition: all 0.18s; font-family: inherit;
    }
    .prod-chip.active {
      background: linear-gradient(135deg, #EC6608 0%, #D85800 100%);
      color: #fff; border-color: transparent;
      box-shadow: 0 2px 12px rgba(236,102,8,0.38);
    }
    .prod-chip:hover:not(.active) { background: var(--chip-hover-bg); color: var(--chip-hover-color); border-color: rgba(236,102,8,0.2); }

    /* ─── 원단/공임비 행 ─── */
    .fabric-row {
      display: flex; gap: 8px; align-items: center;
      padding: 10px 12px; background: var(--row-bg); border-radius: 12px; margin-bottom: 8px;
      min-height: 60px; border: 0.5px solid var(--row-border);
      transition: border-color 0.15s;
    }
    .fabric-row:hover { border-color: rgba(236,102,8,0.3); }
    .fabric-row select, .fabric-row input[type=number], .fabric-row input[type=text] {
      height: 38px !important;
      padding: 0 10px !important;
      line-height: 38px;
    }

    /* ─── 테이블 ─── */
    table { width: 100%; border-collapse: collapse; }
    th {
      background: var(--th-bg); color: var(--text2); padding: 10px 14px;
      text-align: left; font-size: 11px; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase;
    }
    td { padding: 13px 14px; font-size: 14px; border-bottom: 0.5px solid var(--td-border); color: var(--text1); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(0,122,255,0.03); }

    /* ─── 우측 패널 ─── */
    .price-highlight {
      background: linear-gradient(145deg, #334155 0%, #1E293B 100%);
      border-radius: 16px; padding: 22px; text-align: center;
    }
    .row-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; }
    .row-label { font-size: 13px; color: var(--text2); }
    .row-value { font-size: 13px; font-weight: 600; color: var(--text1); }
    .section-label {
      font-size: 10px; font-weight: 700; color: var(--text3);
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
    }

    /* ─── 견적서 ─── */
    .quote-content { line-height: 2; font-size: 14px; color: var(--doc-text2); white-space: pre-wrap; }

    /* ─── 애플 내부 보고서 스타일 견적서 ─── */
    .apple-doc {
      background: var(--doc-bg);
      max-width: 820px;
      margin: 0 auto;
      padding: 80px 90px;
      border-radius: 4px;
      box-shadow: 0 2px 24px rgba(0,0,0,0.06);
      font-family: -apple-system, "SF Pro Text", "Pretendard", sans-serif;
      color: var(--doc-text);
      line-height: 1.6;
      letter-spacing: -0.01em;
    }
    .apple-doc h1 {
      font-size: 32px; font-weight: 600;
      letter-spacing: -0.022em; color: var(--doc-text);
      margin: 0 0 8px; line-height: 1.15;
    }
    .apple-doc h2 {
      font-size: 22px; font-weight: 600;
      letter-spacing: -0.018em; color: var(--doc-text);
      margin: 48px 0 18px; padding-bottom: 10px;
      border-bottom: 1px solid var(--doc-border);
    }
    .apple-doc h3 {
      font-size: 17px; font-weight: 600;
      letter-spacing: -0.012em; color: var(--doc-text);
      margin: 28px 0 12px;
    }
    .apple-doc h4 {
      font-size: 14px; font-weight: 600;
      color: var(--doc-text3);
      margin: 20px 0 10px;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .apple-doc p {
      font-size: 15px; color: var(--doc-text2);
      margin: 12px 0; line-height: 1.7;
    }
    .apple-doc strong { color: var(--doc-text); font-weight: 600; }
    .apple-doc em { font-style: italic; color: var(--doc-text3); }
    .apple-doc hr {
      border: none; height: 1px;
      background: var(--doc-border); margin: 36px 0;
    }
    .apple-doc table {
      width: 100%; border-collapse: collapse;
      margin: 16px 0; font-size: 14px;
    }
    .apple-doc thead th {
      background: transparent; color: var(--doc-text3);
      font-size: 12px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 10px 12px;
      border-top: 1px solid var(--doc-text);
      border-bottom: 1px solid var(--doc-border);
    }
    .apple-doc tbody td {
      padding: 13px 12px;
      border-bottom: 1px solid var(--doc-row-border);
      color: var(--doc-text);
      font-variant-numeric: tabular-nums;
    }
    .apple-doc tbody td:not(:first-child) { text-align: right; }
    .apple-doc tbody tr:hover td { background: var(--doc-hover); }
    .apple-doc tbody tr:last-child td { border-bottom: 2px solid var(--doc-last); }
    .apple-doc ul, .apple-doc ol { padding-left: 22px; margin: 12px 0; }
    .apple-doc li { font-size: 15px; color: var(--doc-text2); margin: 6px 0; line-height: 1.7; }
    .apple-doc-meta {
      display: flex; gap: 32px; flex-wrap: wrap;
      font-size: 13px; color: var(--doc-text3); margin: 12px 0 24px;
    }
    .apple-doc-meta strong {
      color: var(--doc-text); font-weight: 600; margin-right: 6px;
    }
    .apple-doc-footer {
      margin-top: 60px; padding-top: 24px;
      border-top: 1px solid var(--doc-border);
      font-size: 12px; color: var(--doc-footer); text-align: center;
      font-style: italic;
    }
    @media (max-width: 768px) {
      .apple-doc { padding: 36px 24px; max-width: 100%; }
      .apple-doc h1 { font-size: 26px; }
      .apple-doc h2 { font-size: 19px; margin: 36px 0 14px; }
      .apple-doc h3 { font-size: 16px; }
      .apple-doc p, .apple-doc li { font-size: 14px; }
      .apple-doc table { font-size: 13px; }
      .apple-doc thead th, .apple-doc tbody td { padding: 8px 8px; }
    }

    /* ─── 견적서/발주서 양식 B: Modern Bold ─── */
    .bold-doc {
      background: #fff; padding: 0; max-width: 880px; margin: 0 auto;
      border-radius: 14px; overflow: hidden;
      box-shadow: 0 8px 28px rgba(236,102,8,0.10);
      color: #1d1d1f;
    }
    .bold-doc h1 {
      margin: 0; padding: 44px 56px 36px;
      background: linear-gradient(135deg, #EC6608 0%, #D85800 100%);
      color: #fff; font-size: 36px; font-weight: 900; letter-spacing: -0.4px;
      border-bottom: none;
    }
    .bold-doc h2 {
      font-size: 22px; font-weight: 800; color: #EC6608;
      margin: 36px 56px 14px; padding-bottom: 10px;
      border-bottom: 3px solid #EC6608; letter-spacing: -0.2px;
    }
    .bold-doc h3 { font-size: 16px; font-weight: 700; color: #1d1d1f; margin: 22px 56px 8px; }
    .bold-doc p, .bold-doc li { font-size: 15px; line-height: 1.75; color: #1d1d1f; }
    .bold-doc p { margin: 12px 56px; }
    .bold-doc ul, .bold-doc ol { margin: 12px 56px 12px 76px; }
    .bold-doc strong { font-weight: 700; color: #EC6608; }
    .bold-doc em { font-style: italic; color: #555; }
    .bold-doc hr { border: none; border-top: 2px dashed #E5E7EB; margin: 24px 56px; }
    .bold-doc table { margin: 16px 56px; border-collapse: collapse; width: calc(100% - 112px); font-variant-numeric: tabular-nums; }
    .bold-doc thead th { background: #EC6608; color: #fff; padding: 14px 16px; font-size: 13px; font-weight: 700; text-align: left; }
    .bold-doc tbody td { padding: 14px 16px; font-size: 14px; border-bottom: 1px solid #F2F4F7; }
    .bold-doc tbody td:not(:first-child) { text-align: right; }
    .bold-doc tbody tr:nth-child(even) td { background: rgba(236,102,8,0.03); }

    /* ─── 견적서/발주서 양식 C: Card Layout ─── */
    .card-doc {
      max-width: 880px; margin: 0 auto; padding: 32px 24px;
      background: linear-gradient(180deg, #FAFBFF 0%, #EEF2F7 100%);
      color: #1d1d1f;
    }
    .card-doc h1 {
      font-size: 30px; font-weight: 900; color: #1d1d1f;
      margin: 0 0 16px; padding: 24px 28px; background: #fff;
      border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      letter-spacing: -0.4px;
    }
    .card-doc h2 {
      font-size: 18px; font-weight: 800; color: #EC6608;
      margin: 16px 0 0; padding: 22px 28px 12px;
      background: #fff; border-radius: 16px 16px 0 0;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .card-doc h3 { font-size: 15px; font-weight: 700; color: #1d1d1f; margin: 0; padding: 8px 28px; background: #fff; }
    .card-doc p, .card-doc ul, .card-doc ol {
      margin: 0; padding: 6px 28px; background: #fff;
      font-size: 14px; line-height: 1.75;
    }
    .card-doc ul, .card-doc ol { padding-left: 48px; }
    .card-doc li { font-size: 14px; line-height: 1.75; }
    .card-doc h2 + p, .card-doc h2 + ul, .card-doc h2 + ol { padding-top: 0; }
    .card-doc table {
      margin: 0; padding: 8px 28px 16px; background: #fff;
      border-radius: 0 0 16px 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      border-collapse: separate; border-spacing: 0; width: 100%;
    }
    .card-doc thead th { padding: 12px 16px; background: #F8FAFC; font-size: 13px; color: #475569; font-weight: 700; text-align: left; border-bottom: 1px solid #E5E7EB; }
    .card-doc tbody td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid #F2F4F7; }
    .card-doc tbody td:not(:first-child) { text-align: right; }
    .card-doc tbody tr:last-child td { border-bottom: none; }
    .card-doc hr { border: none; height: 16px; }
    .card-doc strong { font-weight: 700; color: #EC6608; }
    .card-doc em { font-style: italic; color: #64748B; }

    /* ─── 견적서/발주서 양식 D: 한국 정형 ─── */
    .korean-doc {
      max-width: 800px; margin: 0 auto; padding: 40px 32px;
      background: #fff; color: #000;
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .korean-doc h1 {
      font-size: 26px; font-weight: 900; text-align: center;
      margin: 0 0 8px; padding: 14px 0; letter-spacing: 12px;
      border-top: 3px double #000; border-bottom: 3px double #000;
    }
    .korean-doc h2 {
      font-size: 14px; font-weight: 800; color: #000;
      margin: 24px 0 8px; padding: 7px 12px;
      background: #F2F4F7; border-left: 4px solid #000;
    }
    .korean-doc h3 { font-size: 13px; font-weight: 700; margin: 12px 0 4px; color: #000; }
    .korean-doc p, .korean-doc li { font-size: 13px; line-height: 1.7; color: #000; }
    .korean-doc p { margin: 8px 0; }
    .korean-doc ul, .korean-doc ol { padding-left: 22px; margin: 8px 0; }
    .korean-doc table {
      width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 12px;
      font-variant-numeric: tabular-nums;
    }
    .korean-doc thead th { background: #1f2937; color: #fff; padding: 8px 10px; border: 1px solid #000; font-weight: 700; text-align: center; }
    .korean-doc tbody td { padding: 8px 10px; border: 1px solid #94A3B8; }
    .korean-doc tbody td:not(:first-child) { text-align: right; }
    .korean-doc tbody tr:nth-child(even) td { background: #FAFAFA; }
    .korean-doc strong { font-weight: 800; color: #000; }
    .korean-doc em { font-style: italic; color: #444; }
    .korean-doc hr { border: none; border-top: 1px dashed #94A3B8; margin: 16px 0; }
    .korean-seal-box {
      margin-top: 24px; padding: 18px 22px;
      border: 1.5px solid #000; display: flex; justify-content: space-between; align-items: flex-end;
    }
    .korean-seal-label { font-size: 11px; font-weight: 700; color: #000; letter-spacing: 4px; }
    .korean-seal-circle {
      width: 64px; height: 64px; border-radius: 50%;
      border: 2px solid #C00; display: flex; align-items: center; justify-content: center;
      color: #C00; font-size: 11px; font-weight: 800; letter-spacing: 1px;
      transform: rotate(-8deg);
    }

    /* ─── 섹션 제목 ─── */
    .section-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
    }
    .section-header-title {
      font-size: 15px; font-weight: 600; color: var(--text1);
      display: flex; align-items: center; gap: 8px;
    }
    .section-header-title::before {
      content: ''; display: inline-block;
      width: 3px; height: 15px;
      background: linear-gradient(180deg, #EC6608 0%, #D85800 100%);
      border-radius: 3px; flex-shrink: 0;
    }
    .section-sub {
      font-size: 12px; color: var(--text3); font-weight: 400; margin-left: 4px;
    }

    /* ─── 발주서 폼 ─── */
    .po-form {
      max-width: 980px;
      margin: 0 auto;
    }
    .po-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--text2);
      letter-spacing: 0.2px;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .po-req { color: #EF4444; margin-left: 2px; }
    /* 입력칸 경계를 더 명확하게 (애플 스타일) */
    .po-form input[type=text],
    .po-form input[type=number],
    .po-form input[type=date],
    .po-form input[type=email],
    .po-form select,
    .po-form textarea {
      background: var(--surface) !important;
      border: 1px solid var(--row-border) !important;
      box-shadow: 0 1px 2px rgba(15,15,26,0.03);
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }
    .po-form input:hover:not(:focus),
    .po-form select:hover:not(:focus),
    .po-form textarea:hover:not(:focus) {
      border-color: rgba(236,102,8,0.25) !important;
      background: var(--surface) !important;
    }
    .po-form input:focus,
    .po-form select:focus,
    .po-form textarea:focus {
      border-color: rgba(236,102,8,0.5) !important;
      box-shadow: 0 0 0 4px rgba(236,102,8,0.12), 0 1px 2px rgba(15,15,26,0.04) !important;
      background: var(--surface) !important;
    }
    body.dark .po-form input,
    body.dark .po-form select,
    body.dark .po-form textarea {
      background: rgba(255,255,255,0.03) !important;
    }
    /* fabric-row 내부 입력칸도 동일 처리 */
    .po-form .fabric-row {
      background: var(--surface) !important;
      border: 1px solid var(--row-border);
    }

    /* ─── 범례/인포 ─── */
    .info-pill {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(236,102,8,0.1); color: #EC6608; font-size: 11px; font-weight: 600;
      padding: 3px 10px; border-radius: 100px;
    }

    /* ─── 탭바 ─── */
    .tab-btn {
      position: relative; border: none; background: transparent;
      cursor: pointer; font-family: inherit; font-weight: 500;
      transition: color 0.18s;
      white-space: nowrap;
    }
    .tab-btn::after {
      content: ''; position: absolute; bottom: 0; left: 12px; right: 12px;
      height: 2.5px; border-radius: 2px 2px 0 0;
      background: linear-gradient(90deg, #EC6608, #D85800);
      opacity: 0; transition: opacity 0.18s;
    }
    .tab-btn.tab-active::after { opacity: 1; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ─── 태블릿 (1024px 이하) ─── */
    @media (max-width: 1024px) {
      .calc-grid { grid-template-columns: 1fr !important; gap: 16px !important; }
      .calc-grid > div:last-child { position: static !important; }
      .price-highlight { padding: 18px !important; }
    }

    /* ─── 모바일 (768px 이하) ─── */
    @media (max-width: 768px) {
      body { font-size: 14px; }
      .card { padding: 16px; border-radius: 16px; }
      .section-header-title { font-size: 14px !important; }
      .section-header-title::before { width: 3px; height: 14px; }
      input[type=text], input[type=number], input[type=password], select {
        height: 46px; font-size: 15px; padding: 10px 12px;
      }
      .fabric-row {
        flex-wrap: wrap;
        padding: 12px;
        gap: 6px;
        min-height: auto;
      }
      .fabric-row > span:first-child { flex: 0 0 auto; }
      .fabric-row select { flex: 1 1 100% !important; min-width: 0; }
      .fabric-row input[type=number] { flex: 1 1 auto; min-width: 70px; }
      .prod-chip {
        padding: 9px 14px; font-size: 13px;
      }
      .btn-orange { padding: 10px 14px; font-size: 13px; }
      .btn-primary { padding: 12px 18px; font-size: 14px; }
      table { font-size: 13px; }
      th, td { padding: 10px 12px; }
    }

    /* ─── 햄버거 메뉴 버튼 (모바일 전용) ─── */
    .mobile-menu-btn { display: none; }

    /* ─── 모바일 사이드바 백드롭 ─── */
    .mobile-sidebar-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 98;
      backdrop-filter: blur(2px);
      animation: fadeIn 0.18s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* ─── 태블릿/작은 노트북 (1024px 이하) ─── */
    @media (max-width: 1024px) {
      .global-search-wrap { display: none !important; }
    }

    /* ─── 모바일 (768px 이하) ─── */
    @media (max-width: 768px) {
      /* 사이드바를 오프-캔버스 슬라이드로 변경 */
      .app-sidebar {
        position: fixed !important;

function idbOpen() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open("frw_db", 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains("kv")) db.createObjectStore("kv");
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbGet(key) {
  try {
    const db = await idbOpen();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction("kv", "readonly");
      const req = tx.objectStore("kv").get(key);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  } catch { return undefined; }
}

  const db = await idbOpen();

// 이미지 압축 (Firebase RTDB 안전 사이즈로): 최대 1024px wide, JPEG quality 0.75 → 보통 50~150KB
function compressImage(file, maxWidth = 1024, quality = 0.75) {
  return new Promise((resolve, reject) => {
    if (!file) { reject(new Error("no file")); return; }
    if (!file.type.startsWith("image/")) { reject(new Error("not an image")); return; }
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxWidth) {
          height = Math.round(height * maxWidth / width);
          width = maxWidth;
        }
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#fff"; // PNG의 투명 배경 처리
        ctx.fillRect(0, 0, width, height);
        ctx.drawImage(img, 0, 0, width, height);
        const dataUrl = canvas.toDataURL("image/jpeg", quality);
        resolve(dataUrl);
      };
      img.onerror = () => reject(new Error("image decode failed"));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error("file read failed"));
    reader.readAsDataURL(file);
  });
}

    setBusy(true);
    try {
      const dataUrl = await compressImage(file, maxWidth);
      onChange(dataUrl);
    } catch (e) { alert("이미지 처리 실패: " + e.message); }
    finally { setBusy(false); }
  };

    e.preventDefault(); e.stopPropagation();
    setDragOver(false);

      }

function computeProduct(p, materials, laborItems) {
  const spec = getActiveSpec(p) || p;
  const fCost = (spec.fabrics || []).reduce((s, f) => {
    const m = f.matId !== "" && f.matId != null ? materials.find(x => x.id == f.matId) : null;
    return s + (m ? m.price * parseFloat(f.qty || 0) : 0);
  }, 0);
  const eCost = (spec.extras || []).reduce((s, e) => {
    const u = e.laborId !== "" && e.laborId != null ? (laborItems.find(l => l.id == e.laborId)?.price || 0) : parseFloat(e.price || 0);
    const q = parseFloat(e.qty || 1);
    return s + u * q;
  }, 0);
  const base = fCost + eCost;
  const admin = base * ((spec.adminRate || 0) / 100);
  const beforeMargin = base + admin;
  const margins = spec.margins || DEFAULT_MARGINS;
  const overrides = spec.priceOverrides || {};
  const grades = {};         // 적용 단가 (override 우선)
  const calcGrades = {};     // 마진율 계산값 (참조용)
  const overridden = {};     // 어느 등급이 수동 수정됐는지
  const gradeList = (spec.grades && spec.grades.length > 0) ? spec.grades : GRADES;
  for (const g of gradeList) {
    const auto = beforeMargin * (1 + (margins[g] ?? DEFAULT_MARGINS[g] ?? 30) / 100);

    const ov = parseFloat(overrides[g]);

      overridden[g] = true;

      grades[g] = auto;
      overridden[g] = false;
    }
  }

  return {
    fCost, eCost, base, admin, beforeMargin,
    grades, calcGrades, overridden,
    gradeList,
    selectedGrade: sel,
    finalPrice: grades[sel] || 0,
    marginAmt: (grades[sel] || 0) - beforeMargin,
  };
}

function AppleMarkdown({ text }) {

  const inline = (s) => {

    const parts = [];
    let last = 0;
    const re = /!\[([^\]]*)\]\(([^)]+)\)|\*\*(.+?)\*\*|\*(.+?)\*/g;
    let m;
    let key = 0;
    while ((m = re.exec(s)) !== null) {
      if (m.index > last) parts.push(s.slice(last, m.index));
      if (m[2]) {
        // 이미지
        parts.push(<img key={key++} src={m[2]} alt={m[1]||""} style={{ maxWidth: "100%", maxHeight: 320, borderRadius: 10, border: "1px solid var(--doc-border)", display: "block", margin: "8px 0" }} />);
      } else if (m[3]) parts.push(<strong key={key++}>{m[3]}</strong>);
      else if (m[4]) parts.push(<em key={key++}>{m[4]}</em>);
      last = m.index + m[0].length;
    }
    if (last < s.length) parts.push(s.slice(last));
    return parts;
  };
  while (i < lines.length) {
    const line = lines[i];
    // 이미지 단독 라인 (전체 폭으로 표시)
    if (/^\s*!\[[^\]]*\]\([^)]+\)\s*$/.test(line)) {
      const m = line.match(/^\s*!\[([^\]]*)\]\(([^)]+)\)\s*$/);
      if (m) {
        out.push(<div key={i} style={{ textAlign: "center", margin: "12px 0" }}>
          <img src={m[2]} alt={m[1]||""} style={{ maxWidth: "100%", maxHeight: 360, borderRadius: 12, border: "1px solid var(--doc-border)", boxShadow: "0 1px 4px rgba(0,0,0,0.05)" }} />
          {m[1] && <div style={{ fontSize: 11, color: "var(--doc-text3)", marginTop: 6, fontStyle: "italic" }}>{m[1]}</div>}
        </div>);
        i++;
        continue;
      }
    }
    if (/^# /.test(line)) { out.push(<h1 key={i}>{inline(line.replace(/^# /, ""))}</h1>); i++; continue; }
    if (/^## /.test(line)) { out.push(<h2 key={i}>{inline(line.replace(/^## /, ""))}</h2>); i++; continue; }
    if (/^### /.test(line)) { out.push(<h3 key={i}>{inline(line.replace(/^### /, ""))}</h3>); i++; continue; }
    if (/^#### /.test(line)) { out.push(<h4 key={i}>{inline(line.replace(/^#### /, ""))}</h4>); i++; continue; }
    if (/^---+\s*$/.test(line)) { out.push(<hr key={i} />); i++; continue; }
    if (/^\s*$/.test(line)) { i++; continue; }

    // 표
    if (/^\s*\|.*\|\s*$/.test(line) && i + 1 < lines.length && /^\s*\|[-:\s|]+\|\s*$/.test(lines[i+1])) {
      const head = line.split("|").slice(1, -1).map(c => c.trim());
      i += 2;
      const rows = [];
      while (i < lines.length && /^\s*\|.*\|\s*$/.test(lines[i])) {
        rows.push(lines[i].split("|").slice(1, -1).map(c => c.trim()));
        i++;
      }
      out.push(
        <table key={"t"+i}>
          <thead><tr>{head.map((h, j) => <th key={j}>{inline(h)}</th>)}</tr></thead>
          <tbody>
            {rows.map((r, ri) => (
              <tr key={ri}>{r.map((c, j) => <td key={j}>{inline(c)}</td>)}</tr>
            ))}
          </tbody>
        </table>
      );
      continue;
    }

    // 리스트
    if (/^\s*[-*]\s+/.test(line)) {
      const items = [];
      while (i < lines.length && /^\s*[-*]\s+/.test(lines[i])) {
        items.push(lines[i].replace(/^\s*[-*]\s+/, ""));
        i++;
      }
      out.push(<ul key={"u"+i}>{items.map((it, j) => <li key={j}>{inline(it)}</li>)}</ul>);
      continue;
    }

    // 일반 단락 (연속된 라인 묶기)
    const para = [line];
    i++;
    while (i < lines.length && lines[i].trim() && !/^(#|---|\s*\||\s*[-*]\s+)/.test(lines[i])) {
      para.push(lines[i]); i++;
    }
    out.push(<p key={"p"+i}>{inline(para.join(" "))}</p>);
  }
  return <>{out}</>;
}

                            <span style={{ margin: "0 4px", color: "var(--divider)" }}>|</span>
                            {tblBtn("삭제", "#F04452", () => setMaterials(ms => ms.filter(x => x.id !== m.id)))}

                    </tr>
                    {isDropBot && <InsertRow cols={5} />}

              })}

          </table>

        </div>
      </div>

      {/* 공임비 단가표 */}
      <div>
        <div style={{ fontSize: 17, fontWeight: 800, color: NAVY, marginBottom: 14 }}>🔧 공임비 단가표</div>

      {/* 분기별 + 월별 표 */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:16}}>
        <div className="card">
          <div style={{fontSize:14,fontWeight:700,color:"var(--text1)",marginBottom:12}}>📦 분기별 매출</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {quarters.map(q => {
              const pct = totalY > 0 ? (q.total/totalY*100) : 0;
              return (
                <div key={q.name} style={{padding:"10px 12px",background:"var(--surface2)",borderRadius:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                    <span style={{fontSize:13,fontWeight:600,color:"var(--text1)"}}>{q.name}</span>
                    <span style={{fontSize:13,fontWeight:700,color:"var(--text1)"}}>{Math.round(q.total).toLocaleString()}원</span>
                  </div>
                  <div style={{height:6,background:"var(--divider)",borderRadius:3,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${pct}%`,background:"#475569",borderRadius:3,transition:"width 0.3s"}}/>
                  </div>
                  <div style={{fontSize:11,color:"var(--text3)",marginTop:4,textAlign:"right"}}>{pct.toFixed(1)}%</div>
                </div>
              );
            })}
          </div>
        </div>
        <div className="card">
          <div style={{fontSize:14,fontWeight:700,color:"var(--text1)",marginBottom:12}}>📅 월별 상세 (직접 입력 가능)</div>
          <div style={{overflowX:"auto"}}>
            <table>
              <thead>
                <tr><th>월</th><th style={{textAlign:"right"}}>📒 장부 합계</th><th style={{textAlign:"right"}}>주문 자동합산</th><th style={{textAlign:"right"}}>직접 입력</th><th style={{textAlign:"center"}}>출처</th><th style={{textAlign:"right"}}>적용 매출</th><th style={{textAlign:"right"}}>비중</th></tr>
              </thead>
              <tbody>
                {months12.map((m, i) => {
                  const ledger = monthlyRevLedger[m] || 0;
                  const auto = monthlyRevOrders[m] || 0;
                  const direct = monthlySales[m];
                  const applied = monthValues[i];
                  const pct = totalY > 0 ? (applied/totalY*100) : 0;
                  const src = monthSource[i] || "none";
                  const srcLabel = src === "direct" ? "직접 입력" : src === "ledger" ? "장부" : src === "orders" ? "주문" : "—";
                  const srcColor = src === "ledger" ? "#EC6608" : src === "direct" ? "#475569" : "var(--text3)";
                  return (
                    <tr key={m}>
                      <td style={{fontWeight:600}}>{monthLabels[i]}</td>
                      <td style={{textAlign:"right",fontSize:13,color:ledger>0?"#EC6608":"var(--text3)",fontWeight:ledger>0?600:400}}>{ledger>0?Math.round(ledger).toLocaleString()+"원":"—"}</td>
                      <td style={{textAlign:"right",fontSize:13,color:"var(--text2)"}}>{auto>0?Math.round(auto).toLocaleString()+"원":"—"}</td>
                      <td style={{textAlign:"right"}}>
                        <input type="number" placeholder="auto" value={direct!==undefined&&direct!==""?direct:""}
                          onChange={e=>setMonthlySales(prev=>({...prev,[m]:e.target.value===""?undefined:parseFloat(e.target.value)}))}
                          style={{height:32,fontSize:12,padding:"0 8px",textAlign:"right",width:110}}/>
                      </td>
                      <td style={{textAlign:"center",fontSize:11,fontWeight:700,color:srcColor}}>{srcLabel}</td>
                      <td style={{textAlign:"right",fontWeight:700,fontSize:13}}>{Math.round(applied).toLocaleString()}원</td>
                      <td style={{textAlign:"right",fontSize:12,color:"var(--text2)"}}>{pct.toFixed(1)}%</td>
                    </tr>
                  );
                })}
              </tbody>
              <tfoot>
                <tr style={{borderTop:"2px solid var(--divider)"}}>
                  <td style={{fontWeight:700,paddingTop:8}}>합계</td>
                  <td/>
                  <td/>
                  <td/>
                  <td/>
                  <td style={{textAlign:"right",fontWeight:800,fontSize:14,paddingTop:8}}>{Math.round(totalY).toLocaleString()}원</td>
                  <td style={{textAlign:"right",fontSize:12,color:"var(--text2)",paddingTop:8}}>100%</td>
                </tr>
              </tfoot>
            </table>
          </div>
          <div style={{fontSize:11,color:"var(--text3)",marginTop:10}}>💡 우선순위: <b>직접 입력 → 📒 장부 합계 → 주문 자동합산</b>. 위에 있는 값이 있으면 아래 값을 덮어씁니다.</div>
        </div>
      </div>
    </div>
  );
}

// 판매 현황 전용 상세 페이지
function OrdersDetailView({ onBack, orders, setOrders, clients, darkMode }) {
  const [search, setSearch] = useState("");
  const [filterStatus, setFilterStatus] = useState(""); // "" | "paid" | "unpaid" | "overdue"
  const [filterClient, setFilterClient] = useState("");
  const [dateFrom, setDateFrom] = useState("");
  const [dateTo, setDateTo] = useState("");
  const [editingId, setEditingId] = useState(null);
  const [draft, setDraft] = useState(null);

  const todayStr = new Date().toISOString().slice(0,10);

  const filtered = orders.filter(o => {
    const total = parseFloat(o.unitPrice||0)*parseInt(o.qty||1);
    const isPaid = !!o.paidDate;
    const isOverdue = !isPaid && o.paymentDue && o.paymentDue < todayStr;
    if (filterStatus === "paid" && !isPaid) return false;
    if (filterStatus === "unpaid" && isPaid) return false;
    if (filterStatus === "overdue" && !isOverdue) return false;
    if (filterClient && o.client !== filterClient) return false;
    if (dateFrom && (o.date||"") < dateFrom) return false;
    if (dateTo && (o.date||"") > dateTo) return false;
    if (search) {
      const q = search.toLowerCase();
      if (!(o.productName||"").toLowerCase().includes(q) && !(o.client||"").toLowerCase().includes(q) && !(o.note||"").toLowerCase().includes(q)) return false;
    }
    return true;
  }).sort((a,b)=>(b.date||"").localeCompare(a.date||""));

  const totalRev = filtered.reduce((s,o)=>s+parseFloat(o.unitPrice||0)*parseInt(o.qty||1),0);
  const unpaidAmt = filtered.filter(o=>!o.paidDate).reduce((s,o)=>s+parseFloat(o.unitPrice||0)*parseInt(o.qty||1),0);
  const overdueAmt = filtered.filter(o=>!o.paidDate && o.paymentDue && o.paymentDue < todayStr).reduce((s,o)=>s+parseFloat(o.unitPrice||0)*parseInt(o.qty||1),0);
  const uniqueClients = Array.from(new Set(orders.map(o=>o.client).filter(Boolean)));

  const togglePaid = (id) => {
    const o = orders.find(x=>x.id===id);
    if (!o) return;
    const today = new Date().toISOString().slice(0,10);
    setOrders(prev => prev.map(x => x.id===id ? {...x, paidDate: o.paidDate?"":today} : x));
  };

  const startEdit = (o) => { setEditingId(o.id); setDraft({...o}); };
  const cancelEdit = () => { setEditingId(null); setDraft(null); };
  const saveEdit = () => {
    if (!draft || !draft.productName || !draft.unitPrice) return;
    setOrders(prev => prev.map(x => x.id === editingId ? {...draft} : x));
    cancelEdit();
  };

  const exportCSV = () => {
    const header = ["날짜","제품명","수량","단가","합계","거래처","결제예정일","결제완료일","결제상태","비고"];
    const rows = filtered.map(o => {
      const total = parseFloat(o.unitPrice||0)*parseInt(o.qty||1);
      const isPaid = !!o.paidDate;
      const isOverdue = !isPaid && o.paymentDue && o.paymentDue < todayStr;
      const status = isPaid ? "완납" : isOverdue ? "연체" : o.paymentDue ? "미수" : "—";
      return [o.date||"", o.productName||"", o.qty||"", o.unitPrice||"", total, o.client||"", o.paymentDue||"", o.paidDate||"", status, (o.note||"").replace(/,/g," ")];
    });
    const csv = "﻿" + [header, ...rows].map(r => r.join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `판매현황_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <div style={{display:"flex",alignItems:"center",gap:12,paddingBottom:12,borderBottom:"1px solid var(--divider)",flexWrap:"wrap"}}>
        <button onClick={onBack} style={{padding:"8px 16px",borderRadius:10,border:"1px solid var(--border)",background:"var(--surface)",cursor:"pointer",fontSize:13,fontFamily:"inherit",color:"var(--text2)",display:"flex",alignItems:"center",gap:6}}>← 대시보드로</button>
        <div style={{fontSize:20,fontWeight:800,color:"var(--text1)"}}>📋 제품별 판매 현황 <span style={{fontSize:13,fontWeight:500,color:"var(--text3)"}}>상세 관리</span></div>
        <div style={{flex:1}}/>
        <button onClick={exportCSV} style={{padding:"8px 14px",borderRadius:10,border:"1px solid var(--border)",background:"none",cursor:"pointer",fontSize:13,fontFamily:"inherit",color:"var(--text2)"}}>📥 CSV 내보내기</button>
      </div>

      {/* 요약 KPI */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(180px, 1fr))",gap:12}}>
        <div className="card">
          <div style={{fontSize:11,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>필터된 매출</div>
          <div style={{fontSize:24,fontWeight:800,color:"#475569"}}>{Math.round(totalRev).toLocaleString()}<span style={{fontSize:12,marginLeft:2}}>원</span></div>
          <div style={{fontSize:11,color:"var(--text3)",marginTop:4}}>{filtered.length}건</div>
        </div>
        <div className="card">
          <div style={{fontSize:11,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>미수금</div>
          <div style={{fontSize:24,fontWeight:800,color:unpaidAmt>0?"#FF9500":"#00B493"}}>{Math.round(unpaidAmt).toLocaleString()}<span style={{fontSize:12,marginLeft:2}}>원</span></div>
        </div>
        <div className="card">
          <div style={{fontSize:11,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>연체</div>
          <div style={{fontSize:24,fontWeight:800,color:overdueAmt>0?"#F04452":"#00B493"}}>{Math.round(overdueAmt).toLocaleString()}<span style={{fontSize:12,marginLeft:2}}>원</span></div>
        </div>
        <div className="card">
          <div style={{fontSize:11,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>회수율</div>
          <div style={{fontSize:24,fontWeight:800,color:"var(--text1)"}}>{totalRev>0?Math.round((totalRev-unpaidAmt)/totalRev*100):0}<span style={{fontSize:14,marginLeft:2}}>%</span></div>
        </div>
      </div>

      {/* 필터 */}
      <div className="card">
        <div style={{fontSize:13,fontWeight:700,color:"var(--text1)",marginBottom:12}}>🔍 필터</div>
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr",gap:8,marginBottom:8}}>
          <input placeholder="제품명·거래처·비고 검색" value={search} onChange={e=>setSearch(e.target.value)}/>
          <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={{height:44}}>
            <option value="">전체 상태</option>
            <option value="paid">완납만</option>
            <option value="unpaid">미수만</option>
            <option value="overdue">연체만</option>
          </select>
          <select value={filterClient} onChange={e=>setFilterClient(e.target.value)} style={{height:44}}>
            <option value="">전체 거래처</option>
            {uniqueClients.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
          <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} placeholder="시작일"/>
          <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} placeholder="종료일"/>
        </div>
        {(search || filterStatus || filterClient || dateFrom || dateTo) && (
          <button onClick={()=>{setSearch("");setFilterStatus("");setFilterClient("");setDateFrom("");setDateTo("");}} style={{padding:"6px 12px",borderRadius:8,border:"1px solid var(--border)",background:"none",cursor:"pointer",fontSize:12,color:"var(--text2)",fontFamily:"inherit"}}>필터 초기화</button>
        )}
      </div>

      {/* 테이블 */}
      <div className="card">
        {filtered.length === 0 ? (
          <div style={{textAlign:"center",padding:"40px 24px",color:"var(--text3)",fontSize:14}}>{orders.length===0?"판매 기록이 없습니다":"필터 조건에 맞는 판매가 없습니다"}</div>
        ) : (
          <div style={{overflowX:"auto"}}>
            <table>
              <thead>
                <tr>
                  <th>날짜</th><th>제품명</th><th style={{textAlign:"right"}}>수량</th><th style={{textAlign:"right"}}>단가</th>
                  <th style={{textAlign:"right"}}>합계</th><th>거래처</th><th>결제예정</th><th style={{textAlign:"center"}}>상태</th><th>비고</th><th style={{textAlign:"center",minWidth:140}}>관리</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(o => {
                  const isEditing = editingId === o.id;
                  const total = parseFloat(o.unitPrice||0)*parseInt(o.qty||1);
                  const isPaid = !!o.paidDate;
                  const isOverdue = !isPaid && o.paymentDue && o.paymentDue < todayStr;
                  const isPending = !isPaid && o.paymentDue && o.paymentDue >= todayStr;
                  const rowBg = isOverdue ? (darkMode?"rgba(240,68,82,0.06)":"rgba(240,68,82,0.04)") : "transparent";
                  if (isEditing && draft) {
                    const editTotal = parseFloat(draft.unitPrice||0)*parseInt(draft.qty||1);
                    return (
                      <tr key={o.id} style={{background:"var(--surface2)"}}>
                        <td><input type="date" value={draft.date||""} onChange={e=>setDraft(d=>({...d,date:e.target.value}))} style={{height:32,fontSize:12,padding:"0 6px"}}/></td>
                        <td><input value={draft.productName||""} onChange={e=>setDraft(d=>({...d,productName:e.target.value}))} style={{height:32,fontSize:13,padding:"0 6px"}}/></td>
                        <td><input type="number" value={draft.qty||""} onChange={e=>setDraft(d=>({...d,qty:e.target.value}))} style={{height:32,fontSize:12,padding:"0 6px",textAlign:"right",width:60}}/></td>
                        <td><input type="number" value={draft.unitPrice||""} onChange={e=>setDraft(d=>({...d,unitPrice:e.target.value}))} style={{height:32,fontSize:12,padding:"0 6px",textAlign:"right",width:90}}/></td>
                        <td style={{textAlign:"right",fontWeight:700,fontSize:13}}>{Math.round(editTotal).toLocaleString()}원</td>
                        <td>
                          {clients.length > 0 ? (
                            <select value={draft.clientId||""} onChange={e=>{ const id=e.target.value; const c=clients.find(x=>x.id===id); setDraft(d=>({...d, clientId:id, client: c?c.name:d.client})); }} style={{height:32,fontSize:12,padding:"0 6px"}}>
                              <option value="">선택</option>
                              {clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                            </select>
                          ) : (
                            <input value={draft.client||""} onChange={e=>setDraft(d=>({...d,client:e.target.value}))} style={{height:32,fontSize:12,padding:"0 6px"}}/>
                          )}
                        </td>
                        <td>
                          <div style={{display:"flex",flexDirection:"column",gap:2}}>
                            <input type="date" value={draft.paymentDue||""} onChange={e=>setDraft(d=>({...d,paymentDue:e.target.value}))} style={{height:24,fontSize:11,padding:"0 5px"}}/>
                            <input type="date" value={draft.paidDate||""} onChange={e=>setDraft(d=>({...d,paidDate:e.target.value}))} style={{height:24,fontSize:11,padding:"0 5px"}}/>
                          </div>
                        </td>
                        <td/>
                        <td><input value={draft.note||""} onChange={e=>setDraft(d=>({...d,note:e.target.value}))} style={{height:32,fontSize:12,padding:"0 6px"}}/></td>
                        <td style={{textAlign:"center"}}>
                          <button onClick={saveEdit} style={{background:"#007AFF",border:"none",cursor:"pointer",color:"#fff",fontSize:12,fontWeight:700,borderRadius:6,padding:"5px 9px",marginRight:4,fontFamily:"inherit"}}>저장</button>
                          <button onClick={cancelEdit} style={{background:"none",border:"1px solid var(--border)",cursor:"pointer",color:"var(--text2)",fontSize:12,fontWeight:600,borderRadius:6,padding:"4px 8px",fontFamily:"inherit"}}>취소</button>
                        </td>
                      </tr>
                    );
                  }
                  return (
                    <tr key={o.id} style={{background:rowBg}}>
                      <td style={{whiteSpace:"nowrap",fontSize:13}}>{o.date}</td>
                      <td style={{fontWeight:600}}>{o.productName}</td>
                      <td style={{textAlign:"right"}}>{parseInt(o.qty||1).toLocaleString()}</td>
                      <td style={{textAlign:"right"}}>{parseFloat(o.unitPrice||0).toLocaleString()}원</td>
                      <td style={{textAlign:"right",fontWeight:700}}>{Math.round(total).toLocaleString()}원</td>
                      <td style={{fontSize:13}}>{o.client}</td>
                      <td style={{fontSize:12,color:"var(--text2)"}}>{o.paymentDue||"—"}</td>
                      <td style={{textAlign:"center",whiteSpace:"nowrap"}}>
                        {isPaid ? (
                          <span style={{display:"inline-block",fontSize:11,padding:"3px 8px",borderRadius:6,background:"rgba(0,180,147,0.15)",color:"#00B493",fontWeight:700}} title={`결제일: ${o.paidDate}`}>✓ 완납</span>
                        ) : isOverdue ? (
                          <span style={{display:"inline-block",fontSize:11,padding:"3px 8px",borderRadius:6,background:"rgba(240,68,82,0.18)",color:"#F04452",fontWeight:700}}>⚠ 연체</span>
                        ) : isPending ? (
                          <span style={{display:"inline-block",fontSize:11,padding:"3px 8px",borderRadius:6,background:"rgba(255,149,0,0.15)",color:"#FF9500",fontWeight:700}}>⏰ 미수</span>
                        ) : (
                          <span style={{fontSize:11,color:"var(--text3)"}}>—</span>
                        )}
                      </td>
                      <td style={{fontSize:12,color:"var(--text2)"}}>{o.note}</td>
                      <td style={{textAlign:"center",whiteSpace:"nowrap"}}>
                        <button onClick={()=>togglePaid(o.id)} title={isPaid?"결제 취소":"완납 처리"} style={{background:"none",border:"none",cursor:"pointer",color:isPaid?"#FF9500":"#00B493",fontSize:14,marginRight:4}}>{isPaid?"↩":"💰"}</button>
                        <button onClick={()=>startEdit(o)} title="수정" style={{background:"none",border:"none",cursor:"pointer",color:"#007AFF",fontSize:15,marginRight:6}}>✏️</button>
                        <button onClick={()=>{
                      if(!window.confirm(`이 판매 기록을 삭제할까요?\n\n${o.date} · ${o.productName} · ${Math.round(total).toLocaleString()}원`)) return;
                      if(!window.confirm(`⚠️ 한 번 더 확인합니다.\n\n삭제 후 복구 불가능합니다. 정말 진행하시겠습니까?`)) return;
                      setOrders(prev=>prev.filter(x=>x.id!==o.id));
                    }} title="삭제" style={{background:"none",border:"none",cursor:"pointer",color:"#F04452",fontSize:15}}>✕</button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

function DashboardTab({ products, setProducts, materials, laborItems, orders, setOrders, monthlySales, setMonthlySales, darkMode, setTab, setActiveProdId, clients = [], ledgers = {}, clientAR = {} }) {
  const [newOrder, setNewOrder] = useState({ date: new Date().toISOString().slice(0,10), productName: "", qty: "1", unitPrice: "", client: "", clientId: "", note: "", paymentDue: "", paidDate: "" });
  const [selectedOrderIds, setSelectedOrderIds] = useState(new Set());
  const [showOrderForm, setShowOrderForm] = useState(false);
  const [editingOrderId, setEditingOrderId] = useState(null);
  const [editOrderDraft, setEditOrderDraft] = useState(null);
  const [showMonthInput, setShowMonthInput] = useState(false);
  const salesRef = useRef(null); const salesInst = useRef(null);
  const pieRef = useRef(null); const pieInst = useRef(null);
  const marginRef = useRef(null); const marginInst = useRef(null);
  const dragMargin = useRef(null);
  const [marginDropInfo, setMarginDropInfo] = useState(null);
  const [marginSorted, setMarginSorted] = useState(false);
  const [expandedChart, setExpandedChart] = useState(null); // "sales" | "pie" | "margin" | "kpis"
  // 전용 상세 페이지: null | "sales" | "orders"
  const [detailView, setDetailView] = useState(null);
  // 안내 토스트 (한 번만 표시) — 모든 conditional return 이전에 선언 필수 (Hooks 규칙)
  const [showResizeHint, setShowResizeHint] = useState(() => !load("frw_resize_hint_seen", false));
  // 카드 레이아웃: { key: { width: px, height: px } } — 자유 드래그 리사이즈
  const [cardLayouts, setCardLayouts] = useState(() => load("frw_card_layouts", {}));
  const [hiddenKPIs, setHiddenKPIs] = useState(() => load("frw_hidden_kpis", []));
  useEffect(() => { save("frw_hidden_kpis", hiddenKPIs); }, [hiddenKPIs]);
  const hideKPI = (key, label) => {
    if (!window.confirm(`'${label}' 카드를 숨길까요?\n\n(언제든 우상단 '숨긴 카드 보이기'에서 다시 표시할 수 있습니다)`)) return;
    setHiddenKPIs(prev => [...new Set([...prev, key])]);
  };
  const showAllKPIs = () => setHiddenKPIs([]);
  useEffect(() => { save("frw_card_layouts", cardLayouts); }, [cardLayouts]);
  // 드래그 상태
  const dragRef = useRef(null); // { key, startX, startY, startW, startH, mode: 'br'|'r'|'b' }
  const [dragging, setDragging] = useState(null);
  // 정렬 기준선 (드래그 중인 카드 외 다른 카드들의 가장자리)
  const [alignGuides, setAlignGuides] = useState({ vLines: [], hLines: [], dragRect: null });
  useEffect(() => {
    if (!dragging) { setAlignGuides({ vLines: [], hLines: [], dragRect: null }); return; }
    const recompute = () => {
      const cards = Array.from(document.querySelectorAll(".rcard"));
      const vSet = new Set(); const hSet = new Set();
      let dragRect = null;
      cards.forEach(el => {
        const r = el.getBoundingClientRect();
        if (el.dataset.cardKey === dragging) { dragRect = { left: r.left, right: r.right, top: r.top, bottom: r.bottom }; return; }
        vSet.add(Math.round(r.left));
        vSet.add(Math.round(r.right));
        hSet.add(Math.round(r.top));
        hSet.add(Math.round(r.bottom));
      });
      setAlignGuides({ vLines: [...vSet], hLines: [...hSet], dragRect });
    };
    recompute();
    // 드래그 중에는 카드 크기가 계속 변하므로 자주 재계산
    const interval = setInterval(recompute, 50);
    return () => clearInterval(interval);
  }, [dragging]);

  // 8방향 모드: tl, t, tr, l, r, bl, b, br
  const cursorFor = (mode) => ({
    tl: "nw-resize", t: "ns-resize", tr: "ne-resize",
    l: "ew-resize", r: "ew-resize",
    bl: "sw-resize", b: "ns-resize", br: "se-resize",
  }[mode] || "default");

  const startResize = (key, mode, defW, defH) => (e) => {
    e.preventDefault(); e.stopPropagation();
    const cur = cardLayouts[key] || {};
    const cardEl = e.currentTarget.closest(".rcard");
    const rect = cardEl ? cardEl.getBoundingClientRect() : { width: defW, height: defH };
    const startX = e.touches ? e.touches[0].clientX : e.clientX;
    const startY = e.touches ? e.touches[0].clientY : e.clientY;
    dragRef.current = {
      key, mode,
      startX, startY,
      startW: cur.width || rect.width,
      startH: cur.height || rect.height,
    };
    setDragging(key);
    document.body.style.userSelect = "none";
    document.body.style.cursor = cursorFor(mode);
  };

  useEffect(() => {
    const onMove = (e) => {
      if (!dragRef.current) return;
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      const { key, mode, startX, startY, startW, startH } = dragRef.current;
      const dx = cx - startX;
      const dy = cy - startY;
      let newW = startW, newH = startH;
      // 가로: r/br/tr → +dx, l/bl/tl → -dx
      if (mode === "r" || mode === "br" || mode === "tr") newW = Math.max(140, startW + dx);
      if (mode === "l" || mode === "bl" || mode === "tl") newW = Math.max(140, startW - dx);
      // 세로: b/br/bl → +dy, t/tr/tl → -dy
      if (mode === "b" || mode === "br" || mode === "bl") newH = Math.max(80, startH + dy);
      if (mode === "t" || mode === "tr" || mode === "tl") newH = Math.max(80, startH - dy);
      setCardLayouts(prev => ({ ...prev, [key]: { width: newW, height: newH } }));
    };
    const onEnd = () => {
      if (!dragRef.current) return;
      dragRef.current = null;
      setDragging(null);
      document.body.style.userSelect = "";
      document.body.style.cursor = "";
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onEnd);
    window.addEventListener("touchmove", onMove, { passive: false });
    window.addEventListener("touchend", onEnd);
    return () => {
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onEnd);
      window.removeEventListener("touchmove", onMove);
      window.removeEventListener("touchend", onEnd);
    };
  }, []);

  // 카드 스타일 + 리사이즈 핸들
  const cardLayoutStyle = (key) => {
    const l = cardLayouts[key];
    if (!l) return {};
    return { width: l.width + "px", height: l.height + "px", flex: "0 0 auto" };
  };
  const resetCardSize = (key) => {
    setCardLayouts(prev => { const next = { ...prev }; delete next[key]; return next; });
  };
  const ResizeHandles = ({ keyName }) => {
    const isActive = dragging === keyName;
    const edgeStyle = { position: "absolute", zIndex: 5, background: "transparent" };
    const cornerStyle = {
      position: "absolute", zIndex: 6, width: 14, height: 14,
      background: isActive ? "rgba(0,122,255,0.7)" : "transparent",
      border: isActive ? "1px solid #fff" : "none",
      borderRadius: 3,
      transition: "background 0.15s",
    };
    // hover로 코너만 약간 보이게 하려면 :hover CSS 필요한데 여기선 단순화
    return (
      <>
        {/* 가장자리 4개 */}
        <div onMouseDown={startResize(keyName, "t")} onTouchStart={startResize(keyName, "t")}
          style={{ ...edgeStyle, top: -4, left: 12, right: 12, height: 8, cursor: "ns-resize" }} />
        <div onMouseDown={startResize(keyName, "b")} onTouchStart={startResize(keyName, "b")}
          style={{ ...edgeStyle, bottom: -4, left: 12, right: 12, height: 8, cursor: "ns-resize" }} />
        <div onMouseDown={startResize(keyName, "l")} onTouchStart={startResize(keyName, "l")}
          style={{ ...edgeStyle, left: -4, top: 12, bottom: 12, width: 8, cursor: "ew-resize" }} />
        <div onMouseDown={startResize(keyName, "r")} onTouchStart={startResize(keyName, "r")}
          style={{ ...edgeStyle, right: -4, top: 12, bottom: 12, width: 8, cursor: "ew-resize" }} />

        {/* 모서리 4개 */}
        <div onMouseDown={startResize(keyName, "tl")} onTouchStart={startResize(keyName, "tl")}
          onDoubleClick={(e) => { e.stopPropagation(); resetCardSize(keyName); }}
          title="크기 조절 (더블클릭 초기화)"
          style={{ ...cornerStyle, top: -3, left: -3, cursor: "nw-resize" }} />
        <div onMouseDown={startResize(keyName, "tr")} onTouchStart={startResize(keyName, "tr")}
          onDoubleClick={(e) => { e.stopPropagation(); resetCardSize(keyName); }}
          title="크기 조절 (더블클릭 초기화)"
          style={{ ...cornerStyle, top: -3, right: -3, cursor: "ne-resize" }} />
        <div onMouseDown={startResize(keyName, "bl")} onTouchStart={startResize(keyName, "bl")}
          onDoubleClick={(e) => { e.stopPropagation(); resetCardSize(keyName); }}
          title="크기 조절 (더블클릭 초기화)"
          style={{ ...cornerStyle, bottom: -3, left: -3, cursor: "sw-resize" }} />
        <div onMouseDown={startResize(keyName, "br")} onTouchStart={startResize(keyName, "br")}
          onDoubleClick={(e) => { e.stopPropagation(); resetCardSize(keyName); }}
          title="드래그하여 크기 조절 (더블클릭 초기화)"
          style={{
            position: "absolute", right: 0, bottom: 0,
            width: 18, height: 18, cursor: "se-resize", zIndex: 7,
            display: "flex", alignItems: "flex-end", justifyContent: "flex-end",
            color: isActive ? "#007AFF" : "var(--text3)",
            fontSize: 14, lineHeight: 1, paddingRight: 2, paddingBottom: 1,
            opacity: isActive ? 1 : 0.6,
            transition: "opacity 0.15s, color 0.15s",
          }}>⤡</div>
      </>
    );
  };

  // ESC로 모달/상세 닫기
  useEffect(() => {
    if (!expandedChart && !detailView) return;
    const onKey = (e) => { if (e.key === "Escape") { setExpandedChart(null); setDetailView(null); } };
    window.addEventListener("keydown", onKey);
    if (expandedChart) document.body.style.overflow = "hidden";
    return () => { window.removeEventListener("keydown", onKey); if (expandedChart) document.body.style.overflow = ""; };
  }, [expandedChart, detailView]);

  const thisYear = new Date().getFullYear();
  const months12 = Array.from({length:12},(_,i) => `${thisYear}-${String(i+1).padStart(2,"0")}`);

  // 월별 매출: 직접 입력 우선 → 장부 합계 → 주문 기록 합산
  const monthlyRevOrders = {};
  orders.forEach(o => { const m=(o.date||"").slice(0,7); monthlyRevOrders[m]=(monthlyRevOrders[m]||0)+parseFloat(o.unitPrice||0)*parseInt(o.qty||1); });
  // 장부(ledgers) 월별 청구합계 집계
  const monthlyRevLedger = {};
  Object.entries(ledgers || {}).forEach(([ym, m]) => {
    monthlyRevLedger[ym] = (m.clients || []).reduce((s, c) => s + (parseFloat(c.total) || 0), 0);
  });
  // 각 월의 데이터 출처: "direct" | "ledger" | "orders" | "none"
  const monthSource = months12.map(m => {
    const direct = monthlySales[m];
    if (direct !== undefined && direct !== null && direct !== "") return "direct";
    if (monthlyRevLedger[m] && monthlyRevLedger[m] > 0) return "ledger";
    if (monthlyRevOrders[m] && monthlyRevOrders[m] > 0) return "orders";
    return "none";
  });
  const monthValues = months12.map((m, i) => {
    const src = monthSource[i];
    if (src === "direct") return parseFloat(monthlySales[m]);
    if (src === "ledger") return monthlyRevLedger[m];
    if (src === "orders") return monthlyRevOrders[m];
    return 0;
  });
  const monthLabels = months12.map(m => m.slice(5)+"월");
  const hasAnyData = monthValues.some(v => v > 0);
  const totalYearRevenue = monthValues.reduce((s,v)=>s+v,0);

  const totalOrderRevenue = orders.reduce((s,o) => s + parseFloat(o.unitPrice||0)*parseInt(o.qty||1), 0);
  const computed = products.map(p => computeProduct(p, materials, laborItems)).filter(c => c.base > 0);
  const avgMarginSell = computed.length > 0 ? computed.reduce((s,c) => s + (c.finalPrice-c.beforeMargin)/c.finalPrice*100, 0)/computed.length : 0;
  const productSales = {};
  orders.forEach(o => { productSales[o.productName] = (productSales[o.productName]||0) + parseFloat(o.unitPrice||0)*parseInt(o.qty||1); });
  const topProduct = Object.entries(productSales).sort((a,b)=>b[1]-a[1])[0];

  const prodLabels = Object.keys(productSales);
  const prodValues = Object.values(productSales);

  // 제품별 마진율: 납품가 대비
  const mProds = products.filter(p => computeProduct(p,materials,laborItems).base > 0);
  const mLabels = mProds.map(p => p.name);
  const mValues = mProds.map(p => { const c=computeProduct(p,materials,laborItems); return parseFloat(((c.finalPrice-c.beforeMargin)/c.finalPrice*100).toFixed(1)); });
  const mProdsData = mProds.map((p, i) => ({ p, label: mLabels[i], value: mValues[i] }));
  const displayData = marginSorted ? [...mProdsData].sort((a, b) => b.value - a.value) : mProdsData;
  const displayMProds = displayData.map(x => x.p);
  const displayMLabels = displayData.map(x => x.label);
  const displayMValues = displayData.map(x => x.value);

  const chartText = darkMode ? "rgba(235,235,245,0.55)" : "rgba(60,60,67,0.55)";
  const gridCol = darkMode ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.06)";

  useEffect(() => {
    if (typeof Chart === "undefined") return;
    if (salesRef.current) {
      if (salesInst.current) salesInst.current.destroy();
      salesInst.current = new Chart(salesRef.current, {
        type:"bar",
        data:{ labels:monthLabels, datasets:[{ label:"월 매출", data:monthValues,
          backgroundColor:monthValues.map((_,i)=>{
            const src = monthSource[i];
            // direct (직접 입력): 진한 슬레이트, ledger (장부): 진한 인디고, orders (주문): 연한 슬레이트
            if (src === "direct") return "rgba(71,85,105,0.85)";
            if (src === "ledger") return "rgba(236,102,8,0.78)";
            if (src === "orders") return "rgba(71,85,105,0.45)";
            return "rgba(71,85,105,0.2)";
          }),
          borderRadius:5 }] },
        options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false},
          tooltip:{callbacks:{
            label:ctx=>{
              const src = monthSource[ctx.dataIndex];
              const srcLabel = src === "direct" ? "직접 입력" : src === "ledger" ? "📒 장부 합계" : src === "orders" ? "주문 기록 합산" : "";
              return [" "+Math.round(ctx.raw).toLocaleString()+"원", " 출처: "+srcLabel];
            }
          }}},
          scales:{ x:{grid:{color:gridCol},ticks:{color:chartText}}, y:{grid:{color:gridCol},ticks:{color:chartText,callback:v=>v>=1000000000?(v/1000000000).toFixed(1)+"조":v>=100000000?(v/100000000).toFixed(0)+"억":v>=1000000?(v/1000000).toFixed(0)+"백만":v>=1000?(v/1000).toLocaleString()+"천":v}} } }
      });
    }
    if (pieRef.current && prodLabels.length > 0) {
      if (pieInst.current) pieInst.current.destroy();
      pieInst.current = new Chart(pieRef.current, {
        type:"doughnut", data:{ labels:prodLabels, datasets:[{ data:prodValues, backgroundColor:["#475569","#64748b","#94a3b8","#334155","#1e293b","#0f172a"].slice(0,prodLabels.length) }] },
        options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:"right",labels:{color:chartText,padding:10,font:{size:12}}}} }
      });
    }
    if (marginRef.current && mLabels.length > 0) {
      if (marginInst.current) marginInst.current.destroy();
      marginInst.current = new Chart(marginRef.current, {
        type:"bar", data:{ labels:displayMLabels, datasets:[{ label:"납품가 마진율(%)", data:displayMValues,
          backgroundColor:displayMValues.map(v=>v>=26?"rgba(0,180,147,0.75)":v>=20?"rgba(255,149,0,0.75)":"rgba(240,68,82,0.75)"), borderRadius:5 }] },
        options:{ responsive:true, maintainAspectRatio:false, indexAxis:"y", plugins:{legend:{display:false}},
          scales:{ x:{grid:{color:gridCol},ticks:{color:chartText,callback:v=>v+"%"},max:Math.ceil((Math.max(...displayMValues,30)+5)/5)*5}, y:{grid:{display:false},ticks:{color:chartText}} } }
      });
    }
    return () => { [salesInst,pieInst,marginInst].forEach(r=>{if(r.current){r.current.destroy();r.current=null;}}); };
  }, [orders, darkMode, products.length, JSON.stringify(monthlySales), JSON.stringify(monthlyRevLedger), marginSorted]);

  const addOrder = () => {
    if (!newOrder.productName || !newOrder.unitPrice) return;
    let finalOrder = { ...newOrder };
    if (newOrder.clientId) {
      const c = clients.find(x => x.id === newOrder.clientId);
      if (c) finalOrder.client = c.name;
    }
    setOrders(prev => [...prev, { id:uid(), ...finalOrder }]);
    setNewOrder({ date:new Date().toISOString().slice(0,10), productName:"", qty:"1", unitPrice:"", client:"", clientId:"", note:"", paymentDue:"", paidDate:"" });
    setShowOrderForm(false);
  };
  // 미수금 계산
  const todayStr = new Date().toISOString().slice(0,10);
  const totalOverdueAmt = orders.filter(o => !o.paidDate && o.paymentDue && o.paymentDue < todayStr).reduce((s,o) => s + parseFloat(o.unitPrice||0)*parseInt(o.qty||1), 0);
  const overdueCount = orders.filter(o => !o.paidDate && o.paymentDue && o.paymentDue < todayStr).length;
  const paidCount = orders.filter(o => !!o.paidDate).length;
  // 총 미수금: 장부탭 - 거래처별 미수금의 "미수금 합계"와 동일한 계산식
  // (자동 미수금: 장부의 "미입금" 청구 + 수동 청구 - 수동 입금, 양수만 합산)
  const arNames = new Set(Object.keys(clientAR || {}));
  Object.values(ledgers || {}).forEach(m => (m.clients || []).forEach(c => { if (c.name) arNames.add(c.name.trim()); }));
  let totalUnpaidAmt = 0;
  let unpaidCount = 0;
  arNames.forEach(name => {
    const manualEntries = (clientAR[name] && clientAR[name].entries) || [];
    const manualCharge = manualEntries.filter(a => a.type === "청구").reduce((s,a) => s + (parseFloat(a.amount)||0), 0);
    const manualPaid = manualEntries.filter(a => a.type === "입금").reduce((s,a) => s + (parseFloat(a.amount)||0), 0);
    let autoUnpaidSum = 0;
    Object.values(ledgers || {}).forEach(m => {
      (m && m.clients || []).forEach(c => {
        if ((c.name || "").trim() !== name) return;
        const amt = parseFloat(c.total) || ((parseFloat(c.supply)||0) + (parseFloat(c.tax)||0));
        if (amt <= 0) return;
        if (c.status === "미입금") autoUnpaidSum += amt;
      });
    });
    const balance = autoUnpaidSum + manualCharge - manualPaid;
    if (balance > 0) { totalUnpaidAmt += balance; unpaidCount += 1; }
  });
  const startEditOrder = (o) => { setEditingOrderId(o.id); setEditOrderDraft({ ...o }); };
  const cancelEditOrder = () => { setEditingOrderId(null); setEditOrderDraft(null); };
  const saveEditOrder = () => {
    if (!editOrderDraft || !editOrderDraft.productName || !editOrderDraft.unitPrice) return;
    setOrders(prev => prev.map(x => x.id === editingOrderId ? { ...editOrderDraft } : x));
    setEditingOrderId(null); setEditOrderDraft(null);
  };
  const kpi = (key, label, val, sub, color) => {
    if (hiddenKPIs.includes(key)) return null;
    const layout = cardLayouts[key];
    // 카드 크기에 따라 폰트 자동 스케일
    const w = layout?.width || 200;
    const valFontSize = w >= 360 ? 32 : w >= 240 ? 26 : w >= 180 ? 22 : 18;
    return (
      <div className="card rcard kpi-card" data-card-key={key} style={{ ...cardLayoutStyle(key), position: "relative", minWidth: 140, flex: layout ? "0 0 auto" : "1 1 200px", overflow: "hidden" }}>
        <button onClick={() => hideKPI(key, label)} title="이 카드 숨기기" className="kpi-hide-btn no-print"
          style={{
            position: "absolute", top: 8, right: 8, width: 22, height: 22, borderRadius: 11,
            border: "none", background: "rgba(240,68,82,0.12)", color: "#F04452",
            cursor: "pointer", fontSize: 12, fontWeight: 700, fontFamily: "inherit",
            display: "flex", alignItems: "center", justifyContent: "center",
            opacity: 0, transition: "opacity 0.15s", zIndex: 3,
          }}>✕</button>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6,gap:6}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:0.5,flex:1,minWidth:0}}>{label}</div>
        </div>
        <div style={{fontSize:valFontSize,fontWeight:800,color:color||"var(--text1)",lineHeight:1.05,wordBreak:"break-all"}}>{val}</div>
        {sub && <div style={{fontSize:12,color:"var(--text2)",marginTop:4}}>{sub}</div>}
        <ResizeHandles keyName={key} />
      </div>
    );
  };
  // 전용 상세 페이지 렌더링
  if (detailView === "sales") {
    return <SalesDetailView
      onBack={()=>setDetailView(null)}
      thisYear={thisYear}
      months12={months12}
      monthLabels={monthLabels}
      monthValues={monthValues}
      monthlyRevOrders={monthlyRevOrders}
      monthlyRevLedger={monthlyRevLedger}
      monthSource={monthSource}
      monthlySales={monthlySales}
      setMonthlySales={setMonthlySales}
      orders={orders}
      darkMode={darkMode}
    />;
  }
  if (detailView === "orders") {
    return <OrdersDetailView
      onBack={()=>setDetailView(null)}
      orders={orders}
      setOrders={setOrders}
      clients={clients}
      darkMode={darkMode}
    />;
  }
  const dismissResizeHint = () => { setShowResizeHint(false); save("frw_resize_hint_seen", true); };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <style>{`.kpi-card:hover .kpi-hide-btn { opacity: 1 !important; }`}</style>
      {/* 리사이즈 중 정렬 기준선 오버레이 */}
      {dragging && (
        <div style={{ position: "fixed", inset: 0, pointerEvents: "none", zIndex: 4 }}>
          {alignGuides.vLines.map((x, i) => {
            const dr = alignGuides.dragRect;
            const isAligned = dr && (Math.abs(dr.left - x) < 4 || Math.abs(dr.right - x) < 4);
            return (
              <div key={"v"+i} style={{
                position: "absolute", left: x, top: 0, bottom: 0, width: 0,
                borderLeft: isAligned ? "2px solid #EC6608" : "1px dashed rgba(0,122,255,0.45)",
                boxShadow: isAligned ? "0 0 8px rgba(236,102,8,0.55)" : "none",
                transition: "border-color 0.08s",
              }}/>
            );
          })}
          {alignGuides.hLines.map((y, i) => {
            const dr = alignGuides.dragRect;
            const isAligned = dr && (Math.abs(dr.top - y) < 4 || Math.abs(dr.bottom - y) < 4);
            return (
              <div key={"h"+i} style={{
                position: "absolute", top: y, left: 0, right: 0, height: 0,
                borderTop: isAligned ? "2px solid #EC6608" : "1px dashed rgba(0,122,255,0.45)",
                boxShadow: isAligned ? "0 0 8px rgba(236,102,8,0.55)" : "none",
                transition: "border-color 0.08s",
              }}/>
            );
          })}
        </div>
      )}
      {showResizeHint && (
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:10,background:"rgba(0,122,255,0.08)",border:"1px solid rgba(0,122,255,0.2)",fontSize:13,color:"var(--text1)"}}>
          <span style={{fontSize:16}}>💡</span>
          <span style={{flex:1}}>각 카드의 <b>우하단 ⤡ 핸들</b>을 드래그하면 자유롭게 크기를 조절할 수 있습니다. 더블클릭하면 초기화됩니다. KPI 카드 우상단 <b>✕</b>로 숨길 수 있어요.</span>

                    onDragStart={e => { if(marginSorted) return; dragMargin.current = p.id; setTimeout(()=>{e.target.style.opacity="0.35";},0); }}

            </div>

                    <td><input value={editOrderDraft.productName||""} onChange={e=>setEditOrderDraft(d=>({...d,productName:e.target.value}))} placeholder="제품명 *" style={{height:34,fontSize:13,padding:"0 8px"}}/></td>
                    <td><input type="number" value={editOrderDraft.qty||""} onChange={e=>setEditOrderDraft(d=>({...d,qty:e.target.value}))} style={{height:34,fontSize:13,padding:"0 8px",textAlign:"right"}}/></td>
                    <td><input type="number" value={editOrderDraft.unitPrice||""} onChange={e=>setEditOrderDraft(d=>({...d,unitPrice:e.target.value}))} placeholder="단가 *" style={{height:34,fontSize:13,padding:"0 8px",textAlign:"right"}}/></td>

                    <td>

                        <select value={editOrderDraft.clientId||""} onChange={e=>{ const id=e.target.value; const c=clients.find(x=>x.id===id); setEditOrderDraft(d=>({...d, clientId:id, client: c?c.name:d.client})); }} style={{height:34,fontSize:12,padding:"0 6px"}}>

                        <input type="date" value={editOrderDraft.paidDate||""} onChange={e=>setEditOrderDraft(d=>({...d,paidDate:e.target.value}))} title="결제 완료일" style={{height:26,fontSize:11,padding:"0 6px"}}/>

                    <td><input value={editOrderDraft.note||""} onChange={e=>setEditOrderDraft(d=>({...d,note:e.target.value}))} placeholder="비고" style={{height:34,fontSize:12,padding:"0 8px"}}/></td>

                    <button onClick={togglePaid} title={isPaid?"결제 취소":"완납 처리"} style={{background:"none",border:"none",cursor:"pointer",color:isPaid?"#FF9500":"#00B493",fontSize:14,marginRight:4}}>{isPaid?"↩":"💰"}</button>
                    <button onClick={()=>startEditOrder(o)} title="수정" style={{background:"none",border:"none",cursor:"pointer",color:"#007AFF",fontSize:15,marginRight:6}}>✏️</button>
                    <button onClick={()=>{
                      if(!window.confirm(`이 판매 기록을 삭제할까요?\n\n${o.date} · ${o.productName} · ${Math.round(total).toLocaleString()}원`)) return;
                      if(!window.confirm(`⚠️ 한 번 더 확인합니다.\n\n삭제 후 복구 불가능합니다. 정말 진행하시겠습니까?`)) return;
                      setOrders(prev=>prev.filter(x=>x.id!==o.id));
                    }} title="삭제" style={{background:"none",border:"none",cursor:"pointer",color:"#F04452",fontSize:15}}>✕</button>
                  </td>
                </tr>);
              })}
            </tbody></table>
          </div>
        </>)}

      </div>
      {expandedChart && (

          type={expandedChart}

          darkMode={darkMode}
          data={{
